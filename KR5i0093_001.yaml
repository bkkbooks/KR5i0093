canonical_identifier: bkk:krp/KR5i0093/krp/v1/juan/1
seq: 1
front:
  text: 心香妙語重刋道藏輯要心香妙語序粵稽上古之人草衣木食崖居穴處皆夀百歲而正寢燧人氏
  hash: sha256:835b3167f3a19b5b1201d623eedafd42e3af15f2d5f0e6866493e1aabe17e8b6
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_01p001a}
body:
  text: 出鑽木取火烹飪興焉人民恣其血肉火食爍其臟腑淫欲枯其精血則百病叢生不盡天年夭喪者多祝融御世見人恆罹病苦為人咒誦故稱帝曰祝誦氏由是祝由有科與民祝疾治病其科留世即今之巫覡是矣行為皆取諸符篆未聞有疏奏事意者乎第晉漢之間天王授大洞法籙於文昌太上傳盟威經籙於天師而用之者亦籙符也五代時廣成先生編立金亭儀制而始有表詞箋奏疏狀關申用文字者自茲始矣厯年既久訛誤恆多前明金寧二真人著靈寶文檢呂朴菴先生著道門定制其中符簡兼施表奏互用而疏之一款未必全美豫自童年參習經教聞有心香妙語心實慕之乙酉歲所刋者乃前人之餘筆也丙申夏新繁談子道遠送來殘書一帙豫捧誦之斯為正真之心香妙語展卷細閲其中疏意分門别類詢屬鴻才果非尋常手筆實為濟世金燈但書出自明之正德元年厯今三百餘歲蠧蛀蟲傷篇殘紙缺而著作之名已失噫書存而名不彰泯沒當時之苦心良可嘆也豫竊何幸得見此書獨恨得之晚景雖有志行而力不逮也但不忍遺棄謹按原書親手抄録脫略者補之錯謬者正之俾厯善本付梨棗而公海內庶不泯前賢利世之婆心亦幸成豫仰慕之素志今功落成爰辨數語以志愚衷時大淸道光二十年端月綿竹退隱陳復烜含朴時年六十有八題於真武觀之芥子山房
  hash: sha256:5553adb7927aeebd65f886c3023d3a512f446514ff1f4249201be84616df8f45
