body:
  text: 目録慶祝類太上老君連二玉帝真武連二釋迦佛連二阿彌陀佛觀音連二定光佛東嶽連二仰山東嶽文昌吕祖三義關帝川主城隍連二平安類榜文常規送故常規平安連二常規平安真武常規平安南斗常規平安北斗常規平安南北二斗上元平安中元平安下元平安常規平安僧上元平安僧中元平安僧下元平安僧平安類疏語逐月六日南斗逐月七日北斗天香前許南北二斗庚申甲子齊常規三淸常規送故常規平安真武常規平安南斗常規平安北斗常規平安南北二斗常規平安仰山上元平安中元平安下元平安常規平安僧上元平安僧中元平安僧下元平安星辰類榜文預禳星辰連二見患禳星連二預禳僧見患禳星僧星辰類疏語預禳星辰連二見患禳星連二僧見患順星連二僧預禳道見患禳星命道保安命僧保安誦道經禳星誦佛經禳星工役類榜文修造後保安同前真武火後重修建醮保安道觀修造後建醮修造後請僧保安寺院修造保安工役類疏語修造後保安修造後保安真武火後重修建醮保安道觀修造後建醮修造後請僧人建水陸遷居謝家廟遷居謝家神
