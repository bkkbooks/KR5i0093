front:
  text: 心香妙語重訂道藏輯要心香妙語卷二
  hash: sha256:f4c2f9303c5472b80ffc5615213059bf0478aac293ec2f172caa994759513e2c
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_05p001a}
body:
  text: 綿竹退隱陳復烜含樸校輯嗣派徒張軫駐參閱本雲趙龢芳姪徒王本崇雲瑞派徒孫江合義體仁馬合乾健堂姪徒孫鄧合順希襄門人蔣本遂繼順祈禱類榜文春祈雨靑帝司時喜盡春耕之力旱魃爲虐恐辜秋稔之期爰卜剛辰特陳淸醮謹布朱章而昭吿庶祈丹悃之濳通伏願動雷雨之滿盈以解以潤揚雲霓之晻靄楚辭來燕來甯毛詩春謝雨耕者望霓實際插秧之候禱而得雨輒陳結草之誠用報天休冀收地利伏願龍宮洞達分明止覩於龍顏鳳闕弘開絡繹下垂於鳳輦夏祈雨赤帝興災可嘆朱明之盛皇天孚佑用伸丹悃之誠冀沾霖雨之甘祈滅驕陽之苦伏願鞭雷車搖電幟俾爾霶𩃱乘風馭駕雲輿惠然來降夏謝雨如炎如焚實切望雲之禱旣霑旣足敢忘賜雨之恩恭奏朱章敬酬洪造伏願三淸翳兮備降萬靈繽其竝迎並楚詞永忘夏旱之時乃遂秋成之望得雨小再祈得雨霏霏其涸也可立而待孟子句望雲縹縹惟誠焉斯感而通乃命黃冠再陳淸醮伏願推起五龍之駕霖雨滂沱降臨九鳳之車風雲慶會秋祈雨日行北陸方當皜皜之時雲密西郊遽稔炎炎之苦謹拜緣章而孚感敬祈洪澤之沾濡伏願洋洋翻倒於銀河俾滂沱矣毛詩全句𣺌𣺌炳弘於玉闕實鑒臨之秋謝雨陽以暴之爰切龜田夀之禱雨乃至矣敢忘鴻造之恩俯拜緣章叩酬玄聖伏願旌旂風動遙迎龍扆之尊車駕星臨輝映蝸居之陋命僧四時祈雨嗟旱魃焚惔之苦欲銷去之詩經句祈世尊救護之恩得滅度者金剛經句迺修蒲供恭叩蓮臺伏願乘慈雲於淸涼山中來甯來享施法雨於娑婆世上以沾以濡命僧四時謝雨望望惜雨乾杜詩全句爰叩金蓮之座鱗鱗致雲起文選隨沾銀竹之恩謹設齋饈用酬慧力伏願南贍部洲諸佛子洞降芳筵西方勝境眾如來普歆法會四時祈雨玄帝仰止玄天杳杳靈光之有煒俯觀赤地炎炎枯槁之無年爰命黃冠特陳淸醮冀丹忱之感格先墨榜以申聞伏願驅電奔雲頻瀉玉膏之澤躡氷把氣眞武經句得瞻金闕之尊四時謝雨玄帝望南畝炎惔之苦已兆龜田夀藉北方救護之恩實叨鴻澤敬陳淸醮用報弘休伏願九地盤遊上應虛危之顯化三天部帥下瞻玄武之眞靈四時祈雨仰山惜雨望雲實切三農之慮翻雲覆雨祈沾二聖之恩謹卜剛辰敬陳佛事伏願霑弘澤於堵田之上遍洒龜田夀降鸞輅於仰山之間特臨蝸舍四時謝雨仰山霈銀竹以沾濡實藉威靈之庇折瓊枝而薦饈庸申報謝之誠旣涓吉日以敷陳特布明文而昭告伏願整列珠宮之隊仗出離雲關驅馳玉殿之軒車來臨氷室眾戶祈雨六月驕陽方肆炎惔之苦一鄉善士敢忘祈禱之誠同奏朱章敬陳紫極伏願開銀河之鎖鑰沛爲洪澤之恩敞玉闕之門關來降淸虛之境秋間祈晴雲稼浮黃喜有收成之候雨花垂白乃無休息之時爰告皇穹敬陳淸醮伏願三竿霽日昇騰龍馭之昭彰一陣香風噓送鸞輿之降鑒秋間謝晴雨霖霪而爲苦可勝其憂日荏苒以騰晶劉禹錫賦句云胡不喜謹陳淸醮用報洪恩伏願雉扇纔開擁出旌旂之隊仗虎關洞達得瞻旒冕之眞仙命僧四時祈晴淫雨爲之霖左傳隱公二年久雨爲之淫雨實防農務慧日破諸闇觀音經庸叩佛慈陳象教以皈依冀烏輪之照耀伏願金鴉騰翥俾傾葵藿之誠玉像驅馳來赴蘅茅之漏命僧四時謝晴望南畝之農久際滂沱之澤叩西方之佛果沾淸淨之光用設齋饈敢陳供獻伏願無量無邊之賢聖浮空而來有靈有感之神祗尋聲而至冬間祈雪飄風發發飄風茀茀詩經句强已應持雨雪霏霏雨雪浮浮尙慳呈瑞謹陳淸醮寅叩皇穹伏願掩日韜光點綴兎園之景乘雲馭氣下來鳳闕之尊冬間謝雪剪水飛花已見漉浮之瑞獻花酌水庸申報謝之誠爰立虛壇特陳醮禮伏願森列旌旂之簇簇上啟瓊關駢羅環珮之鏘鏘下臨玉輅命僧祈雪柳絮空中未覩因風之瑞蓮花座上能施堆玉之祥乃命僧儔肅陳梵典伏願兎園點綴咸成萬樹之光瑤象駕來臨普演三乘之妙教命僧謝雪昔叩如來欲致彌天之瑞今欣滕六果獲平地之祥謹就蝸居誠皈象教伏願金鈴振響暫離極樂國中玉座尊臨來降𨶒浮世上預祈豐稔春耕夏種敢忘地利之勞秋歛冬藏庸致天宗之禱謹涓蝸舍恭叩虎關伏願來冕旒於縹緲之宮不留不處降輦輅於綢繆之戸以燕以甯秋熟謝天黍稷稻梁旣遂秋成之喜蘋蘩藴藻庸申饈薦之儀上報前休下邀後福伏願擁霓旌之森列望而畏之載雲簇之逶迤屈原九歌于然來矣禳虫蝗稼穡興成忽致虫蝗之害蘋蘩羞薦庸申螻蟻之誠仰冒皇穹俯陳淸醮伏願一聲警蹕森羅虎仗出金門萬騎旌旗護擁龍車離玉殿禳牛瘟流行六癘可勝大武之憂形著一誠庸罄小心之祝俯陳芳醮仰叩圓穹伏願演金科玉律之文淸宮昭格奏瓊珮瑤珂之韻黃屋尊臨祈禱類疏語春間祈雨一氣轉洪鈞久際發生之喜百穀仰膏雨敢忘祈禱之誠仰望虎關俯陳蟻悃切念某服勤東作效計西成適逢靑帝之司時忽致旱魃之爲虐遲遲愛日轉爲盾日之嚴習習和風扇作融風之苦病綠悴漲波之麥敗黃枯出水之秧春耕之際如斯秋稔之時何若謹陳淸醮用叩皇穹伏願金闕弘開玉宸降鑒洒彌天之澤潤沛然而施洋然而流管子春雨之灌萬物也洋然而流沛然而施回易地之懽聲憂者以樂病者以愈東坡喜雨亭句春間謝雨月臨靑帝可勝龜圻之憂露禱皇穹隨叶鶴鳴之應敢忘蟻報以答洪休切念某出入攸爲耕耘是好適際融和之候遂逢旱暵之災若曰春生不遂插秧之喜知其秋至恐無穫稻之期靖言思之豈容已爾爰布由伸之悃用干臨下之威盟誓方興濡沾已及萬物載回於生意羣心賴釋於愁聲用殫結草之誠姑致薦蘋之禮伏願旣沾旣足旣優旣渥且沐深恩實廢實秀實好實堅詩經句尙祈厚惠夏間祈雨日熾朱光而徹地久兆龜田夀露陳丹悃已告天冀沾鴻澤切念某蘅茅苟活稼穡知艱欣然畢力於春耕忽耳驚心於夏旱魚池執𤍠如居鼎沸之中蝸舍薰蒸若在甑炊之内早稻有田田之白死晚禾無畝畝之靑生可勝狼顧之憂徒切鶴鳴之望未知攸止莫敢或遑乃陳淸醮之儀冀沐洪休之賜伏願傳宣風伯移詔雨師沛然下洋然流撲滅紅爐之熖杜詩苦𤍠行火旂熖熖張天紅天下如在紅炉中出而休入而息挽回綠野之禾夏間謝雨旱之云甚如遭坐甑之炊韓文公詩句感而遂通隨沐傾盆之澤回焦枯於生育轉愁嘆於謳歌謹陳淸醮之儀用報洪休之賜伏願三日已往爲霖雨已知至至之深恩五穀皆熟曰有年尙冀終終之厚惠得雨小再祈蓄雲西密不堪惜雨之憂微雨東來陶詩夏雨帶凉曰微雨東來好風與俱僅應望雲之禱載陳蟻悃共俟鴻庥切念某久逢平秩之時忽致乾封之候嘉禾悴白將無炊玉之期靈稼焦黃孰禦流金之苦爰陳淸醮冀沐甘霖雖感而遂通已得浥塵之喜然旱之云久必需破塊之恩謹攄蒙瀆之誠用達乾元之聽伏願洋洋如在赫赫厥靈震霹𩆝雷域中驚起龍蟠之蟄俾霶沱雨天下沾濡龜圻之田夀旣渥旣攸乃慰乃止秋間祈雨農夫望稔喜逢秋月之臨旱魃興災憂甚春氷之履俯殫愚悃仰徹帝聰切念某黍稷是耕稼穡匪懈書經豈易收成之候尙餘炎赫之威流斷江河空有桔槔之具坼形田畝莫施耒耜之工雲屏屏兮風使之醨韓文公風伯訟日皜皜兮雨無以至乃陳淸醮敬籲皇穹伏願敞開虎豹之關振起蛟龍之蟄油然作沛然下飛揚銀竹之沾濡耕者悅種者欣醖釀金穰之嘉瑞秋間謝雨暵其乾矣方深狼顧之憂雨以潤之遂叶蟻封之應田隴際秋成之望郊原喜春色之回雖造物不自以爲功然人情敢忘於酬德乃修淸醮用報洪休折瓊枝以爲羞離騷姑寓瓊英之報謝呈金穰而應瑞尙祈金頴之豐登上句見文選命僧四時祈雨烈日焚惔久稔龜田夀之兆慈雲覆護敢依猊座之尊俯罄丹衷仰干洪造切念某周原苟活禹甸偷生云何夏暑之鬱蒸若履春氷之兢戰浙玉之欣絕望流金之熾罙增念植此稻苗一旱翻成畫餅則饑而菜色三時那可蒸沙傳登錄爰殫哀切之誠冀發慈悲之念伏願洒功德池中之潤澤霈作寶花運娑婆世上之淸涼來蘇靈稼命僧四時謝雨旱魃爲虐憂心如熏嘆驕陽之益甚佛法相緣應聲如響宜甘澤之隨敷諸天華雨遍虛空冀地靈苗皆實秀其功希有於意云何謹陳蒲供之饈用報蓮臺之德滅除煩惱熖旣已沾現在之恩皈依淸淨光尙冀錫未來之福四時祈雨眞武炎炎旱魃遽深渴雨之思杳杳神君能致甘霖之澤仰瞻金闕俯叩玉霄切念某種植爲生收成是計豈意望霓之切可勝瞻漢之憂兆坼龜田夀如適甑炊之火𤍠侵魚沼似探鼎沸之湯早稻靑兮隕黃晚禾綠兮稿白憯不知其故誕我祀何如詩經全句爰殫南畝之誠敬叩北方之聖伏願開天關而彰火德蛇爲天關火精含陰大將軍龜爲地軸水精育陽大將軍滅除徹地之威嚴啟地軸而育水精洒作彌天之霢霂悉被屯膏之施咸膺豐稔之年四時謝雨眞武耕者望雲爰切北方之禱禱而得雨載欣南畝之耕三登之兆已形一向之期可卜福沾有永功德無窮謹依金闕之尊敬設玉虛之醮化太陰之水旣已沾乾施之深恩顯玄武之虛尙冀賜豐年之嘉瑞請仰山祈雨望望杳然於雨澤旱氣欲燃高高仰止於震峯聲應如響謹舒誠敬特叩靈康切念某處彼蘅茅務茲稼穡豈意烏飛之烈遽形龜坼之文彼黍離離將槁周原之白維禾穟穟漸焦豳野之黃惟俟來蘇敢忘祈禱伏願稟玉皇而飛霢霂叩金仙而洒淸涼叶濟時艱俾錫爲霖之喜發仁施德使無轉壑之虞請仰山酬雨仰止集雲爰切乾封之禱沛然下雨旋通孚惠之靈生意欣欣懽聲嘖嘖獲免龜田夀之苦敢忘蟻報之誠爰卜良辰特陳謝禮伏願洋乎如在于然而來東殿垂慈更冀沾恩於東作西宮昭格尙祈錫福於西成大眾祈雨靡神不舉靡神不宗詩經全句欲釋望霓之渴惟德是親惟德是輔左傳庸申禱雨之誠切念某結社枌榆謀生稼穡奈爾蒼天瘨我以旱毛詩俾之赤地維眾之憂西陌東阡久肆坼龜之兆南鄰北巷徒興鳴鶴之思何若如之至所極矣謹率羣心之敬輒爲諸聖之迎爰仗黃冠特開淸醮伏願震雷霆之霹𩆝銷雲漢之焚惔接壤連封俱沐甘霖之霢霂同門異戸咸欣樂𡻕之豐登四時祈晴霪雨霏霏久切愁霖之苦四時纂要晴雲靄靄敢申霽景之祈仰上高穹俯申卑悃切念某樂𡻕止期於田稼兼旬奈苦於簷花夜息蓬居厭聲滴堦之韻朝耕禾隴忍觀衝岸之流可勝大過之憂爰啟中孚之信敬陳芳醮恭叩圓淸伏願縱諸陽閉諸陰董仲書春秋繁露暫補蒼天之漏杜詩宣其光豁其翳融爲易地之和四時謝晴淫雨之雨眞爲下土之憂曰暘而暘隨感上穹之賜雲葉歛陰陰之暄日華舒赫赫之光何天之休易地以喜爰潔薦蘋之禮敬申結草之誠伏願有始則有其終自此三登而樂𡻕無過亦無不及繼茲庶徵以若時命僧四時祈晴苦雨久淋淫實切吾農之害慈雲多覆護庸依我佛之尊切念某田稻方成簷花爲厭淚滴翻雲之黑眼穿披霧之靑於一兩朝忽際陽明之喜又三四陣旋有陰曀之垂郊原興平地之波江海漲滔天之浪爰叩金蓮之座冀收銀竹之聲宣揚貝葉之靈文饈薦伊蒲之妙饌伏願發善護念興慈悲心鼓動釋風掃退腥浮之晦翳升騰惠日暢爲淸淨之圓光命僧四時謝晴霪雨爲害小民惟曰怨咨尙書句慧日舒晴我佛不可思議萬物喜當天之寂照羣生瞻特地之圓明如是蒙恩云何報德謹闡阿難遺教敬修梁武齋儀相顯一輪旣已息垂垂之銀竹光浮五色願常沾洒洒之金蓮冬間祈雪黃飛萬葉漸當改𡻕之辰白散六花未覩豐年之瑞俯申丹悃仰叩玄眞再念冬時如行春令桃濃李盛巳萌先卉之芽松茂柏蒼未聳後淍之色漫切云陽薄陰生之望前漢天文志但無作陰胎陽孕之憂秦門冀呈平地之觀覘爰叩上天之祈禱伏願滕神施巧巽伯申威無臭無聲剪碎銀河之水自形自色洒爲玉界之塵盡除疵癘之灾醖釀昇平之兆謝雪雪飛六出已瞻剪碎之工日謹三薰庸薦報瓊之禮謹來雲侶乃建星壇特陳淸醮之儀答報皇穹之德伏願虎關上格龍衮昭垂與時偕行有暑往寒來之休若自今而後無陰胎陽孕之憂虞命僧祈雪𡻕無佳瑞莫知豐稔之期佛有靈通能致瀌浮之喜仰叩圓明之皇覺俯陳方寸之丹忱再念幽都久屬玄㝠之助云何塵宇未見滕六之祥乃爲三千銀世界之思徒切十二玉樓臺之想謹以如來之正法敬修梁武之齋儀禮金色身宣琅函典伏願呈大力於功德池内散爲剪水之奇暢恩波於淸涼山中溥作流沙之福命僧謝雪昔叩蓮臺期致飛花之瑞今修蒲供用申結草之誠功德不可勝量法力敢忘報爾仰答有孚之惠俯陳無碍之齋散慈雲而作彤雲旣已沾於六出舒畏日而爲愛日尙冀遂於三登預祈豐年日月照而四時行惟勤耕種風雨節而五穀熟預貴祈禳切念某珍米如珠以稼爲寶出入營爲之際實切知艱耘鉏播植之間且忘助長於焉從事舍是何求然非悃禱於先時安得萬千於後日謹陳淸醮恭叩皇穹伏願事於西田夀俾得萬農之地利安彼南畝永無一點之天災秋熟謝天分地之利豐登幸叶於金穰荷天之休酬賽敢忘於瓊報俯依蓬蓽仰薦蘋蘩切念某已分是安敬心爲主耕耔稼穡旣充谷腹之期藝植桑麻亦遂絲身之望淋雨纔淫而隨止驕陽方亢以旋消春生之夏長之秋收也冬藏也因念小康之喜實乃大造之恩爰命黃冠以陳淸醮于以效獻芹之禮亦以申結草之誠殷富安甯旣已拜鴻休之賜叶囂隳寞尙祈無虎政之苛禳虫蝗嗟蝗虫之入境實切憂思望虎豹之開關特申祈禱切念某貴五穀如貴金玉護寸田如護圭璋豈期育秀之時忽致戕生之害傷稼之蟊傷華之螣旣如木蠧之傷食心曰螟食根曰蠈且若桑蠶之食至斯極矣孰能禦之謹陳芳醮之微儀庸格玄穹之淸聽伏願驅爾於巽風之内𢌿之於離火之中甯食吾肺腸何待唐宗之祝無害我田樨冀歌周室之詩通鑑唐太宗畿内有蝗入璄帝捉數枚而祝之曰民以谷爲命而汝食之甯食吾肺腸舉手吞之境内蝗絕不見毛詩甫田二章旣堅旣好不稂不莠去其螟螣及其蟊蠈無害我田穉田祖有神秉𢌿炎火禳牛瘟日觀牛疫孰勝南畝之耕布露蟻忱爰薦西郊之禴秉念小人之力穡實資大武以施功其可舍諸足以用矣豈意扎瘥之癘甚於觳觫之憂漢京之喘恐有所傷齊堂之死若無其罪謹命黃冠之士特陳淸醮之儀伏願推其乾覆之恩錫爾坤維之類不災不害縱情於草野之間或寢或訛肆意於桃林之上俾之茁壯助我耕耘禳松生蚕鬱鬱松枝淍落忽傷於蚕食區區蘋薦祈禳爰罄於蟻忱敬瀆高明輒忘卑賤載念蒼官之節實存君子之剛豈期耗葉之蟲欲作改柯之蠧舉動類屈伸之蠖綿延如飛散之蝗一飽贏餘隨作周身之蠒三生變化復爲脫殼之蛾撼天遂無風雨之聲拄地幸有雪霜之操謹涓吉日敬設醮筵伏願覆育昭然鑒觀赫若驅巽伯掃除之力俾爾消蹤回大夫封爵之榮依然挺秀保蠶桑柘繁陰可盡繭繅之活計蘋蘩薦禮敢爲蠶績之祈禳吳志孫皓南陽郡一𡻕蠶八績俯𤍠瓣香仰陳薄奠爰叩馬鳴之主冀沾鴻覆之恩伏願八熟兆懽三眠應候吐就絲絲之緖食間菓葉之聲時致四時允有周身之喜月維二月且無剜肉之憂虫蝗爲一㕓之良民實藉鴻龎之庇演三淸之秘典冀除蝗螣之災茲卜良辰特陳薄禮伏願秉𢌿炎火無生生化化之憂長育靈苗有翼翼與與平聲音於之喜命僧禳虫蝗白貉含靈能聽法華之義蝗虫爲虐庸陳密秘之文信受奉行䖍誠皈命伏願尋聲回去自然無害於嘉禾於意云何更錫有常之戩穀看經保松蠶維彼虬枝方挺森森之秀時茲蠶食遽聞葉葉之聲祈神力之護持誦經文之懴念伏願風收雨散無遺蛾蠒之生雪壓霜欺載見龍蛇之勢命僧看經保蠶蒼官挺秀忽驚蠶食之淍零我佛垂慈能致龍神之祜祐敢憑經典回向眞靈冀圓覺之鑒知諒明神之叶贊伏願聲聞貝葉感通致桴鼓之和維彼虬枝蓊鬱聽笙簧之奏杜詩陳松夾水奏笙簧命僧看鄱官經卽菁苗會靈官能默運神通護育良苗之稼世尊普施慈惠力宣揚貝葉之文敬憑釋子之䖍誠茲卜良辰之莊謹伏願地茲嘉穀天雨寶花不可思議不可稱量乘此甚除之功德多所饒益多所精進錫予無量之恩休道家看鄱官經寶稼良苗實藉地靈之長育琅函秘典無非天帝之宣揚茲逢良日之丁臨謹以微儀之申禱伏願鋤耰耕種永無蝗螟蟊螣之憂蓄養蕃滋且有狗彘雞豚之畜設三牲保六畜三牲供給無非地利之珍奇六畜蕃滋實藉天庥之覆育滋茲薄禮叩格眞靈伏願牛羊茁壯長而已矣雞豚畜養得其宜哉鴨遂靑頭瑞若桂林富家之盛鵝鮮白羽可酬山陰道士之經經之營之安也樂也商賈類榜文作商保安聚天下之貨僅爲噬嗑之謀流地上之錢實藉乾元之庇謹陳淸醮冀沐洪庥伏願數聲仙梵響時萬靈聳聽一陣妙香散處三界俱臨作商酬神萍梗浮踪惟計蠅頭之利蘋蘩薦禮用酬鴻造之恩伏願龍扆昭垂鸞輿戾止錫我感通之妙鑒予報稱之誠作商遇風波雲水茫茫因泛魚鹽之利風波洶洶可勝鯨吞之憂爰告皇穹許陳淸醮迄遂平安之福敢忘酬賽之誠伏願擁旌旗於虎豹之關不留不處降車駕於龍鸞之殿來享來崇作商求眞武去去征商利甚錐刀之較巍巍法主感如桴鼓之隨謹殫徼福之誠設啟保安之醮伏願五龍顯化弘開皂纛之旌旂九鳳鏘鳴都護玄天之車駕作商酬眞武昔泛萍踪實托鎭天之庇今歸蘅宇敢忘蹐地之恭爰啟芳筵特陳謝禮伏願擁萬騎奔雲之勢啟請眞武咒雙晴掣電伏羣魔萬騎如雲威九地伏魔咒驅電奔雲皂纛來臨顯雙晴掣電之威玄元降鑒作商遇風波還眞武泛輕舟於雲水之邦值馮夷之翻倒濟危楫於風波之域藉玄武之威靈茲命黃冠特陳淸醮伏願金童前擁敞開金闕之旌旂玉女後隨護降玉虛之車駕作商歸平安僧卧雨飱風濫作萍踪之旅望雲就日輒修蒲饌之儀仰報前休俯徼後福伏願上下㝠陽諸菩薩來降道場江河淮海諸眞靈普歆法席同前僧泛宅浮家幸脫鯨波之苦安居樂業敢忘猊座之尊陳焦面之齋饈闡阿難之妙典伏願玉界瓊田之賢聖出離龍宮瑤臺金剎之眞靈來臨蝸室作商遇風波歸酬神僧汎彼柏舟曾致黑風之飄墮許茲蒲饌迄臻慧日之照臨逢茲穀旦之丁臨爰仰靈臺之申謝伏願水神靈感暫離玉界之龍宮佛寶慈悲來闡金山之象教同前僧浮江無際淪胥可嘆於客舟法海有緣登濟得乘於道筏謹修玉饌恭叩金仙伏願蜃樓蛟室之靈通隨緣赴感鳳闕龍庭之佛法應物現形米戶酬神下愚罔利初無貴蓄賤糶之謀上帝好生常有福善禍淫之道謹陳淸醮用報洪休伏願獸爐焚百和之香遍周法界鸞駕擁三淸之御來降塵寰酒戸酬神秫稻必齊記月令惟切淸酤之務蘋蘩可薦敢祈洪造之恩茲卜剛辰特陳醮醴伏願香風馥郁響玉珮於雲間瑞月輝煌來瓊琚於天上鹽舖謝神居龍斷而罔利實資潤下之鹹望鴻造已祈恩庸致由中之悃謹嚴蓬宇肅拜蘂章伏願瞻帝閽於縹緲之宮暫開金鑰來仙仗於通明之殿特致瓊鹽舖謝神孳孳爲利惟資鹽筴之謀翼翼祈恩敬設伊蒲之供謹先昭告冀獲感通伏願八萬四千陀羅尼門門門通達三百五十釋迦法會會會聲聞華嚴經父母爲子作商不歸求神人之愛子難忘久別之思天其相民庸致遂通之感謹邀鶴侣恭奏龍章伏願排雲叶閶闔之間雲輿戾止傾日想通明之殿日表來臨妻爲夫作商不歸夫闈久別莫申尺素之書婦閫載思用啟寸丹之禱俯陳芳醮仰叩圓靈伏願雨花浥九地之塵風地祇肅靜雲葉布三天之瑞藹天帝降臨作商病家人在家建醮行者病於途實切憂危之慮居而安於室敢忘祈禱之誠特命道流敬陳醮醴伏願塵氛肅靜敞開萬里之旌旗瑞藹繽紛祇降九重之車駕商賈類疏語作商建醮保安乘時射利辭家於千里之遙開心見誠呌閽於九重之邃切念恥於兎守謾爾蠅營斯邁斯征爰謀爰度吉涓日月將爲繭足之遊唐劉禹錫誠跋涉風霜實藉洪休之庇謹設保安之醮敬爲徼福之圖伏願愍下民翼翼之祈垂上帝皇皇之鑒行曰商坐曰賈咸無滯貨之深憂爲者疾用者舒大學句常有生財之大道作商還家謝神利者義之和周易句爰致蠅頭之利誠者天之道中庸句敢忘蟻報之誠仰望雲霄俯陳醮謝切念某草茅賤質萍梗浮踪航海舶江惆悵風波之渡車塗軌道間關雨轍之行惟資玉帝之洪休得市金刀之重貨茲逢還家之喜可爲潤屋之欣爰淸蝸舍之塵䖍命羽流之士特陳蘋禮肅拜蘂章伏願萬聖垂慈三淸鑒格汸汸暴暴致丘山河海之財簡簡穰穰錫川阜岡陵之福作商遇風浪歸來謝神昔遇中流曾致呼天之禱今申下悃特陳伏地之恭翼翼酬言勤勤報德切念某泛覓蠅頭之利忽驚鯨波之憂委金軀於風波湧洶之衢置寶貨於雲水抓翻之域惶惑執篙而心醉淪胥舉棹以魂飛爰殫忍死之丹誠用叩再生之洪造果叶鼓桴之應得安舟楫之危茲乃全璧以完歸庸盡啣環而昭答敬邀鶴侣特奏龍章伏願臨照無私鑒觀有在享我獻芹之禮彰予結草之誠以財發身大學句有潤屋潤家之妙道降祥由已獲求田問舍之嘉謀作商許眞武生理無聊將有征行之吉靈光有煒可無祈禱之誠仰叩上眞俯申下悃切念某克家責重潤屋謀疎乃占龜卜之猶欣作蠅營之計載維旅舍慮逢侵侮之驚抑念客舟恐致淪胥之害玉楮之符且增且減金刀之利或滯或通若非邀福於先難何以營謀於後獲謹陳淸醮用格玄元伏願垂槖而往載捆而歸得收微利維車之運汎舟之役俱襲隹祥作商歸酬眞武雨卧風飱嗟逆旅登臨之苦月征日邁藉玄元護佑之恩薄言還歸敢忘報稱切念某糊口四方置身千里遲遲行道深載饑載渴之憂汎汎乘舟并毛詩惟能覆能浮之慮仰托洪休之庇得臻淸吉之祥茲當息肩弛擔之時庸致摩踵結纓之謝謹邀方士恭設醮筵伏願勾消昔許之私特注今酬之字利源洋溢盈於江海之淵源福祉增高固若岡陵之基址作商遇風浪平安回謝玄帝比予小子垂生於魚腹之中惟爾玄元眞武本願經全句救死於鯨波之上俯陳丹悃仰謝靈眞切念某計切肯堂謀深潤屋頃泛巴河之渡忽逢巨浪之驚沃日吞雲翻作彌天之雪號風戰雨激爲殷地之雷舟客關心篙師束手三萬頃瓊田之險爰籲慈悲億千變金闕之尊立彰顯應隨見回頭之岸可尋駐足之津片帆東下以如飛一舸西歸而若濟茲陳淸醮用啟洪休宣揚綠字之文敷奏丹衷之願蘋蘩薦禮豈惟酧嵩岱之洪恩駱賓王葵藿傾誠尙冀獲丘山之財貨作商歸家酬神僧去非有許君子于役詩經句驅馳萬里之遙我佛是依滅度三塗之苦誠陳結草供設伊蒲切念某情竇奔流慾波漲膩頃以戴月擔風之計竟爲乘星犯霧之遊謝靈運文句濟渡浮舟汎汎回頭之岸登塗駕轍滔滔底足之津間關世道之炎涼警省人情之厚薄未知攸濟莫敢或遑茲當返斾之時庸盡啣環之禮闡有緣之法會設無礙之齋筵伏願甘露降祥當見觀音之柳恩波沾惠得乘達摩之蘆凡此營爲多所饒益同前柏舟致貨可嗟波上之謀蓮座垂慈能向水中之救茲遇還歸之日敢忘報稱之誠謹依梁武之成規敬闡釋迦之遺教振雷霆之金鼓警省迷途燦星月之銀缸光照㝠世混融無礙濟度有緣伏願現淸淨身開正覺眼利源洋溢常如寶藏之充盈貨兌懋遷允若法輪之運轉作商遇風浪酬神僧因飛亷漲波上之風曾申祈悃藉我佛現水中之月迄遂感通謹陳焦面之齋饈庸示剖心之報禮切念某魚鹽逐利蝸餌營生還凡集中有此字者皆讀爲旋字歸比泛於長江漂墮如居於巨海掀天白浪幾無可叩之天揭地洪流將人載沉之地欲脫龍淵之難爰呼猊座之尊果蒙皇覺之靈得致淸靈之志濟筏之喜翻爲道筏乘航之險變作慈航於意云何其恩希有茲設㝠陽之會用酬調御之功伏願甘露沾濡慈雲覆護舟行輛運常逢金剛菩薩之護持車載斗量得遇多寶如來之饒益同前人無道筏難免沉溺之危佛有慈航能濟漂流之險謹依金仙之教敬酧寶座之尊切念某蟬蛻寓形蠅營窺利須作浮家之旅欲爲潤屋之謀方欣舟葉之乘風忽致浪花之捲雪盈盈重貨將傾蛟蜃之淵𣺌𣺌幻軀幾塟魚龍之腹爰叩彌陀之主願綏困苦之民隨感焚香若居平地東去快如於航葦西歸疾迅於渡蘆茲陳焦面之齋饈用報覺皇之厚德伏願交易得其所偕逢懽喜如來出入隨所之永遇吉祥菩薩米舖酬神食乃民之命因爲糴糶之謀天惟德是親庸罄精誠之禱切念某安分情深振饑念切素務錐刀之利祗圖升斗之資出入置量或免輕重其手低昂立價能無增減於心速戾予躬伊誰是咎爰瀆圓穹之聽敬陳芳醮之儀伏願赦其不獲已之情寛其自作孽之罪粒米狼戾孟子句廉於唐貞觀之三錢通鑑秋熟米三錢財貨鱗殷積甚陶朱公之萬貫鹽舖酬神俯居人境暫資鹽貨之謀生仰叩帝閽庸設醮儀之致禱誠之爲貴中庸感而遂通切念某雞鳴之務孳孳蝸觸之圖擾擾實藉乾坤之巨庇得爲闤闠之幸民茲拜龍章用酬洪造伏願五行時若豐盈潤下之鹹百順來崇膺受考終之福同前僧人生有漏難忘征利之心佛法無邊常切垂慈之念謹殫誠赤寅叩覺皇切念某流轉湼盤濫居闤闠因市鹽鹹之貨姑爲衣食之謀然癡愛貪嗔或肆人百已千之計而受想行識恐深身三口四之愆恭就蝸居敬投象教伏願尋聲赴感如器内鍠並係經語應物顯形如水中月千金饒益常逢金粟光如來萬寶充盈永遇寶檀華菩薩更冀法輪之運轉散爲陋室之歡娛酒舖酬天酒乃百藥之長因爲待價之沾出論語天者羣神之精禮春官太史句庸盡畏威之敬俯陳芹獻仰奏蘂章切念某秉性惟醇處心甚淡須欲經營而罔利爰求醖釀以謀生然燦爛稻梁或犯皇天之譴薰蒸麯蘖恐千后土之愆沉迷龍斷之弗醒淫湎蠅營而若醉茲建常規之醮載酬乾覆之恩伏願克敬惟親旣往勿咎麴生有味得靑州從事之隹名稚子無賖獲白水眞人之厚息妻爲夫作商不歸念彼槀砧久作无依之旅惟茲荆閫敬殫有感之誠仰叩高明俯申卑悃情信女某切念夫主某計䲭夷利爲子長遊日返月征莫悉鴻鱗之寄風飱雨卧可勝繭足之勞彼在天之涯此居地之角韓文公祭十二郎文未得旋車之喜徒深舉案之思式遵玉匱之文敬叩金門之聽志心皈命稽首祈恩伏願夫志動淵明松徑之思興張翰蓴羹之念不留不處行休轍跡之閒關言還言歸得致刀頭之盟信作商病家人求保安途旅營謀忽致痒疴之苦家人獲報可勝兢戰之憂仰叩皇穹俯申丹悃切念某蠒足千里糊口四方近收動履之書乃冒往來之疾問葯求一時之效尋方得萬世之名雖上下之間未致膏盲之苦而左右之際孰爲心腹之親茲命黃冠特陳淸醮伏願察我豚魚之信周易鑒予蟻蛭之誠處家者居之安在外者病以愈一身已泛因無僕夫沉病之心萬里方回庶有妻子團圓之喜獄訟類榜文爲訟求平安人有公訟可勝下險之憂易經訟卦天無私親爰罄中孚之禱謹陳淸醮用告皇穹伏願金鑰開關獲覩通明之殿玉珂奏韻來臨湫隘之居訟勝酬天昔以訟凶爰叩皇穹而徼福今臻常吉謹陳淸醮以酬恩欲遂感通當先昭告伏願掃退天街之雲翳擁列仙班肅淸地戸之風塵祗迎帝輅爲訟叩玄帝念分爭辨訟之由非禮勿決禮記全句瞻除邪輔正之聖无願不成茲建淸醮之儀用叩玄元之聽伏願鳴鐘擊鼓暫離眞慶之宮走籙飛符來降塵凡之室訟勝酬謝玄帝君子以作事謀始易訟卦訟慮終㐫玄元之降福消災隨臻中吉茲陳淸醮用報洪休伏願皂纛前行開啟瓊關之鑰神鋒後擁降臨金闕之車因橫事求保平安暗裡擠排曾中小人之奸計急中祈禱果蒙大造之洪休卜日償盟望雲致敬伏願香透龍鸞之殿萬聖咸臻聲聞虎豹之關三淸降鑒因橫事平安酬天訟因蔓結難逃縲絏之憂誠切葵傾欲致鼓桴之應謹陳醮禮特報恩休伏願雉扇齊開啟瓊關之鎖鑰龍旂森列迎玉闕之軒車爲訟求佛僧訟以有孚未克有言之吉齋修旡碍能消旡量之災謹露丹忱敬投皇覺伏願十方三界來開陀羅尼門四界萬靈普降混融法會訟勝謝佛速誠以訟可稱窒惕之憂易訟卦有孚窒惕吉與佛有因普門品迄遂感通之應敬皈象教昭答龍天伏願三官垂示望來降之休祥四界光臨蒙普沾之恩澤訟獄類疏語訟了還愿曾因非訟敢投大造之洪休敬禱玄恩能滅小人之深罪謹竭傾葵之志敬申結草之誠俯陳淸醮之微儀仰答皇穹之厚德伏願照臨昭若陟降在茲鑒昔時躡足於公庭非予得已幸今日置身於斯室惟德是依爲訟懇眞武履君子之庭欲質分爭之訟史周紀虞芮二君爭田質西伯故事望玄元之闕敢祈覆護之恩俯𤃉愚忱仰干帝聽切念某抱乂义處禮記庸德之行中庸敬因他姓之侵欺欲致小人於𡨚抑事難休於私室詞因至於公庭雖可云中吉之知然且切終凶之慮謹殫下悃爰叩上眞特邀琳宇之流敬陳玉虛之醮伏願除邪輔正和光同塵道德經無幽不燭無願不成惟余有請爾有枉必申有疑必釋在吾無閒然以闡厥靈用彰其報訟了還眞武速我以訟詩經深惟下險之虞敬吾者榮本傳經神咒爰切上眞之禱果獲輔正除邪之力旋增舉直錯杠之歡刻骨感恩剖心酬德謹設六十分玉虛之醮皈依億萬變金闕之尊伏願絕其雀角之憂鑒此鴻毛之報鎭天治世旣已蒙覆幬於終㐫伏地致恭尙冀錫休祥於後獲爲訟懇仰山險而致訟未明凶吉之由仰之彌高論語爰叩靈康之聖謹控蟻忱而稽首冀消雀角於萌芽切念某艱苦一生畏嚴三尺近以仇讎之釁遽興論訟之端刻木之誓實我之憂甘棠之德伊誰是賴遙想集雲之禱輒申傾日之誠謹卜良辰特陳淸醮伏願東宮洞鑒西殿昭垂決正剖疑俾爾無欺於珥筆酬言報惠誓茲有效於啣環訟勝謝仰山致分爭於官府之間非予之罪望敷惠於堵田之上何神之休鼠爭之訟隨消狐疑之情益決謹酬淸醮用答洪恩伏願仰之彌高洋乎如在舉直錯諸枉已無罣誤之深憂作善降之祥尙冀靈康之錫福爲訟懇佛保安僧人由彼此之兩爭因而有訟佛顯自他之雙照昭若無私謹控一誠敬投三寶切念某閑邪在念忍辱存心豈期狙詐之奸欲致鼠牙之訟雖云中吉然慮終凶踐履公庭如蹈天堂之荆𣗥思惟囚室若居地獄之刀山誌公長詩天堂路上生荆𣗥地獄門前滑似油爰陳焦面之齋庸闡世尊之教伏願敷陳玉相解釋金吒遇宰官身特𢌿神明之判斷行菩薩道俾承圓滿之因緣訟勝謝佛僧乖違互訟已慚忍辱之仙休咎兩明實藉垂慈之佛謹淸蓬宇恭謝蓮臺切念某身處𨶒浮心存平等頃以角牙之擾深爲骨肉之憂雖我得無諍似可致休洪福然人或有故必期委質於公庭載惟窒惕之憂尤切受誣之慮爰盡丹衷之悃敬投覺皇之尊果沐洪休獲臻淸靜兹致瓊英之報恭陳玉饌之齋伏願𢌿萬種吉祥救一切苦厄昭昭慧日鑒予畫地之願言郁郁慈雲庇我釋天之覆護因横事求保安吾無加諸人遽若無辜之地人有急於我爰呼有感之天上𥸤洪恩下祈淸脫切念某誠存暗室氣攝公庭近因蔓及之奸妄報株連之罪胥吏追擾殆難頃刻之逃生官守震驚若易須臾之置死繩繩魚貫凜凜虎噬不惟深桎梏之憂抑且費苞苴之賄謹延鶴侣恭拜龍章伏願昭德益謙明威洞鑑設心用倖俾之自極於刑囚遠害全身庶得悉臻於法理因橫事脫身酬神小人無忌憚之心誣執以罪大道有含洪之德乃降之祥在天星日之昭垂於地風波之頓息雖曰致千金之費幸得逃三尺之刑爰卜良辰恭酬淸醮用報皇穹之德少堅白水之盟伏願昭作善之明威顯罰奸之號令何所禱也旣已消意外之憂還以事之俾爾速目前之報因橫事求保安僧災罹非橫將爲狴獄之胥心啟慈悲庸叩龍華之會切念某爰居爰處不受不貪豈期棘險之奸妄肆株連之害追迫可如於猛虎纍囚慘若於貫魚嗟嗟法網之傾危惻惻刑章之誣誤雖讒毁入惡暫疑曾子之殺人然縲絏致憂安得晏嬰之知我庸闡釋迦之教敬陳焦面之齋伏願現宰官身垂正覺眼無是作無是報龍居士句庶幾還看於本人觀音經有其因有其緣俾得辨明於自己橫事後謝保安僧幸出無辜盟誓遽違於刻木聲聞有感齋饈庸設於伊蒲果蒙示現宰官身觀音經遂得載申淸淨願坐囚者釋然解脫居家者由是團圞謹依蓮座之尊用設桑門之饌伏願慈雲覆護永除人我之兩爭慧日光明普顯自他之雙照不可思議其功德速令滿足於希求因橫事淸脫酬天君子無所爭素得謙恭之理小人窮斯濫上論遽貽詿誤之憂駸駸虎穴之傾危惻測蟻封之旋折爰殫方悃恭叩圓穹非惟祈賤臣鄒衍之霜且欲致御史眞卿之雨夫何胥吏已成曲斷之文縱以明威莫救枉𡨚之苦胡甯忍此歸去來兮謹仗黃冠特陳淸醮于以效獻芹之禮聊以報結草之誠昔謂斯何今謂斯何韓文句旣已受非辜之厄出乎爾者反乎爾者願果彰速報之司充約保懇平安在鄉執約但祈桑梓之安望闕攄誠庸致蘋蘩之薦露申素願日冀洪休切念某甕牖以居石田是守未了癡兒之事濫爲里正之名然東鄰西鄰或有東西之警而南道北道豈無南北之虞是曰重難不容輕易爰命黃冠之士特陳淸醮之儀焚爇微妙香宣揚秘甯典伏願昭顯好生之德鑒觀昧死之誠族黨門閭俱賴萬間之庇康甯富夀咸臻五福之終約保滿謝平安官有公文因有三年之役天無私照乃無一日之虞以謝以祈誠惶誠恐切念某居八九椽之罄室守三四畝之石田比因縣宰之符伏領黑胥之篆壈壈不勝之懼𩹷𩹷罔惻之憂爰啟丹衷許陳淸醮果沐護持之賜迄增圓滿之時爰建皇壇肅申素悃伏願上昭顯赫下濟光明往往來來花邑已逃於虎政終終至至蓬居尙冀於鴻恩充約保懇平安僧役色難勝實切關心之慮慈悲有感庸陳焦面之齋俯冀洪休仰投皇覺切念某塵縈業重煩惱根深須因邑宰之文濫主劇都之保科歛追呼之是懼寇擾奸宄之爲憂互鄉之童將不保其往也達巷之黨恐有甚於斯焉上論雖云存上下之分曰正曰副然欲致始終之惠可信可疑謹命苾蒭僧敬設伊蒲供伏願運淸淨於二十五輪之内成吉祥於三百六旬之間四維之南北東西常藉龍神而護佑九井之門閭族黨咸無鼠耗以驚虞充約保滿酬神僧昔爲里役幸逢解篆之時今仰世尊庸致啣環之謝啟混融之法會結歡喜之良緣切念某置體𨶒浮傾心圓覺須作劇都之保實爲私室之憂戰戰兢兢如日履氷往往來來以刻爲𡻕欲致鄉閭之吉特陳水陸之齋果蒙調御之功迄了癡兒之事茲淸蓬宇敬設蘭筵召有感之靈通啟無遮之佛事作念如此姑少酬嵩岱之洪恩於意云何尙冀錫岡陵之厚福充約保許朝山還愿役色繁難䖍許宜春之朝覲誠心懇禱迄臻廣厦之帡幪鄉閭無叵測之憂虞官府絕不勝之追擾恩深刻骨感極籍膺茲當解篆之餘庸盡啣環之報敬往集雲而申禮特殫望日以寅恭伏願察其結草之誠鑒以獻芹之意至於王所姑少酬前日之恩仰止高山更冀錫方來之福爲訟許朝山酬愿居縲絏之中實切高山之仰降災祥於下庸殫卑悃之祈許陳遠覲之誠冀脫近憂之厄隨有感通之妙迄無詿誤之愁當茲穀旦以丁臨敬禮楓宸而申謁辭家百里來爲蟻蛭以酬恩趨陛九重願錫鴻龎而孚惠水火類榜文祈免水氾春江浩浩方當氾濫之時廬屋渠渠恐致懷襄之苦爰陳淸醮用告皇穹伏願水國玄㝠駕靑龍而降鑒天京眞宰控丹鳳以來臨水退後酬謝昔叩圓靈冀滅洪流之害今陳芳醮用殫白水之盟願上帝之降臨祈玄㝠之來格享我潢汙之薦鑒予精潔之誠祈免水泛僧嗟洪流之昏墊將入蓬居闡象教之祈禳敬修蒲饌謹布靑詞而昭告尙冀皇覺以鑒知伏願馮夷馭波上之風來歆法席我佛現水中之月普降道場水退後酬還僧念馮夷東漲之時會申祈懇藉我佛西來之力迄遂平安茲涓蓬宇之塵敬設桑門之饌伏願十方菩薩祗迎玉象之市三界導師下展金獅之座李白詩黃金獅子承高座白玉塵尾談重玄押綱祈水僧捧檄部綱適遇洪流之淸淺肆筵設席敬投皇覺之慈悲謹修露布之情冀達風聞之聽伏願三界佛三世佛佛佛降臨四空天四禪天天天洞鑒押綱祈水執公文而董餉正艱束楚之流望私意以祈恩庸盡獻芹之禮俯陳淸醮仰叩皇穹伏願出隊仗於龍宮神其變化來軒車於鳳閣昭若感通祈水文孝廟千艘氾水可勝淸淺之憂一棹迎風敢藉昭明之力俯陳芳醮仰冀沐休謹殫翼翼之誠敢叩皇皇之聽伏願來龍馭於華山之上望之儼然漲鯨波於長江之間保其往也押綱祈水龍王廟水之性可停可行古詩句適際淺流之害龍之靈能變能化敢祈深溢之恩恭修大醮特展微忱伏願馮夷翳其備降川后繽兮並迎贊襄由地之功敷顯在天之瑞作商祈水亦汎其流詩經欲致千金之貨誕登於岸實資一水之功謹命黃冠特陳淸醮伏願馮夷顯化發施潤下之洪流至聖垂慈式副由中之丹悃作商祈水僧柏舟致貨適逢淸淺之流蓮座垂慈庸盡丹衷之禱謹先昭告欲遂感通伏願沿江水際之萬靈來崇勝會恒河沙數之諸佛普降芳筵預禳火厄火自家人實切徙薪之慮患防旣濟庸申藴藻之誠肇建皇壇特陳淸醮伏願炳炳耀蒼龍之駕其來焚如鏘鏘鳴丹鳳之車于然戾止方境同禳火鄉里通用桑梓爲鄰旣失未然之慮枌榆結社敢忘將熾之憂爰命黃冠特陳淸醮伏願鞭赤騎於丙丁之域回祿降臨駕靑龍於壬癸之方玄㝠來格被火後謝神鄭火旣燃已致萬家之爇秦灰將冷載營一室之居庸申伏地之丹忱特建謝天之淸醮伏願玉宸敷感金闕昭垂鑒觀翼翼之心消泯炎炎之禍因火許醮得免後還徹地爭光將及池魚之禍呼天致禱迄安燕厦之危敬陳淸醮之微儀用報赤精之厚德謹因昭告遂望感通伏願滿瓊樓玉宇之香遍周法界盡金闕瑤宫之聖普降塵寰預禳火厄祈眞武風煽火燃恐致丙丁之厄煙消灰冷敢祈壬癸之靈建茲玄壇特陳淸醮伏願五千萬神明之從森列雲衢八十二顯化之眞來臨氷室火後酬還眞武南方熒惑遽興煙燄之漲天北極靈眞能致火光之入地玄帝有消火咒曰爲報宋無忌火光速入地家有壬癸神曰供萬斛水謹酬淸醮昭答玄元伏願擊鼓鳴鐘出降遊行之步指罡步斗來崇瞻禮之誠作商遇火歸家酬天昔因寓蹟於他鄉遽驚回祿今喜息肩於故里庸報皇穹肅啟芳筵敬陳大醮伏願十極高眞垂應可三淸上聖來證盟鑒予結草之誠享我獻芹之禮預禳火厄僧火無常性可勝焚爇之憂佛有慧心庸致薰修之禱啟㝠陽會設混融齋伏願盡虛空界一切眾生普同濟度遍圓覺境諸上菩薩咸賜證盟火後酬神僧熒惑無常遽稔鬱攸之禍如來有感迄臻淸淨之光茲陳蒲饌之微儀用報蓮臺之上士伏願四果四向阿羅漢出駕象車萬德萬行佛陁尊降臨獅座火後建佛事謝天魚次蓬居旣蹈及焚之禍龍團蓮座庸舒獲罪之尤宣演梵音鋪陳妙饌伏願護法護教摩訶薩森列旛幢救苦救難彌陀尊降臨車駕水火類疏語禳水建醮洚水儆予下孟實切橫波之慮皇天生我天童經庸申行潦之誠載懇載示夀以襘以禳切念某善淵壅窒苦海沉淪近因雨水之淋淫爰漲風波之汎濫茫茫滾滾已迷楊柳之津泯泯悠悠將至蓬茅之室未知攸止莫敢或遑謹殫淸白之誠敬設潢汙之薦伏願玉宸至聖金闕高眞憫予昏墊之憂鑒我朝宗之禮勢則然也母爲溪澗之能留唐宣宗初出家爲僧與黃蘖禪師觀瀑布泉聯句云溪澗豈能留得住終歸大海作波濤逝者如斯上論若決江河之莫禦上孟水後酬天汎濫其流曾許潢汙之薦沐浴以事庸酬洪覆之恩切念某汨沒利源淪胥慾海傾以柴門之漲深爲蓬戸之憂爰呼上帝之鑒觀欲脫下民之昏執土禱之也切感而遂通並陳芳醮之儀用報圓靈之德伏願三淸昭格萬聖垂慈決而注之永絕懷襄之洶湧與其潔也尙祈潤澤之靈長預禳水厄僧苦雨淋淫遽稔懷襄之苦慈雲覆護敢祈滅度之慈繞足傾誠洗心致敬切念某四緣溟涬六慾瀾趨近因行潦之瀰漫爰極橫流之氾濫桑麻隴上巳興平地之波楊柳堤邊但見連天之浪浩浩入回頭之岸茫茫迷着脚之津如是憂危作何方便謹率比丘之眾敬修梁武之齋伏願紅日照臨釋風震盪吸盡西江之水無碍無障化爲東海之漚不生不滅水後酬天僧江流汎濫旣安潤下之常性覺圓明爰致由中之悃迄遂梵天之感應得免平地之懷襄翠柳岸邊再覩觀音之柳黃蘆洲畔復瞻達摩之蘆並陳潢汙沼沚之誠敬設淸淨㝠陽之會闡阿難之遺教遵梁武之成規於以彰吸江水之神通於以報恒河沙之功德伏願與人無間敞開慈悲方便門度我有緣洗滌塵勞願濟海大悲咒啟請部綱祈水僧董柏舟之重役難爲罔水之行書經罔水行舟望蓮座之洪慈敢冀餘波之惠切念某職謹司存檄輸綱運奈潢潦方除之際正涯涘乃見之時自顧江橫莫致渡蘆之計誰謂河廣可爲杭葦之謀爰陳玉饌之儀用叩金仙之教伏願洒法雨於三千之世漲靈泉於十八之灘東列詩亦汎其流毛詩如入功德池内載登彼岸似超苦惱海中部綱祈水馮夷歛氾難令舟楫之通洪造垂慈易致鼓桴之應洗心皈敬潔己祈恩切念某職任一家憂懷私室近奉黃堂之檄獨輸白粲之綱願膽江上之綿流豈堪載重抑念河中之帶水僅可浮輕實切我憂莫安敬止傾日望龍鑾之闕排雲叶虎豹之關喜穀旦之丁臨致醮筵以申禱何其信也幸鑒予潢汙沼沚之儀時而出之遂錫我溥博淵泉之惠部綱祈水龍王廟鴻濤消泯莫施埋楫之功龍德精剛能致浮舟之利誠殫虛室恭叩神淵曹植七啟觀遊龍於神淵切念某濫居官吏之名欲了癡兒之事山谷快閣詩痴兒欲了公家事近因被檄爰責部綱柰河蓄淺流未見㾗㾗之涯涘而江存杯水何殊淺淺之潢汙戰兢實切於履氷稽緩且憂於玩日爰盡㝠心之醮敢祈驤首之靈伏願躍翻雲漢之波漲作瓊田之浪萬艘東下載揚去棹以連梢一舸西還行弄歸船之長笛祈水文孝廟嗟王事之鞅掌毛詩註鞅掌勞煩之壯難行罔水之舟望帝德之昭明能濟浮波之楫俯陳琅腹仰叩玉關切念某素守私室之憂欲了公家之事近捧一麾之檄爰司萬斛之艘載問諸濱左傳君其問諸水濱若際溪毛之凋落誕登於岸徒瞻江面以徘徊逝者如斯夫不保其往也論語庸盡潢汙之薦敬陳淸醮之儀伏願振統臨川后之權顯掌握馮夷之柄聽而弗聞視而弗見中庸如在其秋浦之間文孝皇帝廣食湘州州日秋浦窮之益遠測之益深維問道篇若彼春江之内作商行船祈水僧汎舟之役可嗟朿楚之不流並毛詩濟楫之通爰設伊蒲之載驅頂禮佛足敷露愚衷切念某志切肥家謀深潤屋茲欲致淵源之利其敢忘江海之功柰何潦盡而潭淸方且水落而石出乘風以往旣無杯渡之緣杯渡見高僧傳淩空而行庸有飛錫之德同上實切淺流之嘆深惟滯貨之憂茲陳焦面之齋用叩彌陀之主伏願借圓覺海中之洪澤漲作川增俾娑婆世上之蒼生得沾河潤作商祈水淺淺淸流莫致浮江之利回回洪覆束晢補亡詩庸殫宗海之誠書禹貢註江漢朝宗於海肅啟蘭筵特申蘋禮切念某棲茲萍梗汎彼柏舟柰何罔水之時徒切望洋之嘆治裝束擔徘徊於靑草渡頭繫纜停篙艤住於綠楊岸上未知攸濟敢曰遑安庸陳淸醮之儀用叩皇穹之德伏願三界高眞垂印可十方靈寶作証盟鑒予淸白之心享我潢汙之薦施銀漢瑤池之潤澤誰能禦之上孟漲瓊田玉界之波氵夀玉界瓊田三萬頃着我扁舟一葉予其往矣禳火災禳火於未燃之頃將恐自焚𥸤天於未言之間敢忘至敬切念某心炎益盛慾熾彌昏近瞻熒惑之呈祥恐致祝融之扇禍於以致燕厦薰如之慮抑亦爲池魚殃及之防謹卜剛辰特陳醮禮伏願錫我鈞陶之賜鑒予塗炭之憂乾澤混涵潛弭飛燄之烈燄離用照耀散爲瑞日之祥光方境禳火建醮抱火未然實切比鄰之憂慮遇灾必懼敢爲鄉黨之祈禱俯陳玉瓚之儀左傳昭公十七年裨竈言於子產曰宋衞陳鄭將同日火若我用瓘斚玉瓚鄭必不火子產不與仰叩金門之聽切念某蠅營以處鱗次而居載觀罔市之氓忽致燎原之禍衡宇付燭天之燄貲囊爲燼地之灰惟炊煙百竈之小團荷淩雨萬間之大庇曰己安矣猶恐失之吾愛吾廬忽致焚廬而有禍爾由爾室具深赭室之無憂爰同桑梓之誠聊盡蘋蘩之禮伏願收烈燄於南道北道散祥光於東家西家宿之彌壯用之彌明楊子問道篇旣得其性閭而相受聯而相保毋以乃心誓爲闤闠之幸民昭答乾坤之厚德火後謝天昔因鄰室之鬱攸載先申禱今仰帝閽之報稱敢後寅恭切念某心火炎炎慾塵擾擾近以桑梓徙薪之失深惟蘅茅延蔓之憂徹地朱光將入已然之地漲天紅熖幾無可叩之天雖厪撲滅之勞爰致𥸤呼之請感德迄安於夏屋酬恩實愧於魯皋茲陳芳醮之儀用叩圓穹之聽伏願三淸上聖六御高眞錫予蓬蓽之休鑒我蘋蘩之禮南離熒惑常逢退三舍之居北坎玄㝠永興滅萬家之爇客中遇火歸家酬天覊旅營謀方熏浮梗之嘆鬱攸震怒遽爲行李之驚一閧之市焚如萬家之灾甚矣雖爛額焦頭可爲上客然拜手稽首當罄下愚爰呼洪覆之天迄在載安之地茲得還歸之喜敢忘報稱之誠敬仗黃冠特陳淸醮獻花酌水姑少酬旣往之恩休抱火積薪常願滅未燃之憂患火後酬謝天地降灾以火可勝延蔓之嗟獲罪於天上論當效負荆之請徹忘昧死庸叩好生切念某善蔑一二過盈百千傾以妖興於社鳥遽茲殃及於池魚雖焦頭爛額之紛如然疾首痛心之益甚果致萬家之爇莫逃一室之危豈其汨汨於欲波玄㝠忘助抑亦炎炎於心火回祿肆威茲當旣燼之餘幸得載安之喜謹陳淸醮用叩皇穹伏願克敬惟親旣往不咎鑒臣䖍恭之禱納臣悔露之悰錫穰穰簡簡之休敷爲陰隲尙書惟天陰隲下民收赫赫煌煌之熖散作陽明預禳火厄玄帝熒惑煌煌恐致方萌之禍神君杳杳祈消一爇之灾謹露丹衷敬皈玄武切念某善根旣斬罪苦益張近觀邇室之鬱攸實切吾廬之憂慮載念寢薪之上因謂之安深惟執爨之餘或發於密尙書大傳火營於密爰致玉虛之醮謹投金闕之尊伏願感通若李惟信之時顯應如宋無忌之咒眞君有消火咒曰爲報宋無忌火光速入地家有壬癸神曰供萬斛水氛妖削迹常瞻靈德於光天水位儲精永使火光之入地火後酬謝玄帝火爇羣居可嘆赤精之煽禍水供萬斛立彰玄武之垂慈謹殫方寸之誠敬效錙銖之報切念某比因回祿殃及池魚疾首痛心旣有寇攘之刼焦頭爛額且無撲滅之功爰叩北極之眞靈願熄南方之熒惑盟言纔起烈熖已消謹陳淸醮之儀昭答洪恩之賜伏願玉虛昭若金甲儼然禮吾者夀奉吾者生敢忘瞻敬俾爾而昌俾爾而熾永賴帡幪禳謝火厄僧思南方熒惑之鬱攸不可嚮邇叩西域世尊而祈禱欲遂感通切念某塵世皇皇愛河汨汨載念燎原之勢深爲赭室之憂況患宜君子之防且貽後慮而火自家人之出當效先知爰殫精白之誠用叩覺皇之主修設金山妙供宣揚寶藏靈文伏願借功德池涓滴之恩滅煩惱燄現淸涼山圓明之照垂知慧觀度有緣人施無畏力火後酬謝僧塵緣有漏旣驚回祿之焚惔罪障無邊庸叩如來之申禱切念某凡籠縶跡業網囚身比因積爨之由遽適燎原之患屋廬煨燼但瞻依蓋之天囊槖空虛僅得立錐之地信在己之愆昭著宜焦頭之禍鬱攸茲營旣爇之區爰理載安之室謹陳玉饌用叩金仙伏願護念興慈垂哀作證一切灾殃之事化作微塵萬種吉祥之因融爲錫羨同前僧赤精煽燄將爲一室之焚皇覺垂慈能救三途之苦謹陳妙供用報眞休切念寄跡塵寰置身火宅傾以漲天之燄遽彰徹地之光飛廉加助桀之威殆將灼我顓帝失救焚之力實切儆予爰殫哀籲之誠用叩慈悲之主欲借東海觀音之法雨冀消南方熒惑之飛煙果沛洪恩迄臻淸淨茲設金仙之饌敬酬寶相之尊於以申結草之忱於以效獻芹之禮伏願巍巍蓮座現月明水上之光永永蓬居絕煙滅灰飛之幻圓覺經云譬如鑽火兩木相因火出木盡灰飛煙滅以幻修身亦復如是諸幻雖盡不入斷滅重刋道藏輯要心香妙語卷之二終
