front:
  text: 心香妙語重刋道藏輯要心香妙語卷之一
  hash: sha256:0ffac3117cbdf4a26ea8c32a75c76cfd3f1eb4a088b81c46b8588e213a4dc433
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_03p001a}
body:
  text: 綿竹退隱陳復烜含樸校輯嗣派徒張軫駐參閱本雲趙龢芳姪徒王本崇雲瑞派徒孫江合義體仁馬合乾徤堂姪徒孫鄧合順希襄門人蔣本遂繼順慶祝類太上老君二月十五日伏以仲春恊序丁臨月望之辰中夏懽騰申慶日晶之瑞地祥芝草天雨寶花適際良辰恭陳慶賀今據大淸國某省某府某州某縣某地分居住人民集會奉道陳情慶祝華齡延祥介福保泰信某通洎合會奏名人等是日香焚螭鼎意注龍樓百拜攄誠一心皈命恭惟泰淸仙境混元上德皇帝降生天尊玉几下金液鍊形淸淨經玉英孕秀得一二三生生之藴道德經顯八十一化化之靈啟聖集以本爲精以物爲祖其往無崖其來無迹德而不德玄之又玄道德經某等夙逢假幸之恩獲遇眞元之節老君誕日爲眞元節出藏經俯獻蟻罇而爲夀仰瞻鳳闕以馳神伏願七百年不汗之枝枝枝茂蔭洞玄記人病則玉枝汗人死則玉枝折老子七百年不折億萬載難窮之刦刦刦長存玄風丕振於當年聖化昭明於後世某等永荷眞光長依法教誠惶誠恐稽首頓首再拜謹疏其二倣前式伏以靑陽開動載臨二月之中白鹿儲祥誕降五雲之内殷芸小記鹿胎呈祥老子生焉慶均下土瑞藹上穹今據大淸國云云恭惟太上云云入眾妙門知萬物理道德經養性於常淸常靜之域觀心於非空非色之間淸靜經化身於北方玄武之君顯跡示西國釋迦之主如如居士語錄運而無積杳若難言恍兮惚兮有象兮道德經至矣盡矣蔑加矣某等深慮虎關之阻莫申燕賀之儀晏啟瑤池但緬想蟠桃之結實尊居玉闕願常瞻仙李之盤根伏願接前玉帝正月初九日或先具職亦可伏以鳳暦初頒已屆上旬之九日龍庭新屆永饗大地之微誠三千朱闕之眞仙簪冠舞蹈十二碧城之至聖袍笏嵩呼盡此蟻忱恭申燕賀今據大淸國某省某府某州某縣某地分人民集會奉聖投詞舒誠慶祝迎祥信民通暨合會奏名人等維曰洒掃凡居裝嚴法席繡幟攢珠綰就蘭林之勝纓房貼錦鋪陳香院之奇細縷裊氤氲香焚柏子餘芬飄靉靆酒泛葡萄五體投誠一心皈命恭惟萬天至尊金闕玉皇上帝玉陛下道化眞常神通恢漠光明廓落達空空妙有之音淸淨虛靈得寂寂無宗之藴建大功於億刦總玄範於十方並玉皇寶誥某等幸際誕彌獲申稱賀塵寰𣺌若恨莫覩虎豹之關香案巍然但緬想龍鸞之表一封朝奏萬福雲臻某等誠惶誠恐稽首頓首再拜謹疏頭具職則改謹表眞武三月初三日伏以氣孕先天在龍漢元年之日祥分初度正開皇上已之辰凡屬帡幪咸申舞蹈今據大淸國云云奉道投詞慶祝華辰請迎福佑保泰信民通洎云云是日香焚寶鼎酒泛金巵望玉虛以陳言叩金闕而舞拜恭惟玉虛師相北方眞武玄天上帝闕下躬全道德姿挺神明捨靜樂富貴之宮入武當淸虛之境參七九返還之旨究十三生死之因出傳道某并道德經運坎離而伏龜蛇鍊庚甲而降龍虎上眞實錄啟天關飛地軸天地由心退陰火進陽符陰陽在手幾年功行一片身心丹道旣成羣魔自服運靈旗以覆護兆姓持慧劍而鎭壓四方使眾生能捨妄以歸眞則陛下與同因而證果頓舉世沉淪而莫返故神功顯化以無窮凡在皈崇自蒙解悟某等夙生慶幸得奉威靈茲逢嶽降之期敢後嵩呼之祝伏願三元共永豈惟變八十二化身億刦長存夀何止六百億萬𡻕眷佑黎民同登夀域謹疏其二倣前式伏以月正三三正西母啟瑤池之會嵩呼萬萬喜北方降金闕之尊中夏懽騰外夷起敬今據同前大淸國云云恭惟祖師萬法教主玄天上帝玉闕下道成離坎功宰乾坤分身九極之華化氣五雲之内備太始太初之體並上眞經修妙緣妙果之因玄帝報恩經龜附蛇從龍降虎伏仗寶劍而凝霜揮雪擁皂旗而掣電奔雲獨居星拱之旻坐鎭雷同之域某等福蒙有素恩報無涯幸逢穀旦之丁臨庸盡芹誠而申獻伏願祥開夢日瑞日之照同久長精貫玄天後天之數與終始云云釋迦佛四月初八日伏以東郊薦靑帝之歸侵尋八日西天慶釋迦之誕俯降九霄瑞藹梵天懽騰易地今據大淸國云云奉佛獻供祝夀邀祥信某維日香焚金鼎結寶蓋於鷲頭峰上燈燦銀臺放華光於鷄足山中仰冀能仁克昭悃愊恭惟南無三界大師四生慈父釋迦牟尼文佛蓮座下入神通藏元覺經生剎利家吼聞獅子之聲行顯龍翔之步修妙行於鬱頭藍處說道果於鹿野苑中諦明有漏之因遂作無當之偈迦葉祖獲傳心印阿育王受記浮屠七多羅樹益增高四諦法輪當運轉仰瞻皇覺得際淸朝輙申燕賀之儀庸表蟻忱之至伏願現形淨土咸瞻寶塔之身示寂雙林永著金棺之足傳燈錄釋迦入湼盤迦葉至雙林哀泣釋迦佛於金棺内現雙足其二倣前式伏以麥秀兩歧正炎帝乘離之月蓂敷八莢適釋迦降誕之辰諸佛和南眾眞稽首恭惟南無千百億化身本師釋迦牟尼文佛性便寂滅智運光明化身於剎利之宮悟意於淨居之牖遂得出家之藴已酬入嶺之因依種種明元覺經學非非想說三百五十一會之妙法運四千八萬座之浮屠阿育王記茂彰西國之靈普度南𨶒之眾某等素沐慈庥之庇獲逢令旦之辰庸集同盟特陳淸供在周降誕但思想不見之常星阿羅含經佛生於周莊王七年癸巳𡻕四月初八日常星不見於國無疆願長庇相輝之慧日謹疏阿彌陀佛十二月十七日伏以五花梅綻乃王正建子之辰兩莢蓂飄正皇覺誕生之日諸天起教易地皈依今據大淸國云云維日焚香𤊔燭酌水敲氷瞻中天之玉相禮西國之金仙誠惶誠恐和南百拜恭惟南無西方極樂世界阿彌陀佛蓮下願力弘深神通廣博種菩提子於娑婆境上駕般若船於寂滅海中人我無諍自他有耀建七寶浮屠之功德統三乘達摩之因緣某等旣沐鴻庥幸逢華誕謹陳菲供敬祝遐齡伏願不增不減生生不壞金剛身常淸常淨世世常行菩薩道永藉帡幪不可思議謹疏觀音菩薩六月十九日伏以炎官南去僅踰莢日之間淨聖西來誕降五雲之内天開華誕地降靈芝望南崖而俯首仰西竺以傾心謹露愚情冒干慈鑒據云云維日金瓶花豔寶鼎香飄發一念之䖍誠祈千目而鑒盼恭惟南無大悲觀世音菩薩蓮下興大悲心垂正覺眼相顯蓮花之白手持楊柳之靑泛慈航於寂滅海中種善果於湼盤山上植立無爲之舍廣開方便之門并出觀音經某等敬誦鴻名特申燕賀伏願旃檀樹下常浮解脫知見之香紫竹林中普現眞如微妙之色十二願中常垂接引三千界内永沐慈光謹疏其二倣前式同日伏以南方催赤帝之歸素秋在卽西海慶白衣之降諸夏咸欣雲葉呈祥雨花散瑞今據云云恭惟南海岸上慈悲觀世音菩薩具神通力廣智慧觀度億萬眾生修百千三昧聲聞靈感妙音梵音海潮音觀音經心起慈悲滿願倖願淸淨願光顯圓明之照誓成正覺之因某等久慕眞庥幸逢令節莫盡讚揚之力輙申朝賀之儀伏願翠豔柳眉長映瓶中之柳紅舒蓮相常敷座上之蓮如前接定光佛正月初六日伏以春肇三陽正太皞執規之月夏正六日喜定光降瑞之辰百靈胥慶諸佛交歡據大淸國云云奉佛獻供祈福迎祥某維日謹爇檀煙拜投蓮座恭惟南無人天教主調御丈夫定光古佛孤明通聖寂滅悟空吉郡傳衣顯著鳳洲之跡臨汀飛錫驅除蟻寇之鋒修行萬刦之因成就一切之義某等福沾有永恩報無窮茲逢彌誕之時庸慶慈悲之相伏願參禪圓淨茂彰西峰古剎之靈教演覺皇永度南𨶒浮提之眾謹疏東嶽三月二十八日伏以紫氣映千門共進霞觴之祝彩雲呈五色齊來嵩嶽之呼肅此民情冒干帝聽今據大淸國云云維日心端容肅茶熟香淸迺頫顖以投誠敬曲躬而拜舞恭惟中界至尊東嶽齊天大生仁聖帝陛下高居震位四嶽帝共仰裁成職統臣僚左右班各司善惡威固嚴於冥府恩由及於人間赦過而解厄消災樂蒙淸泰錄功而延齡錫福尤慶裁培眾等久沐洪庥無從申敬茲逢聖誕三薰三沐喜祝三千𡻕不老春秋特展愚誠千叩千靈願享千萬年太平禋祀伏願夀身因而夀世任是農工商賈永沐庥嘉福國因以福民憑他老幼賢愚長叨眷庇年年此日念切謳歌𡻕𡻕今朝歡騰聖座頓首謹疏其二南郊迎景尙遲二日之期東岱降臨誕降千年之瑞祥浮碧落淸遇黃河恭惟東嶽齊天大帝四嶽所宗萬民之主仁符震動播揚發育之仁德體陽明彰著昭臨之德舍作威作福之柄操注生注死之權某幸際昌辰得陳賀禮岩瞻地遠恨不爲孔子之登夀與天齊願特誦韓公之句仰山東殿五月初六日伏以仰止高山素盡傾葵之志誕彌厥日喜踰採艾之辰瑞溢南洲祥浮東殿據云云恭惟佑德顯烈仁聖靈濟王神望有靈頓令沉疴立起感恩曷極聊抒一滴之誠以惠靡涯並錫合家之吉凡情不盡睿鑒惟昭中元施食岳士智秋日譜商音悲調灑荒郊之淚中元臨皎月淸光徹長夜之天言念某未能事人焉能事鬼惟體大士化身用矢牛坡施食食庶幾飮庶幾匪曰嘉賓之貺饘於斯粥於斯願嘗小人之羹雖去年此日已抒鄙念於黃冠而今夕良宵再拔幽魂於黑壤伏願法路宏開箇箇孤靈齊効順慈航廣駕村村燐火盡皈依自此陰陽和暢從今民物滋豐爲爭渡溺死施食梅信天先生公諱之煥七省絕略雨昏大麓潮打孤城纔驚捲地排空遂致浮家泛宅馮夷窟裡誰招湘水之魂白骨河邊猶入春閨之夢落日妖蛟哭煙迷桃葉渡頭秋風宿雁團月冷蓼花灘上故山何處望一水牽愁滯魄幾時歸大江東去雖屬毒龍爲祟寔緣同業所招敬仗眞言爲爾說法愛河苦海陸沉豈必洪濤寶筏慈航當下卽成彼岸倘能滌慮便是回頭若猶作厲煩𡨚轉入黑風鬼國長天秋水映河燈萬點寒星響葉吟蛩助梵唄一溪幽籟聞經聽法悟同缽裡之潭龍作楫爲霖澍舞江邊之石燕其二梅信天汀洲容易平消爭渡有何急迫覆轍仍蹈覆轍後人復哀後人非屬往因卽關定業縱起河邊之骨難招湘水之魂聞溺水者坐水牢冥府必無此律皆緣情識結成欲脫身者尋替身他人抑又何辜祇令業𡨚增重迷則波生平地愛河慾海卽是鬼國黑風醒則思出污泥巨漫洪濤當下慈航彼岸但受過去報正藉大浪淘沙莫結未來因好趁氷壺作魄今令節中元之日正盂蘭普濟之期體烏尤八定之心渡白骨相撐之眾芙蓉殿上明珠映明月之交輝貝葉聲中金錫隨金風而振響喚起遊魂滯魄休依魚腹爲家請看秋水長天好向鷺峰作証祈雨告文梅信天上帝好生不愆雨暘之候下民多故時干天地之和年來憂旱憂虫皆由自作自受願災傷止以示警而憔悴易於見蘇乃今是穮音標是蔉音袞之時又亟雨玉雨金之望亡將無日急乃呼天雖眾生之孽實然諒造物之心不忍廻羲和之轡只在片時投玉女之瓶止須一滴惟於呼吸之頃便是生死之關短短秧針懨懨焦土麥價增舊苗絕懷新要得一舞商羊所冀羣翔石燕桔𣘶窮日力難補天工荳花說年豐敢忘帝力生子酬願衣冠世冑忠厚人家讀聖賢取義之書能窺大意承宗祖秉禮之訓惟有小心乃馬齒加長而熊夢初叶窮愁頓釋眉頭之鎖自開色笑堪憐眼内之靑不轉宗祀庶乎有托彌深䑛犢之情高堂於以承歡差慰含飴之願何德以致此惟神其佑諸關帝疏奏爲大淸國云云聖投詞慶祝華辰請迎福佑迎祥信某維日上干聖聽伏以垂金柳綠紫霞映玉液之光燦錦榴紅赤子表丹心之獻宏開夀域永慶昌期恭惟聖文神武三界伏魔大帝關聖帝君義重桃園功成漢室忠心炳日月千秋事業光明正氣凜乾坤萬古剛常鼎峙褒勳褒德厯唐宋而譽美愈隆崇祀崇恭越明淸而推尊益重職分造化旣司天上權衡位鎭中華並作人間福祿遐齡後天不老神威應地無疆某質列三才席聯一脉孝友傳世叨承先代之遺風忠義存心竊慕當年之行事妥神靈以奉祀廟貎幾厯百年仰法象以抒誠人事一經數代每逢聖誕聊矢葵忱樂奏鈞天音節叶維祺之頌曲傳黎譜歌聲侑爼豆之香玉陛歡騰瑤階拜舞伏願衣冠效雀舞喜解愠之薰風蘋藻進嵩呼樂舒長之化日黌宮雁塔操文運以推維雪案螢窗啟聰明而默佑地久天長名成利就頓首謹疏川主六月二十四日孟秋行白帝之權尙遲六日中夏慶淸源之聖誕降九霄易地歡呼與天長久據大淸國四川云云維日沐手焚香潔心皈命白微詞於一楮之中祝大夀於九天之上恭惟川主惠明崇應大帝秀儲山洞眞君乃桃源洞主威鎭靈關破浪興妖隨顯降龍之手含沙射影特彰斬蜃之功佐泰山生死之司並本傳寶錄護穢跡慈悲之教眞君乃三壇下副將某等恩蒙波潤旦遇河淸五十四州咸仰西川之主億千萬𡻕永綏東土之民云云城隍五月二十八日伏以日餘二日卽更建午之書雲燦五雲喜逢生申之誕懽聲載路和氣滿城應此隹辰修崇大會據大淸國四川云云奉聖投詞慶祝千秋迎邀厚福迎祥信某通泊合會奏名人等是日香浮寶鼎酒泛金巵歌音婉𡤛達一念之微忱經韻悠揚演三乘之大梵上祝華齡下舒民悃恭惟本府州縣城隍聖主護國福神乃文乃武作威作福呼吸須臾之雨露動驚俄傾之雷霆赫赫厥靈洋洋如在某等素喜蒙恩之久幸逢震夙之初夀永悠長願以椿齡而爲夀封褒忠惠更看芝檢之增封云云其二同日日居東井適臨四七際之辰電繞北樞誕降五百年之聖普天贊慶罄地歡呼據大淸國云云同前恭惟城隍聖王爲社稷臣作城隍主全輔德顯忠之行秉罰奸罪惡之權運神力以護螺川役陰兵而驅蟻寇旱魃爲疫常施霖雨之功回祿興災旋致反風之德宜動九重之明主特封三字之眞王某素沐庥光恭陳賀禮伏願恩沾八邑旁施夀域於八荒廟食萬年永固福基於萬姓云云平安類榜文常規送故星纒龍紀漸屆更新之次日淸蝸舍用殫送故之儀恭演玄科特陳清醮伏願朱章覆奏宛瞻玉皇香案之臨黃道弘開祗衞金闕高眞之降常規平安享安於己安之後實叨乾覆之恩報德於旣德之餘用設常規之醮謹懸黑榜預以申聞惟冀玄穹特垂丙在同前三淸聖帝雖居冥漠之宮一片心香自有感孚之理茲涓穀日肅拜蘂章謹咨當域眞官普告飛符走吏伏願旗影動龍蛇之閃閃出離雲衢車音奏鸞鳳之鏘鏘來臨氷室常規平安眞武蓬戸安安素托玄天之庇芹誠款款用申伏地之恭謹陳淸醮之儀用報洪休之賜伏願毒龍猛獸謹呵金闕之仙班蒼龜巨蛇仰護玉虛之法駕常規平安南斗耀垂南極實資陶鑄之功禴效西鄰敬設平安之醮茲卜良辰而修建謹述墨榜以申聞伏願煌煌離位光芒上覩於六星炳炳乾宮照耀下臨於萬象常規平安北斗南𨶒浮生安免慶勞之苦北宸著曜實蒙臨照之恩茲涓穀旦以焚修盍布楮章而咨告伏願風淸雲路掃開萬里之雲頭日永星壇祗降九霄之星主常規平安南斗北斗同北斗七星獨掌延生之柄南宸六曜茂專益算之權爰立玄壇并陳醮祀伏願坎宮著曜宏開皇極之居離位重光洞達淸虛之境洋洋乎如在于于然而來上元平安詔頒鳳暦方踰飲柏之辰燈擁鰲山又際傳柑之夕用設常儀之醮敬酬乾覆之恩竟預申聞尙祈昭格伏願雲師啟道擁開萬里之旌旗風伯淸塵祗降九霄之車駕中元平安律轉素商甫屆中元之節禮陳淸醮庸殫下悃之誠欲後感通必先昭告伏願地官如在洋洋風馬以來臨天帝儼然藹藹龍車而至止下元平安上帝好生仰沐鴻庥之庇下元屆節俯申螻蟻之誠爰命黃冠特陳淸醮伏願巍巍鳳闕出瞻丹鳳之威光杳杳龍宮來降靑龍之瑞彩常規平安僧皈叩蓮臺但冀平安之二字薰修蒲供特陳報謝之一誠先茲懸榜以申聞後此投詞而孚感伏願三界虛空眾菩薩整臨鵷鷺之班十方圓覺諸如來下展獅猊之座上元平安僧蓮燈照耀正上元三五之臨蒲供誠陳致下悃百千之禱預昭露布普覬風來伏願天官地官水官出離虛無之境佛寶法寶僧寶來開方便之門中元平安僧昔喜目連敬設盂蘭盆之會今皈焦面聿修伊蒲供之儀用集洪休以資冥福伏願普天諸佛來呈悲觀慈觀淸淨觀易地孤魂得脫妄想夢想顚倒想下元平安僧月紀秦正仰望蟾宮之盈滿儀遵梁武俯修象教之祈禳禱於上下神祗建此冥陽水陸伏願四界無邊眾菩薩降臨蓬蓽之居十方有感諸如來下展蓮花之相平安類疏語逐月六口南斗六曜星聯並處南宮之位一封露奏輙修北面之恭謝已往之愆尤迎將來之福祉切念某身居人品命屬天曹欲縱所之日喪延生之本德忘攸好時虧益夀之資茲逢下降之辰特致中孚之信敷懸玉像點照銀釭伏願經之營之悉契靈臺之願悠也久也益增陋室之安北斗咒隨願契靈臺逐月七日北斗星環二十八宿太史自序二十八宿環北辰獨宗皇極之居後漢李尋傳注紫宮天之北宮又云天文志云紫宮爲皇極之居日周三百六旬實藉洪麻之庇敬憑醮禮以盡祈禳切念某心過罙㴱性資甚魯痒疴疾痛安知解謝之門起處營爲浸入昏迷之境並北斗纒爰叩紫微之帝特陳丹悃之詞伏願何災不滅何福不臻常居吉慶並斗經句俾昌而熾俾夀而富永保安甯天香前許南北二斗庚申甲子齋居安履靜素叨大造之恩思患預防輙盡小心之敬措功伏地稽首籲天切念某年不前人事常先慮傾以星辰之休咎托茲日者之推明爰㴱未雨之懷益切堅氷之念因致百千之悃許爲六七之齋洎爾庚申與夫甲子盡此寅恭之畏并諸本命之辰期爲肉味之忘姑事飯蔬之樂雖㝠㝠杳杳何拘吾素食之誠然始始終終庶表我丹衷之懇於以托洪庥之庇自茲堅白水之盟伏願眞宰垂慈靈祗洞鑒式應熊羆之夢荗延龜鶴之齡經之營之目有有常之吉優爾游爾永無無妄之災常規三淸上帝好生獲享和平之福下愚昧死敢忘報謝之誠謹以靑詞叩聞紫極切念某爰居爰處不識不知谷腹充盈或肆烹鮮之過絲身侈靡且爲剪綵之非行寡悔言寡尤弗愼厥德縱敗度欲敗禮速戾予躬靜而思之何所禱也幸有有常之吉且無無妄之災信知托庇高穹遂得偷安於陋室茲盡獻芹之禮特陳結草之忱伏願金闕遙迎玉淸降格枕檀芬馥相敷郁郁之心香蓬蓽康甯咸致綿綿之眉夀常規送故俯觀璿厯漸當革故之辰仰止玉淸敬修常規之醮上徼厚福下報洪庥切念某蟻𧚿而居蠅營是務三百六日畧無一善之能一十二時或肆三欺之念幸喜𡻕華之結局薦承韶景之問津靜思據舊之非盍盡自新之德謹邀鶴侶恭奏龍章特申方寸之誠昭格玄穹之聽伏願旣往之愆自今以赦方來之祉與時偕行半點陽春暢作和風之披拂萬間廣厦永依霖雨之帡幪常規平安眞武仰八十二顯化之眞獨稱玄武盡三百六周期之日實藉洪庥俯陳鐵畫之書仰叩玉虛之聽切念某凡籠囿跡利鎻關心忠孝乖違莫應昇仙之舉本傳經忠全孝全保舉昇仙香火瞻敬仁宗贊全句或忘奉聖之儀惟資有煒之靈光仁宗贊遂獲無虞之生息茲逢良日爰啟醮筵伏願道炁常臻散作盈門之和炁禎祥永慶融爲舉室之嘉祥常規平安北斗斗居其所密專喉舌之司心拱乎辰庸示肺肝之藴敬達紫微之淸聽用祈洪覆之私恩切念某命屬上玄身居下土延年益算但祈麟瑞之生春秋運斗相天福得則景見衡星得麟瑞生萬人皆夀好道求靈北斗經莫悉鱔朝之禮幸切照臨之德乞臻安靜之休敬卜良辰特陳淸醮伏願生我來養我來護我來三台協贊俾爾昌俾爾夀俾爾耆百福駢臻常規平安南斗星垂六曜聯居離麗之方布露一誠敬設常規之醮上報已然之厚德下祈未至之洪休切念某兔守愚愚燕安兀兀耳濡目染安知四大之因南斗經口誦心唯莫究三淸之道伊誰之咎實我之尤幸叨覆燾之因迄遂康甯之福茲盡蘋蘩之薄禮特傾葵藿之微忱伏願眞君眞宰賜哀憐至聖至尊來印可並南斗經奏明童子蠲除已往之過愆注籍老人增益無疆之夀算常規平安南北二斗斗居離坎之間實司陶鑄人處乾坤之内貴盡祈禳仰陳稽首之誠俯致㝠心之醮北斗經切念某賦姿最拙爲德實凉左傳句六曜南垂未悉朝南之禮七星北指或忘拱北之忱幸蒙延生延夀之恩得遂成始成終之福靜言所以何感如之謹遵玉律之文爰叩金門之聽用酬厚德庸迓洪休伏願龜算綿長益協老人之瑞蝸居安逸常依高上之尊常規平安仰山仰止雲峯素切宜春之想安于水室實叨廣厦之恩謹以心聲形于筆舌切念某蝸居苟活燕處偷生倥侗顓䝉安知克念作聖視聽言動未能以仁存心惟茲孚惠之靈得遂康甯之賜謹陳淸醮用報洪休伏願二聖垂慈兩宮錫慶福田利益韓文源源借潤於堵田夀域遨遊永永依光於化域上元平安鳳燭光輝咸慶上元之夕虎關深邃庸殫中悃之誠翼翼祈恩競競謝過切某順茲帝則秉此民彝私語妄言莫掩葢高之聽非心邪念難期臨下之觀善端之積二三罪貫之盈千萬靜思其故何以自文茲逢蠒卜之宵肅淨蝸居之室敬邀鶴侣恭拜龍章伏願少昊司春常樂春臺之和氣天官賜福永沾福海之恩波中元平安節屆中元正屬地官之檢察生居下土庸干天帝以祈禳俯殫精白之誠仰徹圓淸之聽切念某凡籠賤質塵宇幸民蠶室充盈莫報含弘之德蟻封旋拆或虧踐履之眞悠悠善果之凋零惻惻業花之繁盛旣乖厥行速戾於躬丁臨赦罪之期寅設保安之醮伏願兩班星拱萬聖雲臻祖廟靈魂俱躋金橋之渡族居長稚感升玉簡之名下元平安顓帝司權甫届下元之節水官考籍屬當下降之辰謹殫拱北之誠敬展朝東之禮切念某性端泥滓情竇波流滔滔苦海之中淪胥已敗泛泛善淵之内汨沒而湮莫能禦之可嗟極矣爰致潢汙之薦冀沾涓滴之恩伏願時應小春有愛日祥雲之慶德䝉大厦無疾風淋雨之虞福擁川臻澤滋河潤常規平安僧與佛有因觀音經得享有常之吉至誠無息中庸庸修無礙之齋俯陳白楮之詞仰叩金蓮之座切念某處𨶒浮世生幻化身貪嗔愛欲之根蓁蕪心路受想色聲之滓渭濁性端如是愆尤云何懴悔惟藉慈悲之力迄增淸淨之緣茲命苾蒭僧敬設伊蒲供伏願觀世音菩薩敷呈妙音梵音海潮音觀音經消災障如來俾脫業障罪障煩惱障上元平安僧節屆上元喜結鰲山之彩誠呈下悃皈依貌座之尊設混融齋宣秘密咒切念某業風震動智月昏迷唐文粹擾擾欲塵難作在家菩薩炎炎心火未明忍辱波羅幸得團圞頭迄臻淸淨果爰命釋迦弟子聿修梁武齋儀仰祈夏屋之帡幪俯冀春祺之至止伏願法身示現道手昭垂步步燃燈常見金牀之照耀正月十五日如來閣置金牀續域步步燃燈十三里出湼盤經中穰穰降福𥩟看玉簡之書名中元平安僧桂花初綻月當少昊之司權蓂莢齊開日際地官之考籍俯陳蒲供仰叩蓮臺切念某五藴塵紛六根膠固忤逆無諍之旨昏迷有漏之因太上靈篇未嘗欽誦七月十五日十方眾聖齊誦太上靈篇出道藏目連勝會徒切孝思爰淨蝸居特投象教散燈以現光明界設齋以結懽喜緣伏願興慈悲心垂接濟手上拔前亡於樂國下超後化於生方洒洒慧風暢作金風之嘉瑞零零甘露散爲玉露之淸凉下元平安僧北帝司權方紀爲良之月水官考籍載臨旣望之辰謹拂蓬居肅陳蒲供切念某靈源汨没識浪滔滛苦海無邊誤認囘頭之岸愛河有漏昏迷注足之津須憑道法以垂危斯得慈船而濟險弘闡金山之教皈依寶相之尊伏願善果圓成相映橙黃之好景空花頓悟宛如梅白於律時星辰類榜文預禳星辰惟彼凶星盍致祈禳之敬卜其吉日特申蠲潔之誠恭設醮筵普延法馭伏願龍旗閃閃暫離皇極之居羽仗翩翩都護紫微之駕其二同前三命推遷雖係生成之定數五星乖逆當遵禳奏之冲科爰建黃壇特陳淸醮伏願九重㴱邃敞開虎豹之關萬象森羅祗衞龍鑾之駕見患禳星思患預防旣昧履霜之戒遇烖後懼庸陳傾日之誠俯延雲侶以祈禳仰冀星躔之昭格伏願雨師洒道擁開南極之旌旗風伯淸塵祗降北辰之車駕其二同前見危致命已乘知命之圖解厄消災甫盡禳災之典謹涓穀旦恭拜蘂章冀吉曜以還垣祈凶神而退舍伏願戶闢九關之虎豹望而畏之車駢八極之龍鑾惠然來矣預禳僧星辰有吉有凶禳之貴早佛法無邊無量感而遂通爰命苾蒭僧敬設伊蒲供伏願杳杳十方菩薩眾來降龍車巍巍萬德彌陀尊下臨蝸舍見患禳星僧五星凌逼消災吉祥陀羅尼經全句旣興旡妄之災諸佛慈悲能救有緣之苦謹按阿羅遺教聿修梁武齋儀伏願龍華會上諸聖賢來降龍車之後獅子座間眾菩薩祗迎獅位之尊星辰類疏語預禳星辰嗣教小兆某謹陳爲預禳星運度厄消災事據大淸國云云奉道陳情朝眞禮斗襘禳星運續限保安信某通洎合家人等是日上叩元造切以皇天無私惟曰公實均覆燾君子有命不謂性當效祈禳俯陳咸感之誠仰叩乾元之聽某切爲某命係生於某年某月某日某時建生上隸中天大聖北斗第幾位某星君宫下主照行庚幾十幾𡻕某言念五行素蹇百事俱迍載觀日者之書適重時哉之嘆凡茲凶曜旣居遲留伏逆之鄉惟彼吉星反在失䧟併衡之域深軫徹桑之念恐難滋蔓之圖爰卜剛辰特陳淸醮寅具法信凡儀仗道於家修建正一祈禳解厄順星法事一中於内云云藉此功勛上祈元仁用弭厄戾等因兆領詞䖍切依教奉行須至具疏申聞者右疏具申聖位伏乞星慈俯垂洞鑒伏願刑囚退舍祿貴還垣皙皙煌煌消鑠禍孽穰穰簡簡綿延福基俾某星運光亨吉祥茂集謹疏其二倣前式恐懼在乎微庸致禳一星之舉齋戒可以事輙申仰五斗之儀俯述靑詞仰千洪造切念某爰居爰處何慮何思癡凝鑽紙之蠅拙異守株之兔曰己安矣乃有命焉病死二符互照生身之域刑囚兩曜交侵主限之宮靜思後患之由不若早爲之所謹於蝸舍恭奉龍章伏願南極上照北宸下燭除毒害於未形滅凶災於將至五臟安和各執太玄妙法三臺養護永依至聖靈光見患禳星嗣教小兆某謹陳爲順星度厄祛病延生事據大淸國云云奉道投詞祈禳禮斗禬福迎祥信某通洎合家人等是日上叩元造切以愼烖於旣遇之餘已極噬臍之悔保安於未然之頃敢忘稽首之恭跼地申言籲天致禱某陳情切爲某命係生於某年某月某日某時建生上叨中天大聖北斗第幾位星君宮下主照行庚幾𡻕伏自某月以來偶鍾疾疢屢致憂危求醫無三折之良服藥罕十全之效乃憑術者厯考星躔五行之衝併可憂二運之反吟益甚况火羅計孛迭興稔禍之端雖日月木金莫贊扶危之力有斯疾也其如命何謹憑玉笥黃冠啟誦琅王函綠字所冀以丹衷素願適通於紫府靑都改禍爲祥囘凶作吉寅具法信凡儀卜某月某日斗眞降世之辰仗道於家修建太上玄靈順星度厄法事一中於内云云藉此功因上祈天德默賜存全等因兆領詞難抑依教奉行須至具疏申聞者右疏具申聖位伏乞洪慈俯賜昭允拯我高肓罔俾倉公之驚畏夀予命脉永固彭祖之綿長災厄無干病源頓解謹疏其二倣前式人處乾坤忽致臨危之苦星君離坎實司解厄之權爰建皇壇敬陳丹悃切念某敬焉有執愚而無知偶因三命之乖違稔作一朝之疾疢炎帝旣嘗之藥且失其靈倉公巳驗之方亦虧厥效靜思所以何以禳之謹陳紅篆之書敬達紫微之帝伏願南極炎官除毒害花斗水聖滅凶災上生籍落死名長居吉慶鑄眞魂鋾正魄永保康甯太上說南北斗經咒僧見患禳星星垂象以麗天忽至侵凌之苦佛如水之在地常傾感應之誠俯罄蟻忱皈依猊座切念某未除人相圓覺經是名凡夫金剛經偶乖攝養之宜旋致痒疴之疾囘予命脉遍求扁鵲之醫夢我膏肓益甚晉侯之慮因以五行之載考適逢二運之相衝喪門與吊客交侵計都偕羅㬋互照惟有慈悲故能滅度用宣蘂笈之文散設伊蒲之供伏願熾盛光吉祥之善果自此圓成生老病死苦之湼盤從茲解脫僧見患禳星遇災知懼可勝修省之誠移禍成祥須藉慈悲之力寸丹炳若尺素申之切念某蠢性無靈幻身有漏忽念膏肓之疾遽爲命脉之憂豈其眾曜之侵凌作如是故抑亦五行之乖蹇因之以危謹依巍巍萬德之尊用轉浩浩三乘之藏伏願𦂳那羅王施慧力金剛菩薩運神通八面循環攺移凶星之退舍一輪旋轉挽囘吉曜之還垣得見在心錫未來福僧預禳星君子思患預防祈禳爲貴如來隨聲嘿感眞實不虛心經合掌致恭志心皈禮切念某娑婆浪跡幻化浮生時將三命之推明忽致五星之凌逼悲泣霖霖之運抑亦會逢送迎擾擾之時又將出入莫知攸止敢曰已安聿修無礙之齋欲弭未形之禍伏願出廣長舌相現淸凈色身四百病煩惱之因得滅度者八萬種吉祥之事當成就之道見患順星星躔失次旣興坎坷之災寶藏循環庸盡乾旋之妙俯依琳宇仰叩玉淸切念某守拙愚愚知幾昧昧罔測一朝之疾遽沾四大之身殆將傾刻以忘生難冀須臾之忍死遂憑術士載考賤庚凶曜還垣且據高强之位吉辰退舍又居卑弱之宮靜而思之何所禱也爰藉金輪之法祈安珠緯之行伏願地軸密庸道樞潛斡萬靈運動運神力以承膏肓三匝轉移轉禍孽而爲福祉命道保安星聯珠緯豈無爲災爲福之時雲擁金輪聿有移禍移祥之力俯陳丹悃仰叩玄穹宣秘密之琅函運光明之寶藏伏願地軸轔轔而坤轉天樞續續以乾旋退凶曜於三舍之間自今以往囘利順於一家之内與時偕行命僧保安列曜垂天恐致三生之苦五體投地輒依萬德之尊宣秘密言運達摩藏伏願移凶就吉轉禍成祥多寶佛嘿顯神通六通廣博八金剛各施慧力一力周旋誦道經禳星星曜照臨難免痒疴之苦經文秘密庸申讚詠之誠謹依琅函敬宣玉典伏願隨聲赴感旋移三舍之躔改禍爲祥求托萬間之庇誦佛經禳五行運轉能致我之災危千佛名經本爲人之舟楫是大神咒是大明咒救無邊生救無量生庸盡宣揚特施讚詠伏願隨教赴感來呈淸淨微妙之音護念垂慈得托疾病痒疴之苦工役類修造後保安鳩工興役可勝動地之驚燕厦告成庸建謝天之醮謹懸墨榜昭告皇穹伏願雉扇弘開駕雲車而下降龍旗森列儼日表以來臨同前眞武燕厦落成幸遂更新之喜鴻庥覆護實資壬癸之靈茲命黃冠敬陳淸醮普告十方社令並飭四直功曹伏願關軸轉旋得應龜蛇之騐旌旂森擁獲瞻龍鳳之姿火後重修建醮保安昔處蓬居忽致祝融之禍今涓穀日載興匠氏之工旣遂落成爰申醮謝伏願一瓣沈檀之馥郁直透虎關三薰蘋藻之薦饈幸臨鳳駕道觀修造後建醮琳宇傾頽因肆鳩工之役玉淸寥邈敢忘蟻報之誠謹卜良辰特陳菲禮伏願天門日啟擁開簇簇之旌旗地戸風休祗降鏘鏘之車駕修造後請僧保安昔造蓬居得遂落成之願今修蒲供用申報謝之誠欲是夕之感通必先時之昭告伏願下極幽幽㝠地有聖皆皈上致非非想天無神不至鑒茲敬止企予望之寺院修造後保安蘭若座中偶葺葢頭之所蓮花座上庸申稽首之恭謹修梁武之成規敬展阿難之遺教伏願娑婆世無遮佛子普歆無碍之齋淸涼山有感如來得度有緣之眾修造後保安在陋巷不堪其憂因啟更新之役處華屋得安所適實沾覆燾之恩一心籲天五體投地切念草茅賤質蓬蓽微生頃虞湫隘之居欲造高明之室庶厯星霜之悠久可忘風雨之震凌經之營之幸遂成之至矣盡矣又何加矣旣吾無間於我有餘古詩此屋豈無華於我自有餘庸陳淸醮之儀用報皇穹之德伏願虎關邃格龍衮昭垂椿桂綿綿茂植燕山之種芝蘭郁郁常浮謝砌之香降之百祥錫以五福修造後保安眞武梓匠興工有動地震驚之譴蓬居安迹藉鎭天乾覆之恩俯露丹誠仰干玄鑒切念某肯堂念切築室計疎涉厯星霜可奈否傾之險帡幪風雨欲爲革故之圖廼闢舊基載營新宅旣遂落成之喜尤深冒禁之虞謹延琳宇之流敬設玉虛之醮伏願燕雀來賀蛟龍遁藏無幽不察無願不成眞武咒常臻道炁俾昌而熾俾夀而富永襲佳祥火後修造落成保安煙熖燭天無降雨止風之應蘅茅掃地有震風凌雨之憂乃卜龜猶載營燕厦幸遂落成之喜庸陳醮謝之儀伏願囘祿還歸融神往邁室家和好益臻俾爾之昌戸牖綢繆常絶焚如之禍劉昆宰江陵遇火能降雨止風道觀修造建醮龍觀將傾因啟鼎新之役鳩工旣畢可勝革故之欣肅拜玉章敬酬檀信伏願耕稼者益收地利行商者常獲天財工巧其能倍得靑銅錢之價士精所業高升黃金榜之名仕宦由是以超遷道教因之而興起僧堂修造建醮寶剎載新實藉檀那之力金仙如在庸修蒲供之儀俯酬長者佈施之心仰報我佛化緣之德伏願法門淸淨梵宇興隆釋迦化千百身永作四生之慈父皇帝夀億萬𡻕常爲九百之君王修造後請僧人建水陸燕厦落成幸遂萬間之庇龍神護擁實資三寶之功俯陳玉楮露布靑詞仰叩金蓮敷禮妙相切念某塵寰擾擾火宅孜孜兔守舊居似匪蓋頭之所鳩工新室欲爲容膝之安然震驚者豈無犯於地靈而勞役者或有千於天譴未知攸止莫敢或遑茲涓穀旦以鶯遷盍盡芹誠而蟻報䖍命釋迦弟子敬修梁武齋儀伏願發護念心垂正覺眼若去若來若坐卧金剛經永賴帡幪曰夀曰富曰康甯多所饒益普門品遷居謝家廟子孫眾多因藉蘅茅之所祖考安樂敢忘萍藻之饈庶幾獲遂於鶯遷抑亦得依於鴻庇伏願先亡如在後化若生嗣續綿綿益切肯堂之念禎祥譪譪克偕宜室之懽遷居謝家神經之營之旣適其居之樂悠也久也敢忘所祀之䖍乃陳龜卜以遷移合以蟻誠而報謝伏願子孫克念厥紹鬼神亦莫不靈俾夀俾昌益衍莊椿之算以嗣以續更新燕桂之榮心香妙語卷之一終
