front:
  text: 心香妙語重刋道藏輯要重著併儷心香妙語卷之三
  hash: sha256:c44e179190490aa66a85224d0e93cefc4778a0fab7b4fe75d3a270ee33af70c7
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_07p001a}
body:
  text: 綿竹退隱陳復烜含樸校輯嗣派徒張軫駐參閱本雲趙龢芳姪徒王本崇雲瑞派徒孫合江義體仁馬合乾徤堂姪徒孫鄧合順希襄門人蔣本遂繼順疾病類榜文病中建醮疾痛痒疴爰切呼天之齋禱戒沐浴敢忘事帝之誠肅啟蘭筵特申芹獻伏願杳杳虛無之境無感不通空空妙有之宮有靈皆至病後酬天上帝昭昭曾沐更生之賜下愚蠢蠢庸舒昧死之誠爰命黃冠特陳淸醮伏願掃蕩紅塵之霧驅除碧落之煙開虎豹之玄關降龍鸞之法駕父病建醮温淸定省誰無人子之情疾痛痒疴適重嚴君之念謹陳淸醮用叩皇穹伏願靈之至慶陰陰孚延年漢郊祀樂章乃慰乃止神之徠泛翊翊注見上不處不留父病後酬天昔因嚴父以祈安得臻無恙今叩皇穹而報效庸罄有孚乃卜剛辰特陳淸醮顧瞻蓬蓽豈能邀鸞駕之臨惟賴蘋蘩尙可格虎關之邃願言昭鑒普賜感通母病建醮母也猶地可勝保育之恩疾則呼天庸格鑒觀之聽吉涓穀旦肅啟芳筵伏願帥風伯兮先驅擁雲師兮後屬洋乎如在惠然肯來母病後酬天子爲母之是憂丹衷厯悃天從人之所欲素願靡忘茲拜寶章特申瓊報伏願龍旌虎仗暫離冥測之宮鳳駕鸞輿普降空虛之室夫病建醮夫闈病篤實深孔棘之靈婦閫情深庸致獻芹之禮俯陳淸醮仰叩皇穹伏願十方有感之靈仙特垂昭鑒三界無邊之眞宰普降恩光夫病後酬天昔爲藁砧曾致痒疴之苦今陳芳醮用殫報稱之儀禮謹獻芹恩酬寸草伏願法界幽冥之眞宰于于然來虛空過往之賢聖翊翊而至妻病建醮有疾弗瘳適重中閨之慮無感不通敢祈上帝之恩爰命黃冠特陳淸醮仰勞符使遍通墨表以申聞俯冀靈祗洞鑒丹衷之寅敬妻病後酬天疾形荆室曾䝉倚蓋之垂休塵淨草居庸列結纓而報德謹陳露布乃立星壇伏願隊仗三千森列仙班之從冕旒十二降臨帝馭之尊兄弟病建醮嗟鴒原之疾苦深惟無恙之期卽蝸舍之吉蠲庸盡有孚之禱排雲翳而叶閶闔望日表而拜通明檀篆香浮尙冀睿聰之昭格蘭筵致敬願言法馭之降臨兄弟病後酬天手足惟親會致痒疴之苦腹心敷露今酬覆燾之恩爰卜剛辰特陳淸醮伏願靑都紫府願言鑒我之丹衷綠簡瑤章庶獲通臣之素念子病建醮病承膏肓實切震男之慮誠陳肺腑敢祈乾父之恩爰命黃冠特陳淸醮獻芹儀兮萍薦奠蔬酒兮椒觴輝彰赫赫之靈特賜皇皇之鑒子病後酬天人之愛子深懷駒犢之情天之生民實有龎洪之惠爰遵玉律肅拜瑤章伏願電幟霓旌幸闖然而來駕雲璫月珮庶戾止以降來女病建醮乾三畫而爲天不言所利乾不言所利大以哉巽一索而爲女唯疾之憂茲卜剛辰特陳淸醮伏願風伯掃風塵而肅靜風馬來臨雲師驅雲翳以繽紛雲龍至止女病後酬天災興旡妄深爲賤息之憂吉卜有常實藉高穹之力謹酬淸醮用報洪恩伏願駕龍車而别龍宮乘鳳輦而離鳳闕鑒我蘋蘩之薦降予蓬蓽之居嬰孩病醮骨氣不凡方致嬰孩之喜膏肓疾病可勝豎子之憂爰卜良辰特陳芳醮伏願森羅萬騎掃開碧落之雲頭閶闔九關獲覩淸都之日表嬰孩病後酬天赤子無知忽致有生之疾皇穹有感遂臻无恙之休茲薦微儀敬酬厚德伏願幡幢森列獲看芝蓋之祥光車駕來臨普享蘭筵之醮醴中風病建醮不可以風上孟深嘆中風之苦載卜其日用殫傾日之誠仰望皇穹俯陳淸醮伏願嚮環珮於玉霄之際赫赫厥聲來冕旒於金闕之間洋洋乎在目病建醮嘆銀海之失明莫致生花之喜望玉宸而致敬庸申藴藻之儀肇啟芳筵特陳醮祀伏願擁出九霄之隊仗開闢虎關降臨八極之軒車輝煌蝸舍痁疾建醮嗟痁疾之爲虐莫施藥石之功啟誠意之祈恩用致萍芹之禮敬陳赤悃敢冀洪庥伏願視之不見聽之不聞形聲俱泯往而無厓來而無迹盻嚮潛通足疾建醮足憂蹠盭賈誼策病非瘇也又苦蹠盭師古註曰蹠古蹠字足下日蹠今所呼脚掌是也盭古疾字言足人戾不可行也莫申蹐地之恭心竭精誠爰致呼天之禱吉蠲蓬宇肇啟蘭筵惟俯仰一已而無遑克禋克祀願上下百靈之有感來享來崇疫疾中建醮罪積丘山遽染流行之疫恩弘嵩岱敢祈覆燾之私庸建皇壇特陳淸醮伏願祥雲光裡敞開虎豹之玄關瑞靄香中普降龍鸞之法駕預禳疫疾疫氣流行實切蔓延之慮誠心懇愊敢申芹獻之儀𥸤告蒼穹建修醮禮謹告地祗之肅若呵禁玄壇尙祈天帝之昭然降臨陋室疫後酬天獲罪於天遽稔天災之苦祈恩於帝遂臻帝德之休茲闡芳筵敬酬淸醮伏願萬靈森列弘開紫府之瓊關九御昭垂特降淸都之玉輅疫病祈玄帝无妄致災欲建西郊之禴有孚叶吉敢祈北極之靈恭演仙科特陳妙供伏願妖氛掃蕩敞開金闕之關瑞氣繽紛特降玉虛之駕病後謝玄帝昔因病苦許陳淸醮之儀今載吉蠲庸報玄元之德上啟直壇符使并咨當域靈官伏願出仙仗於武當山上龜蛇偕耀來神鋒於眞慶宮中龍虎潛奔疾病中祈仰山居疾病之中實切高山之仰祈休祥於下庸殫卑悃之誠敬設蘭筵恭陳芹獻伏願在左在右分明獲覩於金昆自東自西降鑒特垂於玉輅病後還仰山有疾弗瘳爰叩集雲之禱無德不報徹申皦日之誠用薦微忱特酬醮禮伏願輝聯玉輅願言孚惠之降臨聲振金鈴尙冀淸尊之昭格病中建斗醮一疾儆予實切在予之慮三台生我敢祈賜我之恩肇建皇壇特陳淸醮致杜酒椒湯之奠盡蘋饈芹獻之誠伏願運極轉樞斡中居之妙相指罡布斗垂下降之祥光病後還斗醮嗟厥疾之弗瘳曾申祈禱居其所而不動迄遂感通茲報洪恩特陳淸醮伏願皇壇肇建弘開皇極之門紫府邃聞普迓紫淸之駕預禳疫疾建天符醮瘟風誕布可嗟易地之流行慧日常臨庸叩都天之請禱俯陳淸醮仰冀洪恩伏願三十六洞之𡨚魔護迎玉駕一萬二千之眷屬並從金仙疫疾中建天符醮可嗟蓬戶遽興坎坷之災肇建蘭筵庸叩乾元之聖謹先昭告欲遂感通伏願電掃風除赫赫潛消乎厲氣雷轟雨吼皇皇獲覩於慈容方境春祭醮詔頒鳳暦㤗和喜轉於洪鈞繪畫龍舟常禮特陳於淸醮謹布丹衷之寅恭用懸墨榜之申告伏願掃除十地之紅塵地祗至止開闢九天之黃道天帝來臨方境夏祭醮月將建巳歡迎藻繪之舟星聚同寅特薦蘋饈之禮俯陳淸醮仰叩皇天伏願開闢天門湛湛雲龍而至止肅淸地戶翩翩風馬以來臨同前迎五彩之神舟欲應朱門之候交一鄉之善士特陳淸醮之儀爰露丹衷敢懸墨榜伏願天女散寶花之瑞灑沐玄壇地祗聯玉筍之班祗迎帝馭方境秋祭醮藻繪爲舟導迎素商之和氣枌榆結社敷陳丹悃之精誠恭叩玄穹特陳芳醮伏願帝昭昭其垂聽皇赫赫以揚靈森列仙班降臨聖駕方境預禳瘟疫瘴疫風行實切枌榆之慮精誠露布敢申蘋藻之恭同拜墨章敬孚諸聖伏願叩帝閽於淸虛之域昭若聲聞來人寰於恍惚之間自然嚮答保産平安熊羆入夢可勝六甲之憂螻蟻傾誠爰致一心之禱謹陳淸醮用叩皇穹瞻之仰之願鑒薦蘋之微禮安也樂也俾臻就蓐之佳祥産後平安酬天昔因生育之未形呼天致懇今喜祈禳之就效伏地酬恩陳淸醮之微儀報皇穹之厚德伏願華嶓風動遙迎龍馭之尊仙仗星臨昭映蝸居之陋疾病類疏語其法如一卷之見患禳星爲式病中建醮人有一朝之疾莫得而知天爲羣神之精註見商賈類不言所利謹申素願敬叩玄穹切念某稟性無靈謀身最拙未悉徹桑之慮遽抱採薪之憂上孟趙氏註言病不能採薪自謙語也藥加瞑眩之投甚如冰炭命切危亡之迫凜若風燈爰殫昧死之誠用叩好生之德命黃冠而請禱開淸醮以祈禳伏願臨照赫然鑒觀昭若哀臣迫切之懇察臣疾苦之辭詔治病之功曹均調六脉敕神醫之將吏爕理五官淸甯燕喜之休悠久龜齡之夀病後謝天攻之不可達之不及左傳晉侯疾詔泰醫和緩視言病在膏肓攻之不可達之不可憂曾深夫抱疾視之不見聽之不聞恩願叨於好生俯殫下悃仰叩上穹切念某夙嬰无妄之疾遽作有生之苦金石草木无其力巫醫卜祝亡厥靈莫敢或遑未知攸止爰啟芹誠之意敬陳芳醮之儀果䝉洪佑克遂淸平茲喜丁臨於穀日容先申賽於芹誠恭投素欵冒凟玉關剖心報德其敢爲邀福之一詞稽首陳言尙冀乞平安之二字父病建醮疾病抑搔竭力方供於子職包函遍覆誠心容冀於帝休民切念父某以羸弱之微軀嬰纒綿之疾病跼高蹐厚懼莫能容履薄臨深殆幾欲墜膏肓屢亟不勝豎子之憂註見前攻之不可命脉載回未見醫師之效謹涓陋室恭啟芳筵伏願高眞洞鑒卑悃潛通察愚民之純誠脫嚴父之苦厄玉枝无汗洞冥記人病則玉枝汗人死而玉枝折自然挺秀於椿庭瑤樹有光更冀騰芳於蘭砌父病後酬天子惟父之憂豈堪疾苦天從人所欲爰獲平安信感應之弘深愧酬恩之覊緩民切念父某頃心衞生之無術可嗟與死之爲鄰瞑眩無功戰兢徒切爰罄豚魚之孚信敬答昭假之靈聰冀逢三折肱之良醫庸致九頓首之請命言纔脫口病已離身有感遂通果沐洪庥之賜無德不報敢寒白水之盟恭命黃冠特陳淸醮伏願父某向義方而膺福曰富曰夀曰康甯玩彩砌之弄歡以孝以德以溤翼俾艾爾後勿添厥先母病建醮母氏聖善詩經何來坎坷之災帝德高明庸致䖍恭之禱切念母某克勤克儉惟安是望近嬰無妄之災遂極有生之苦未遇神農之靈藥莫逢扁鵲之良方嗟嗟六脉之沉危不堪舉手惻惻五官之憔悴實切關心與其委任夫庸醫莫若皈依於洪造爰邀鶴侶恭奏龍章伏願睿德孔昭愚忱允答綏我坤稱之厚德錫茲乾施之深恩疾拯傾危瑞挹北堂之化日敷延攸久光聯南星之夀星母病後酬天嗟嗟所恃曾深災疢之憂悠悠彼蒼迄遂感通之應𥸤天致敬俯地酬恩切念母某傾以微驅遽嬰末疾回生頃刻莫求肘後之方忍死須臾實切目前之慮爰瞻玉闕奏吿瑤章顧小人有母之親左傳隱公元年小人有母皆嘗小人之食何所不至在大造無私之覆夫豈獲難果沐洪休得臻淸吉茲潔潢汙之薦敬酬白水之盟伏願錫敷穰簡之休赦宥因循之咎慈幃慶侍尙祈克享於龜齡子舍歡娛庶得問安於燕寢夫病建醮夫疾有加未有三折股之遇婦憂無造可無九頓首之恭爰罄丹忱恭投洪造氏切念夫某近因弱質遽染沉疴四肢百骸實切傾危之慮三魂七魄孰施陶鑄之功乃瞻臨下之威爰致由中之信仰邀玉輅俯奏瑤章伏願矜愍愚情轉移定數使扁鵲勿驚於舉目得承膏肓庶伯鸞可助於齊眉夀延命脉夫病後酬天昔爲藁砧而請命得沐洪休今庸荆室以陳情敬酬淸履氏切念夫某比爽節宣遽沾疾疢問命有纒綿之困謁醫無瞑眩之功爰瞻碧落以祈恩許拜靑詞而致敬迄遂龎洪之惠得全螻蟻之生奈何駒隙之迅馳未申素願茲潔蝸廬之肅靜答報皇穹載望帝閽幸降龍鸞之駕尙祈夫主永延龜鶴之齡妻病建醮丹砂日進深惟中饋之憂紅篆露陳庸致上穹之禱切念妻近因疾苦未獲安痊命脉回生者百無二三膏肓致死者十有八九醫謾折股之異命將纍卵之危或云眾藥之誤投或曰五行之交併䖍誠素悃敬仗淸流肅啟蘭筵庸叩玉宸之睿聽願言荆室得逢金匱之良方妻病後酬天愿諧有室素深琴瑟之歡禍起無門欲感塤箎之應果沐洪休迄臻淸吉醫忘束手之憂病得回骸之喜謹涓良夕敬展冲科暫延龍馭之尊特賁蝸廬之室爲糟糠而請命旣荷載生薦蘋藻以陳情尙祈偕老弟兄病建醮疾病相扶實切鴒原之念吉蠲載禱敢祈鴻覆之恩切念某爲德甚涼稟姿最弱近染一朝之患遽爲四體之憂瞑眩俱投莫禦玉枝之汗沉迷益甚謾求金匱之方險於兢戰之危惕若急難之苦謹陳淸醮哀叩皇穹伏願錫神醫而助世醫賜靈藥而資凡藥攻不可救不及命勿致於膏肓和且孺樂且湛毛詩義庶幾於手足弟兄病後醮酬天請命帝閽素軫急難之義脫身鬼籙迄臻覆燾之休爰申丹悃敬報洪恩切念某謀深蝸舍念切鴒原傾因手足之親遽染膏肓之疾百藥俱試且無君臣佐使之功五技旣窮徒有卜祝醫巫之請敬爰控夫靈臺恩冀沾於廣宇果沐好生得安垂死謹命琳宮之土特陳玉簡之文非惟盟殫白水抑且德報皇穹伏願鑒觀昭允陟降在兹棣蕚叢中常有同氣連枝之喜荆花庭畔永無改柯易葉之憂更冀蓬居咸膺茨祉子病建醮子嬰無妄之災豈勝坎坷民啟中孚之信庸叩乾元切念某蝸舍偷鯉庭受訓方喜致定省温淸之禮豈期爲痒疴疾痛之憂病鍵牢籠孰家之責私門紛擾莫承肯構之歡爰奉瓊章敬投玉闕伏願回生起死得逢種杏之良醫分戚均憂獲托析薪之重負子病後酬天昔爲子舍以祈恩𥸤天有禱今望帝閽而報德蹐地無庸志切啣環感深銘篆切念某傾以節宣弗謹致茲沴戾或侵靡收瞑眩之功忍視艱危之狀弟兄缺矣手足爲憂父母愛之沉疴何起爰罄小心而昧死敬呼大造之好生恩果䝉乎蕩蕩網竟脫夫恢恢謹申素志用答皇穹心厪葵藿之供禮愧蘋蘩之薦伏願錫敷厚福昭鑒前盟上奉鯉庭樂夫老萊之戲中偕雁序享茲彭祖之齡女病建醮鍾情㢲女遽深无妄之災請命乾元庸冀有孚之惠切念某似匪庸人之婦後燕垂德皇后段氏字元𡚱光祿大夫儀之女少而婉惠有操當以妹季𡚱曰我終不爲庸夫之妻季𡚱曰我亦不爲庸人之婦忽嬰豎子之憂藥雖餌而疾弗瘳殆哉束手食雖嘗而咽不下實切關心謹邀紫府之眞敬設碧虛之醮伏願鑒此息採蘋之克謹詩經于以採蘋南山之濱註言之曰賓也婦人之言行尙柔順故以爲戒察其忱藴藻之載祈得逢扁鵲之良醫俾安閨閫庶獲乘龍之佳婚可賁門闌女病後酬天門楣抱病曾申蟻懇以祈恩戶齒生輝爰冀龍輿之降駕謹陳結纓之敬用昭倚蓋之休切念女比因患鍵之牢籠實切私門之憂慮温涼燥濕莫知受病之由驚駭紛挐徒擾求醫之轍急呌閽於忍死期漏網以更生祝聲纔徹於碧虛應效已聞於淸戸謹陳醮醴答報高穹伏願恍兮惚兮來止戾止洞燭乾元之聽鈞陶坤道之成今朝弱息之䝉恩災消无妄異日名郎之爲偶克叶家人嬰孩病醮災興坎坷深切幼稚之憂識叩乾元庸效章蒙之吿讀谷切念孩男傾屆弄璋之喜深期跨竈之能豈其保抱之失宜遽爾痒疴之爲苦不識不知難明受病何由莫往莫來徒切良醫可遇爰請皇穹之聽冀消赤子之災伏願化德周流明威顯赫驚啼自止若逢昔日之張遼張遼大戰逍遙津小兒不敢夜啼醫療勿艱更遇當時之盧扁得繼繼承承之幸隆簡簡穰穰之休嬰孩病後醮酬天嗟顚㫬音旬之無瘳莫救童烏之苦楊子雲之子名童烏得顚㫬之疾顚昫目搖也望穹窿而有禱冀逢扁鵲之醫果䝉乾父之恩休遂脫震男之災厄切念男頃以病關之倚伏遽嬰患鍵之牢籠襁内提攜實切疾首痛心之慮暗中摸索誰爲觀形察脉之良爰肅素心許陳淸醮得沭好生之德竟逃幾死之危茲設蘭筵特酬藻鑒伏願千眞憐憫萬聖哀矜永除金鎻之憂長絶玉枝之汗秀如玉衍譽夙負於甯馨慧若韓符詩早明於瑟們疾病類疏語風疾建醮人有大患莫踰癱瘓之疾天無私親當盡祈禳之敬謹舒卑悃冀格高明切念某質受駑駘薦衰犬馬近以節宣之失遽驚緩縱之憂四體具而弗仁且致喎斜之狀六脉浮而莫接未明傷中之因其風有傷有中庸醫旣無三候之求術者徒有五行之議乃潔蘅宇肅啟蘭筵排閶闔門奏封章之丹篆望通明殿瞻捧座之紅雲伏願眾聖護持萬靈矜憫載投其藥得逢扁鵲之神工不可以風永絕齊侯之篤疾風疾後酬天昔因中風之疾幾致阽危今殫露奏之誠庸申報稱切念某頃以風痰之苦轉成癱瘓之災戰戰兢兢向啻千驚而百險昏昏嘿嘿殆將十死而一生非千覆燾之私曷致淸甯之喜爰申哀𥸤冀洪造之護持幸感靈光遂丹心之控告因循旣久昭答未能雖愧於中每念厥始今潔蓬居而申謝幸逢穀旦以丁臨酬昔許之良因祈將來之嘉貺伏願睟容穆若聰鑒昭然卑矜蒲柳之軀崇享蘋蘩之薦四時安㤗永無喎斜緩瘲之憂百𡻕和平常有福夀康甯之喜目疾初起眸子瞭焉深切披雲之患心君昭若庸申傾日之誠俯奏瑶章仰投天闕切念某近失五綦之養荀子目欲綦色耳欲綦聲鼻欲綦臭心欲綦佚此五綦者人情之所不免又曰養五綦而有具遽爲兩目之災身居暗室之中但能兀坐足履夷塗之上如際冥行不明莫致於悲眩曜徒憂於生纈謹陳淸醮用叩皇穹伏願鑒察無私鑒觀有赫金箆剖膜如逢龍樹之靈龍樹菩薩能醫瞑目銀海儲精可見子都之姣孟子不知子都之姣者無目也目疾後酬天目乃五官之主忽爲子夏之失明天者羣神之精庸效宣尼之致禱隨感璇穹之聽復增銀海之光敢後寅恭謹先申報切念某頃以靑眸之風入獲茲黑水之雲擾揣鎻抽關隱若出門有礙古詩索塗摘埴冥如塞路無通未能見曉以悲絲祗若眩搖而生纈徒切金箆之剖膜謾勤玉筯之點睛爰望碧虛啟丹心而控告果䝉洪造垂靑眼以卑矜兹陳淸醮用報皇穹伏願鑒觀如在臨照何私晈晈明眸可察秋毫之末皤皤皓髮卽如椿算之延足疾後酬天厥足用傷尙書說命若跣弗視地厥足用傷實切廢人之歎乃心克敬用申事帝之誠旣䝉覆燾之休遂脫蹣跚之患一萬二千精光之内自有沖和三百六十骨節之間俱無痛苦感恩若是報德何如切念某頃以步趍遽然蹠戾呻吟之聲聞於外憂念之患窘於中雖云周道砥平不勝所履縱曰曹溪路直莫得其遊伏地載祈𥸤天致禱已沐更生之賜敢忘垂死之盟肅啟芳筵特陳淸醮伏願仰企皇穹特垂洪造勿藥有喜俾消蹇難之虞厥足無傷遂得有常之慶不偏不倚亦步亦趍痁疾瘧備三因實切由中之慮誠存信念敢祈臨下之恩切念某六鑿相攘五綦並騁近因寒疾遽作沉疴陰動陽凝戰戰冬冰之冷陽開陰閉兢兢夏日之炎恐有甚於斯焉且不保其往也謹陳淸醮上叩皇穹願聖帝之降臨鍳凡情之迫切水神呵䕶載聞韓愈之辭痁鬼知歸毋添軒轅之祖痁疾後酬天昔邀鴻覆冀消痁疾之災今控蟻誠用報洪休之賜載祈後福式鍳前盟切念某頃爽節宣遽嬰寒𤍠或醫或炙謾施灌薰炷艾之功曰詛曰符徒律醫靈揮舟之力未知攸止莫敢或遑爰殫素悃之祈冀感蒼穹之聽誓心纔起生意漸回滅除烈火之炎驅退寒冰之冷潔陳大醮答報圓靈伏願九淸之昭鍳下臨一介之微忱上達不兢不戰永無瘧鬼之侵淩多福多祥常有吉星之臨照保産念生育之未形實切家人之慮望穹窿而有感能消无妄之災謹陳虛室之丹誠敬徹玄關之淸聽民切念妻某蘋蘩賤質蒲柳微軀將臨臥蓐之期深軫徹桑之念熊羆應夢且居猶豫之中蛇虺呈祥亦在狐疑之域惟冀保安之二字敢忘致敬於三淸爰敷玉蘂之章聊效瓊枝之薦伏願駕八龍而婉婉來九鳳之鏘鏘鍳予荆閫之情享我蘭筵之禮如生巽女願聞叶瑞於棠花若誕震男敢冀儲靈於桂子俾作盈門之喜慶尙幾就舘之和平得男酬愿熊羆在夢會申丹悃之誠蟻蛭酬恩庸格皇穹之聽切念妻質之甚弱命乃多迍傾因誕月之降祥實切履冰之加慮璋期再弄莫安載寢之心珠欲重擎未入捧觀之掌惟冀保安於中饋敢忘徼福於上穹果䝉乾父之休遂獲震男之喜兹盡獻芹之禮敬殫寸草之忱伏願雲祉用敷霓旌來駐䕶我添丁之累鑒予切已之祈更冀孩嬰克嶷克岐早識居易之無之字何思何慮永消童烏顧盻之憂喜自見於充閭能庶幾於當戸得女酬神昔孕棠花之夢爰仰皇穹今申芹薦之誠敬投洪造切念妻某氏頃以大期之至漢呂后臨産謂之曰大期深爲小已之憂雖巽得女震得男各由造化然乾稱父坤稱母曲遂生成乃瞻紫府之眞爰許碧虛之醮果得門楣之喜須增戸齒之光茲卜良辰特陳醮謝伏願載生載育旣已諧室之歡以長以成願早遂閨門之秀預禳瘟疫瘴癘札大死曰札瘥之爲患不勝切已之憂戒愼恐懼之在心母致噬臍之悔謹瞻玉漢恭奏朱章切念六慾内攻七情外騁豈作孽之可逭欲寡過而未能近觀鄰里之間遠視鄉閭之内疫氣之流行將盛愚心之兢戰彌深上奉庭闈幸有有常之吉下臨閨閫且无无妄之災雖徹桑未克先知然蔓草尤宜後慮爰設碧虛之醮冀消黑簿之災敢云在上之高高莫測由中之惻惻伏願寂然不動欲則必從六沴消而六極除預滅未然之奇禍五運行而五福備載爲將至之佳祥疫中建醮帝令風行因染相傳之疫人心自畏敢忘載禱之誠爰於人境以陳情敬叩帝閽而請命切念某愚而自用頑則弗靈違顏子之四非犯卜商之三罪況乃節宣不謹致兹祲沴交侵雖痒疴疾痛之憂誰能免此然燥濕寒温之脉孰與明之爰命羽流特陳醮醴赦其方死勿煩起死之良醫賜以再生永錫好生之大德𥸤天致禱俯地祈恩伏願昭若無私豁然有喜㪚沖和於經絡拯危急於膏肓收歛瘟風融作道風之披拂發舒慧日㪚爲瑞日之照臨疫疾後酬天疫方爲疾莫收瞑眩之功感而遂通允藉生成之力謹涓穀旦肅拜瑤章切念某喜溺燕安戒咅偷上聲相與語唾而不受也鴆音正毒雖有孳孳爲善之意豈無皇皇求利之心過不自知罰其可悔罪旣彰於積日病因染夫瘟風陰脉沉危且極陰胎之苦陽經傳變益深陽孕之憂嗟束手之奈何爲請命而已極果沐鴻龎汪惠得全蟻蛭微軀爰蕆舊儀恭尋前誓望碧虛其縹緲瞻綘闕以岧嶤上絳忱辭下祈睿鑒伏願不災不害劃祲沴以冰消曰夀曰康藹吉祥而雲委同前疫疾中有死者可用也昔因疫癘之爲災載先申禱今望穹窿而報德敢後寅恭謹殫昧死之誠庸叩好生之德切念某鴻毛微命螢爝末光言輕則辱行薄則辜不念厥德善小弗爲惡小弗去速戾於躬爰自仲春及於初夏明自逃於人禍幽實染夫天殃嚴父云亡繼逝巽女在沉疴之内幸獲全身震男居未疾之中殆將殞命兢兢危懼懇懇祈禳兹陳淸醮之儀用請皇穹之德死者不可作願言度脫於朱陵生而何所倚尙冀帡幪於洪造降之殊祉綏以繁禧疫疾送天符掌玉帝之符雖司禍福現金仙之相實主慈悲謹陳伏地之恭用叩都天之主切念某蠅蝸計利雀鼠求生貪癡愛慾猶恐失之受想行識亦復如是宜令皇穹之譴遽增黑籍之愆染此三災罹茲六沴未見盈門有喜可勝舉室爲憂爰依不動之尊願救不瘳之疾吉涓蓬戶肅啟蘭筵伏願降沖和於經絡之間歛癘氣於精光之内雷音電吼俾予無害以無殃日居月諸庶我有爲而有守疫疾後酬天符厥疾弗瘳實切有生之苦其尊不動能消无妄之災感極脯膺惠周頂踵謹罄由中之信敬殫報上之儀切念某頃以泡影之身遽染札瘥之氣辨明傳變誰爲仲景之良醫診視浮沉孰是叔和之妙手借日天殃之致是豈容人世之闕如爰依雷音電吼之尊敢冀日照月臨之德果脫鯨鯢之網得全蟻蛭之軀茲啟醮筵敬酧景貺伏願金容顯赫玉趾遷臨歛瘟癘於三百六旬永消六沴降禎祥於二十四氣克叶四時以謝以祈誠惶誠恐預禳天符患恐未然爰軫徹桑之慮尊稱不動敢忘蕰藻之誠謹陳琅函之詞特叩金容之帥切念某受材凡下賦性愚頑近觀六沴流行實切三思兢戰夙興夜寐豈無言行之尤朝往夕歸未免作爲之誤惟慮皇穹降譴時深黑簿增愆乃陳伏地之恭敬設都天之醮伏願震雷音於𨶒浮世上得聞赫赫威聲顯日表於紫極宮中獲覩煌煌眞相消我無形之過孽赦予有釁之罪端瘟疫後酬送天符有死亡者用之柄握乾符實主羣生之命化行坤載能消六沴之災惟旣窮而疾呼豈將安而轉棄切念某凡籠混處罪貫滿盈頃乖節宣攝養之宜遂染疫癘札瘥之氣慮疎徹桑憂深延蔓死於瘟司者已矣亡生生於病鍵者幸哉逃死爰盡丹衷許陳淸醮兹酬白水之盟庸效潢汙之薦伏願雷音震動雲馭降臨發舒解愠之風俱沾存殁敷顯垂光之日普照幽明染瘟後還慱身齋飯象人而用得逃螻蟻之生唯神之靈允藉鴻龎之惠有感必應無言不酬切念某素鍾罪釁忽染瘟災載爲切已之憂爰許慱身之願果沐皇明之德竟除黑簿之愆收其膏肓垂死之魂被以骨肉更生之力謹控由中之信敬殫報上之儀托物替災於以報朿芻之義薦饈致敬姑少攄藴藻之誠舉斯加諸孟子言舉斯心加諸彼而矣幸獲轉移於憂患恍兮戾止尙祈敷錫於康甯爰居爰處何慮何思染瘟十保鄉鄰有疾可勝延蔓之憂里巷無虞當盡徹桑之慮謹致三上杳之敬同申十保福之誠伏願爲族爲比而爲聯預消禍孽俾熾俾昌而俾夀普襲祥光鄰人疫疾還十保福受一㕓而爲氓孟子豈忍鄉鄰之有疾偕十家而保福庶幾里巷之無虞謹陳葵藿用薦蘋蘩切念某濫居人品遽染天殃莫收功於瞑眩殊切戒於戰兢屬在枌榆之末何可聽之庸申蔬食之恭必齋如也上論伏願鑒友助扶持之義除札瘥疫癘之殃一曰夀二曰富三曰甯均賴箕籌敷錫十爲聯五爲比四爲族相安同并優遊許粧扮罪人酬愿昔居病鍵曾申荷校之祈易荷校滅耳凶今效囚纍庸致結纓之謝切念某置身無道處已有慚頃以微弱之軀遽染痒疴之疾實切關心之慮何以逃生許爲滅耳之囚註見前從而贖罪一忱致敬果消未疾之憂三𡻕爲期兹展初朝之禮此愿一𡻕則爲初朝之禮二𡻕攺爲六沴之憂再朝之禮三𡻕攺爲一已之私三年之禮誠惶誠恐隱然居縲絏之中以禱以祈尙冀托帡幪之下餘災電掃諸福雲臻拜香自許請命玉庭實切兢兢之慮脫身鬼籙庸陳僕僕之恭子思使巳僕僕爾亟拜三沐三薰一𡻕一禮切念某德輕蟬翼利較蠅頭頃因調攝之失宜忽致痒疴之爲疾回予夀脉遍求倉扁之醫在我膏肓不勝彭堅之苦爰許鱔朝之禮冀垂鴻造之休有感必通果沐更生之賜無德不報容殫垂死之盟爰秉丹衷載申素愿拜手稽首敢忘致敬於腹心降志辱身上孟尙冀施恩於頂踵方境春醮六陰旣剝三陽旣泰方迎奉於龍丹五家爲比八閭爲聯敢敷陳於蟻悃天其有相日者無虞切念某等鄭里凡民周㕓賤士勿正勿忘勿助長旣已違之欲富欲夀欲逸安莫非圖此積悔過而盈罪貫稔愆尤而招禍端兹逢氣轉於洪鈞深恐名書於黑簿邀結枌榆之社共殫蘋藻之儀恭延琳宇高流敬演金經妙範仰冀皇皇之鑒俯垂赫赫之靈花雨一沾洗滌人人之殃咎條風四拂吹噓戶戶之祥休方境夏醮繪畫蓮舟用叶離明之序塵淸蓬宇載祈感應之誠仰望皇穹俯陳金簡切念某二三爲伍千萬買鄰經之營之惟計蠅頭之利八者出者俱忘鴆毒之危莫非橫目之民莊子孰是檢身之上書檢身若不及茲月臨於建已喜星聚乎同寅念蟻眾之無知命羽流之有禱庸殫微敬特舉常儀伏願廣推洪覆之私克順朱災之景阜吾之財解吾之愠舜帝南薰歌均䝉長養之恩休俾爾而夀俾爾而昌俱沐康甯之福祉方境秋醮月應淸商爰繪龍舟而集福露陳丹悃敢同蟻眾以祈恩俯奏瑤章仰投玉漢切念某蠅營是計鱗次而居過則弗攺善則弗遷已盈罪貫德之不修學之不講上論浸八凡籠置身罟擭之中中庸立足巖墻之下孟子幸際烹葵之候敬修藴藻之誠披金簡之靈文仰皇天之厚德伏願鑒相保相賙之義憫將恐將懼之情拂拂金風收歛家家之庛癘瀼瀼玉露發舒戶戶之淸涼上瘟神聰明正直之謂神豈難感格戒愼恐懼在乎預當盡祈禳俯罄丹衷仰陳淸聽切念枌榆結社蓬蓽偷生奈異鄉之疫疾流行而載路之愁聲洋溢聞之惻惻行者遑遑惟此羣居幸有有常之樂比諸越境且無无妄之災靜言思之曰已安矣然念遇災而後慮𡨴知思患以先防兹繪神舟特陳淸醮伏願瘟部靈祗垂印可城隍社令作證盟里巷往來長處里仁之樂鄉田有助永臻鄉黨之安賜我洪恩介爾景福送神舟五彩爲舟已盡通靈之妙八閭曰族其爲邀福之圖茲卜良辰特陳淸醮伏願來止戾止恍兮惚兮赫赫厥聲濯濯厥靈歸載家家之明月汎汎其逝浮浮其往去遺戶戶之祥光病許元帝瞑眩無功莫禦玉枝之汗靈光有煒爰依金闕之尊陳伏地以寅恭望鎭天而申禱切念某近因末疾遽作沉疴十死一生以在膏肓之域千驚百險將迷魂魄之鄉參苓茋朮餌之弗瘳黍稷稻梁飲而不下爰罄精誠虛室敬呼眞慶玄關涓潔陋居敬陳淸醮伏願禮吾者夀俾爾而昌驅電霧而施陰功狂災速去遊乾坤而收逆鬼道氣常臻昔陳拱宸軍人大半染患拱宸夢見神龜來言軍人染患川淨水一盂以揚枝對面洒之咒曰天罡大魁立驅電霧施我陰功狂災速去如此三遍卽安痊也病後還玄帝望玄元應化之眞不言而教申丹悃勤劬之禱惟疾是憂應若鼓桴報慚銖兩切念某積愆莫贖寡過未能頃乖榮衞之和旋致痒疴之苦問命實五行有蹇求醫則三世無良爰依金闕之尊敬許玉虛之醮言滕諸口誓問肺腑之盟病脫於身隨救膏肓之厄惠旣拜夫鴻龎酬敢忘乎蟻蛭頓首投誠上香稱謝伏願念速去災咒永臻無害以無殃化自在心錢常付有靈而有感啟聖記鳳翔府鍾進明見一道士化自在心錢進明問道人何方人氏道人曰吾姓裴名郭仕居武當進明拜求一救世之方道人於地拾錢一文付進明曰汝持此錢不拘水火疾病厄難將錢浸於水中以水灑之卽愈後帶回遇患者灑之皆愈病中斗醮斗運璇璣七政之樞常居其所人稟陰陽五行之秀惟疾之憂謹瞻宸極用罄雲臺切念某蜉蝣微軀蚤虱弱質惟知蝸角之圖僅切鱔朝之禮近因疾疚遽作沉疴一萬二千靈光乏元皇之正氣三百六十骨節忘太乙眞形爰攄丹悃敬奏朱章伏願三命靈官悉來擁護五臟神君各保安甯上生籍落死名俾爾綿延之夀增福基消禍孽錫予穰簡之休病後還斗醮天經以斗司消災解厄之權人拱乎辰藉起死回生之力冥心設醮刻骨酬恩切念安處窮居侵尋老景頃以痒疴之苦深惟顚眩之憂九竅百骸未獲安甯之喜三魂七魄孰施陶鑄之功爰瞻北闕敬叩靑都言纔脫口病已離身元皇之正氣偕來太乙之眞形護守謹涓穀旦式踐葵盟伏願應如鼓桴之隨恍若璣衡之運南箕宮裡南陵使者悉垂光北極闕中北斗神君齊降瑞俾夀山之鞏固增福海之突深薦悼類榜文道家孤魂榜太極便宜司爲通飭賑濟事據大淸國四川云云奉道陳情祈恩賑濟善士某憫念三途五苦十類九幽無祀孤魂甶子久沉陰府未覩陽光不仗超援何能證度今則壇開薦醮欵施給戒章賑濟沉魂生天脫化於是仗道判放淸微鐵鏆鴻儀全部印施太上九眞妙戒若干持誦遷神黑暗眞經百遍咒酒雲厨雸露法食一飱高懸鐵圍督孤皂旗一首插點光明路炬旗傘化施金銀錢山寒衣寶籙冥財普濟水陸兩途孤魂甶子均沾勝利頓悟宿因永辭泉壤之途克遂昇遷之果等因本司得此事干利濟除已依科關申外合行具榜昭告者蓋聞知生悟死雖鐵漢心也自成灰呂純陽詩嘿思生死事鐵漢也成灰逐影迷眞縱金佛身亦難度火傳燈錄云金佛不度火木佛不度爐泥佛不度水又臺父解金綱經金佛云云三佛顧形總不眞眼中瞳子面前人蓋此理本來顯著奈夫人只自冥頑刼刼波波澇澇漉漉求珠入海眼光時費盡經營堆玉成山氣絶後幾曾帶得業緣銖積罪稔貫盈或居於薛荔叢中或墮於酆都山内白粲粲髑髏之委棄黑漫漫魂魄之昏迷投河落井只自擔當塞窟塡坑伊誰顧惜萬種之云云奚似四時之僕僕何之柳綿飛絮雪翻風梅子黃時雨如霧惆悵秋光而呼呼覓覓凄涼冬夜而冷冷淸淸鳥猿總屬知音蒼蠅盡爲弔客以刻爲𡻕度口如年枯腸餒腹目生花瘦骨稜層形類草者愁端眞苦惱作何方便與消除幸至尊開解脫之門而齋主啟薦修之路餉汝以雲厨之妙饌灑汝以露掌之淸涼汝等好好思量休休執着遇𡨚家則各相解免同善會則大家喜歡懴悔愆尤三淸前叩頭頂禮超昇快樂八難中脫迹輪迴道家薦孤二十四獄榜文二十四戒出道藏經兹不重述有生必有死乃是道循環之妙無作亦無報著斯民善惡之因信地獄只在眼前而天堂不離心上汝等慢上蒼而因涕唾爰受針錐出下策而作穿窬遂遭劍㦸嗜酒肆狂而蚖蛇吞噬茹葷破素而狴犴拘囚破齋戒而履刀山喜淫邪而抱劍樹䧟良坑善受爐炭以燎焚害物傷生熾鑊湯而烹煮毁人譽已粉其身於杵臼之間肥已瘠人碎其骨於車輪之下吝於施惠者拔舌倚其强橫者分尸幸災樂禍則釘爾四肢說是談非則犁其三寸臥床屈足知毁形折像之尤壓石禁持見破卵傷胎之過𤍠汁灌喉因設毒寒冰沁骨爲欺貧造詆訾者沃以銅漿忘恭敬者拷以銕杖違慢經典則剉體頽落寺觀則截身喜啖䓤辛食火之禁難免盜摘花菓吞丸之苦莫逃若是業緣豈容縷數要皆在塵世千般做作到重泉一己擔當百千萬刼之沉𠗣多多苦惱二十四司之報應厯厯分明流作孤魂㪚爲野鬼慘慘於荒寒之埜哀哀於寂寞之濱菊徑梅林側耳吟蟲聲往恨楊園柳岸傷心啼鳥說來由雨滋魂魄淚盈腮月照髑髏形昭影幸今宵某建玉陽之法事宣鐵鏆之靈文現在身心假以蘭湯而澡滌本來面目賜之楮服以莊嚴便好將自己思量更莫待他人檢點懴非悔過回頭顧長樂之宮報德感恩拔足離酆都之境孤魂榜凡曰人心是名覐性活潑潑如珠在地光爍爍似月當天奈何引入於他岐莫識歸尋於彼岸是謂生爲有漏莫令死作無遮皇皇兮何之栖栖然而已幸天尊啟冥陽之會爲眾生開方便之門汝等五臺山下好尋踪百尺竿頭宜進步色是空空是色勿令認假成眞心卽道道卽心且自迴光返照故茲普示各令周知故榜蓋聞騎牛覓牛癡錯底安知勞碌夢蝶非蝶瞌睡漢枉自喜歡所以道諸由子等着娘袴子謾包纒借婆袗兒虛禮數隨婁和瘦而設些着實做模打樣而假作風流動七情交戰之戈磨六鑿相攻之刃心念牽枝引蔓口喃着葉安花欺善人而畏惡人殺窮漢而爲富漢三寸氣纔方斷絶七尺軀便莫施爲數堆土塊蓋休休兩帖紙錢都了了子喪孫亡無主者年深𡻕久有孤塋自受恓惶誰能憐惜棠開似醉空迷𡚱子之魂荷語還嬌漫想仙郎之色秋雨落兮滴滴怕到黃昏冬雪飄兮紛紛難禁淸夜惆悵四時之景凄凉萬種之愁幸今時某設齋作箇鼓籠頭命道宣揚秘密咒汝等旣來趨赴當作麽生獰龍額下急穿珠雞子殼中緩尋骨玄門黍珠可喫便須細嚼細吞廬林米價如何原是不生不滅切宜自悟莫被他瞞薦悼類榜文薦亡大意司額爲超度逝魂高陟上品事維時云云於是投詞象教授事羽人體蓼莪九我之章陳情報木披雲錦五篇之册致事迎恩霓旌絳節來從碧落之天玉字金書闡露玄科之密冀回慈化克副孝情未述凡悰先稱道職臣係云云誠惶誠恐稽首頓首百拜上言臣聞三炁攸分雲篆演度人之字五文開化天章垂濟世之書道非常道而名不可名玄之又玄而上極無上蓋大道至慈因苦海而開覺岸上眞廣惠念幽關而設明科始靑顧命法會罕逢尺素聞天齋筵乃建臣幸以凡愚幸參眞教慚無及物之功深積在躬之咎僣領詞情冒希鑒盼據大淸國云云奉道投詞爲亡乞恩追資拔亡往生遷神度命承服報本孝男通洎合家孝眷人等維日金爐騰瑞寶鼎飄香百拜抒誠一心皈命黃金闕内三淸三境高眞白玉京中六御六皇上聖四府八絃眞宰九幽十地冥官願舒靑目洞鑒丹忱伏以百行以孝爲先天地憑依於至孝一念以誠爲本神祗感格在精誠然齋範所陳用培冥福而哀思欲達斯建法筵孝男等泣血陳情請恩超度亡過顯考妣皇淸故待贈誥上夀某公諱某老火孺人之靈其來也春花艷秀玉免東陞生於上皇某幾十年某𡻕月日時係某地生長人氏享夀幾十幾𡻕蓋謂龜齡難保蝶夢易殘起臨川逝水之悲興長夜壑舟之歎其去也秋葉凋零金鳥西墜痛於今皇道光萬年月日時因恙夀終自魂歸於夜府升滯難期若魄投於泉鄉薦超當舉今逢首七之辰正隷冥府第一殿秦廣大王臺下校勘善惡之辰判筆回春之日哀投道力致薦生方男等痛念先君賦性仁慈律身樸素起家節儉備創作之維艱裕後辛勤著劬勞之罔極當茲景入桑榆人事方隆於奉養夫何形同電火親靈竟至於殞終風影與雲影而並㪚瞻依無從哀聲偕鵑聲以同悲追思彌切嗚呼望雲增感目力難極於南山舉前舒誠孝念䖍投於北闕寅具法信凡儀恭迎道侶於就凡居立壇修建靈寶度人十王往生九煉大齋一供幾晝良宵先於某月某日開啟至某日功完告竟壇中諷誦經懴云云靈文演處字字合眞乘之緖法號稱時聲聲禮具足之尊𤊔獻諸天光明蓮矩云藉此微儀申酬大庇仰體洪仁之德開通里壤之途進奏表詞頒宣符篆請迎恩詔敕降金書化黑暗而爲覺路啟幽域以作天堂請給太上敕赦生天公據文牒靈符寶籙水引支單各一角關撥隍祠運錢車夫力士送交嶽府掌隷某相弟幾十幾庫某曹官案下轉付當薦某親身楚領用佐生方永離泉壤之途獲證壺天之果切念木本水源承先緒於一統宗功祖德恢後嗣於千鍾畫壁悵於先容手文騐乎世業遺安在後勤隴上之耕耘分食居前娛桑間之修植桐必生枝瓜還綿瓞念本源而資始追功德以貽謀祭享不忘於𡻕時薦超甫舉於斯際於是具文請薦本支堂上故高祖某某次序列名右諸請薦眾魂均承善利頓悟靈明前亡後化巳生則記善當曹男魂女魄未生則安間福國共介餘休克昌厥後伏聞搖風北逝人間多𡻕去之悲白日西沉地下有夜長之歎眾緣皆假合羌過眼以空花四大易分離堪撫心而隕涕然而電光石火雖同嗟蒿里以爲家要之魄降魂升終共藉山凹而托體暴遺骸於野外雨灑風吹泣孤悲於宵中煙凄月冷是可憫也甯不傷乎特命全眞法侶爲宣無上經文仗此良因超離苦海於是云云普濟水陸兩途孤魂由子羣沾法雨共沐慈風奉九戒之規條脫質可棲神福地悟四梵之神咒超身則寄跡仙都陰境無拘陽光獲覩等因今則文詞鄙俗凟冒高穹翹仰雲霄俯首皈命云云伏願靑極覃恩朱陵降澤灑一滴之甘泉洗多生之苦惱迷雲㪚而慧日高懸孽海枯而心珠獨耀瑤琴奏空中之樂寶幢來天上之迎快樂無爲逍遙自在孝情不曁慈度昭然臣干冒天威下情無任䖍切之至謹意以聞薦悼類薦父九幽五内分崩實茹不天之苦九幽肇建徹頃伏地之誠瞻瑞靄而拜通明批祥雲而叶閶闔伏願開闢瓊關之鎻鑰出護法車森羅金闕之旌旗來擁御座薦父黃籙薦黃籙而薦嚴君報之罔極望紫府而瞻昊帝叩則必通謹告無量飛天神王並啟有靈福地聖主伏願都護九霄之鳳駕九鳳齊嗚祗迎八景之鸞輿八鸞並奏薦父靈寶演靈文之寶籙用紓杖竹之哀望法馭以遙臨少盡筥蘋之獻謹罄丹悃仰告皇穹伏願雲驅碧落之煙雲車戾止風掃紅塵之霧風馬來臨薦父通用俯念嚴君旣啣哀而人地仰瞻昊帝冀獲福以生天謹建玄壇用聞黑暗伏願湧玉局而爲聖座萬聖齊臨開金門而謁仙班羣仙並集薦母九幽痛慘萱庭建九幽之淸醮精嚴宇延十極之元眞朝儀整肅於三時日吉敬涓於四旦伏願上下虛空眾賢聖咸賜鸞輿山川洞府諸神明普垂龍駕薦母黃籙母恩未報遽抛紅塵夢幻之身帝德無私庸建黃籙薦修之供謹書素悃預告圓穹伏願雲擁靑霄來降千官之寶仗星聯翠蹕出迎十極之瓊車薦母靈寶小人有母遽爲黃壤之遊大道無私能濟朱陵之度宏修靈寶敬啟眞仙伏願紫府眞仙出戯塵寰之法駕碧霄眞宰來歆陋室之齋筵薦母通用北堂慈母忽捐榮養之歡東極眞慈能盡薦修之力謹陳素悃肅建皇壇伏願花月光中羽服翩翩輝寶座香風影裡鸞聲隱隱下瑶臺雙薦父母父之配天旣極天摧之苦母者猶地後深地裂之憂爰建皇壇用干洪造伏願香篆旖旎噴午夜之貎爐塵氛肅靜來九鳳之鶴馭雙薦父母無怙無恃可勝人子之憂思有因有緣實藉慈尊之救度謹涓穀日敬建蘭筵伏願現紫金身垂靑蓮相普示光明之境廣開方便之門薦祖父明明我祖追蝶夢以無從赫赫彼蒼罄蟻忱而有請少盡分甘之報冀垂救苦之慈王羲之牽諸子抱弱孫一味之甘剖而分之以娛目前一封飛翠剡之意上通豹闕萬騎擁紅雲之座下降龍車薦祖母人各有親痛失含飴之報天無私覆庸陳設饌之儀謹書墨表以陳誠尙冀皇穹而洞鑒伏願乘雲躡霧廣開肸蠁之誠心掣電轟雷永錫龎洪之厚福薦男昊天莫弔俄驚震主之亡冥地欲超肅叩乾元之聽預陳素悃肇建玄壇伏願雉扇齊開擁雲軿而降格龍旗輕展迎日表以來臨薦女情鍾息女莫知起死之因皈命眞尊用致往生之果仰天奏悃伏地傾誠伏願飛鳳鏘鏘相映鳳車之絢彩蒼龍隱隱瞻視龍袞之輝煌薦女壻魂驚蝶夢可勝嬌客之悲敬竭蟻忱庸致慈尊之禱謹邀淸侶肅建皇壇伏願乘鸞輅之雝雝浮空至止駕龍車之肅肅循序來臨薦伯叔痛哉諸父倐爲黃壤之遊哀彼蒼天冀脫黑都之苦茲申方悃敬告圓淸伏願香篆騰空瞻寶幢之冉冉燭花呈瑞來玉輅之翩翩薦伯叔母槐柯入夢痛傷從母以云亡蘂笈垂科哀叩慈尊而救苦齋陳玉饌儀展璇圖伏願霞珮頡方頁來降法車於聖境雲璈淸亮遙聞廣樂於鈞天薦道士蟬蛻縞塵雖蔑沉淪之苦鯨遊碧落尙資薦拔之功爰建皇壇特陳淸供伏願玄裳楚楚乘白鶴以來臨紫氣飄飄駕靑牛而至止薦悼類疏語薦父九幽齋設九幽敬薦嚴君之滯魄神馳三極冀沾昊帝之洪恩茲拔狴獄之迷切甚虎關之禱竊念先考艱難備厯疾疢俄生纔一日二日乃奄而亡繼千年萬年莫消此恨乘乘兮若無所老子充充然如有窮禮記爰仗道流敷陳玄教宣揚寶號繙誦琅函燈燦銀缸洞照黃泉之壤香焚玉篆遍通碧落之天仗此超昇俾於解脫伏願茭童傳信栢簡遞盟執靑節從白蜺陪飲於崑崙之所文粹陳子昻別中獄二三道人序執靑節從白蜺陪飲崑崙之所駕班龍乘紫輦追遊於石圃之間梁武帝内傳薦父黃籙嚴父棄諸孤冀獲朱陵之度慈尊憫其苦庸宣黃籙之科謹傳香於金童用投誠於玉帝孝男切念德慚後嗣禍及先君慘慘寢苦甯有偷生之念哀哀濕竹初無愛死之心五内若焚百身莫贖爰仗道力致薦生方燈耀九華破暗㝠於十地香焚百合徹芬苾於三天惟仗慈光超昇福地伏願先君鞭鸞馭鳳得陪府内之眞人食蛤踞龍長侍海中之仙友薦父靈寶燕山風慘凋零可歎於靈椿鳳闕雲開薦獻敢陳於蕰藻俯罄由中之悃仰瞻在上之高痛念先君百事勤儉一生慈善紫荆庭内怡怡伯仲之塤箎丹桂堦前井井兒孫之繩尺宜考而夀胡疾弗瘳星殞露晞夢幻遽形化莊蝶曰征月邁居諸薦厯盡羲烏爰法冲科敬陳靈寶尋聲救苦皈依東極之尊煉質凝神式舉南昌之典伏願錫賜洪造之恩解脫黑幽之苦排閶闔而履玉堦朝于帝所昇蓬萊而居金闕樂矣仙遊薦父通用九幽黃籙諸類皆可以通父有鞠我之恩豈堪傾逝聖無棄人之理普與超昇謹焚三界淨香敬啟九霄御座切念先考某陡棄紅塵之世俄居黃壤之間身厯黑幽孰是超生之所眼看白壁曷勝忍死之情爰按玄科用超碧漢拜通明之殿仰瞻捧扆之紅雲排閶闔之門俯奏羽章之丹篆伏願先考脫其凡骨直入蓬萊道山之巓陟彼仙蹤徑入長樂法宮之域薦父通用幹殞椿齡實切寢苦之苦靈資栢簡庸陳薦藻之誠上祈洪覆之玄穹下燭黑幽之黃壤重念先君之傾逝豈勝後嗣之傷悲入室想其蹤巳成陳跡倚廬盡於孝徒切傷心爰仗羽流特申淨供伏願童子持斻來接引慈尊宣勅與提㩦霞珮頡頏脫纒囚於㝠地雲璈淸亮聆廣樂辰鈞天同前哀哀我父曷酧罔極之恩赫赫彼蒼可遂超援之力一生一死之抱恨三沐三薰以投誠以男等痛念罪積厥躬禍延先考跼高蹐厚念遺體之惶安出幽入冥痛營魂之奚往謹邀道侶敬演仙科誦琅函玉笈之文解鐵鎻金吒之苦伏願業除黑簿名著丹臺入聖域之優遊端若蛻遺而成聖受仙家之快樂儼如羽化以登仙薦母九幽傷心母地之傾頺不勝萬死稽首昊天之哀𥸤爰建九幽願開解脫門敬啟超援路痛念先母塵沙賤跡瓦礫微軀偶忘綵服之歡遽作黃梁之夢呱呱而泣念無恃以何依杳杳之容痛有身而莫贖恭延法侶用闡仙科念孩提之童且愛親敢忘薦拔而太上之德能救苦惟冀感通伏願翼然若臨洋乎如在鑒我一日三朝之禮消其五苦八難之災昇金闕而宴淸都永侍羣仙之座樂瑤池而環翠水常從王母之居薦母黃籙痛失慈幃慘視綵衣之樂光依帝座輙修黃籙之齋控丹悃以投誠冀朱陵而超度切念母幻身俄疾撒手便行音容杳而莫見莫聞肝膽摧而以思以慕不假東極慈尊之力曷超北都幽趣之魂爰命道流敬披仙律用貢芹誠之禮敬繙蘂笈之文一日三朝遙望通明之殿五苦八難冀離浩刼之家伏願先妣執節捧符六百靈童常擁護持幡舉蓋三千玉女共遊行薦母靈寶慈親傾逝可勝忍死之誠帝德含弘常軫好生之念爰修靈寶特叩玄眞切念先妣世網纒身凡籠厠跡勞心役役未離刼刼之塵沙營魄茫茫遽作滔滔之逝水嘆劬勞之莫報惟薦拔之可投敞壇壝以陳儀潔家庭而蕆事迎九光之鶴輅迓八羽之龍輿伏願道蔭宏敷眞庥並集獲慈父之接引離北都而昇南宮伴神女以追隨謁東華而侍西母薦母通用變生綵服傷心遽失於慈幃儀肅皇壇稽首敬投於上帝仰瞻芝蓋俯奏楮詞切念先妣齎恨終天遊神何地深恐黃泉之沉溺未臻丹闕之超昇爰潔蝸廬䖍邀鶴侶闡東極好生之德演南昌度死之科伏願先妣翠水瑤池躡仙踪而侍宴朱陵紫府煉眞魄以還神薦母通用風慘北堂忽作槐柯之夢露忱東極庸申栢簡之盟追冥路以無從望玄穹而有請切念先妣蹟遺萱砌數殞椿齡寂若音容不堪回想杳然靈魄未識何之爰闡仙科敬修道筏致玉饌瓊漿之奠宣琅函寶笈之文伏願一性眞如三魂不昧蟠桃池上尋王母以遨遊丹桂庭中陪羿𡚱而憇息同前北堂絶影以無蹤莫遂劬勞之報東極尋聲而救苦實嚴薦拔之科謹以丹衷上干洪造孝男切念遭茲酷罰延及慈親目覩綵衣空洒戲庭之淚身披絰服徒興陟怙之哀旣不能盡榮養於生前又何忍缺薦揚於殁後茲邀法侶載演靈文爇檀熏沈郁之香設桂奠椒漿之酒伏願玉書金籙准元始以告行寶閣瓊窗尋姮娥而受記雙薦父母塵生綵服莫追二老之慈容儀肅皇壇庸闡三淸之妙教盡此天闕之禱拔其地府之迷仰冀慈崇俯從孝悃切念某雙親傾逝五内分崩昔愆尤銖積之無知致禍變貫仍之叵測悲風慘慘悵椿樹之空庭墜月沉沉慨萱花之隕砌不假薦修之力曷酧鞠育之恩爰命羽流開宣貝笈敬設椒漿之奠宏繙蘃笈之文伏願先妣若存便作桃源之仙子嚴君如在長爲槐里之眞人列仙傳偓佺槐里採藥人也食松實能飛行捷走同前孝子念親莫盡怡愉之養慈尊垂憫持開濟拔之因庸獻芹誠敬申栢簡孝男切念雙親艱難萬狀孤苦一生母也云亡空致倚閭之想父兮旣逝徒興陟怙之悲靜思冥地以何之欲報昊天而罔極爰邀淸侶用展玄儀宣琅函寶册之文備玉醴金漿之奠伏願考妣冰魂儼若雪魄昭然駕鶴乘龍尋十二神仙而晏處跨鸞馭鳳並三千綏女以優遊薦祖父我祖臨終已盡受終之托維孫思始敢忘敬始之謀爰望虎關敬陳蟻悃少盡分甘之報冀垂救苦之慈切念祖考賦性貞淳持家勤儉幸享龜齡之福方深燕翼之謀豈期二豎之爲妖遽成永訣遂使諸孫之失望徒切含悲茲集法流聿修善果少佐超昇之路用開薦拔之門伏願萬靈垂慈三淸叶宥置身南院參隨南極老以優遊着脚東華陪侍東王公而快樂薦祖父風慘北山莫盡分甘之報雲開東極庸申救苦之哀恐先翁忽墜於冥途憑道力俾超於樂國寓意芹誠之獻是用吉蠲投誠栢簡之盟庶臻薦拔伏願先祖抛除罪網永離九地之幽關濟度法航竟入三天之玄境薦祖母仰至尊而建靈壇仙科有式救祖母而超極樂濟度無窮謹殫俯首之哀用致陳情之表切念祖妣恩深劉母李密陳情表行守班姬意謂夀齡可享龎洪之福豈期永訣徒懷烏鳥之私陳情表句杳杳魂魄未審何之寂寂音容不堪回想爰按玉簡之文敬展瑤章之典伏願南昌濟死以度生東極尋聲而救苦爰淸爰靜優遊八景之烟霞何慮何思笑傲三山之日月薦祖母因祖母而痛心莫致回生之力望至尊以埀念願申起死之哀切念祖母鬼籙旣登神魂奚在有百身而莫贖無一念之可忘爰陳栢簡之盟用致芹誠之獻伏願濟法橋於苦海度道筏於愛河鑄魄陶魂永從丹臺之玉女奪胎換骨常隨紫府之金仙薦男克嶷克岐方際添丁之喜不知不覺遽成哭子之悲疾首痛心盈襟雪滴爰盡薦拔用佐生方䖍𥸤高眞之駕敬宣上聖之文勅十符之秘詔導出幽關闡三洞之靈書引登黃道伏願瓊仙降佑玉帝垂慈八萬四千之綵女同喜追隨三千六百之靈童咸來接引同前痛傷遺體可勝當戸之憂薦度亡魂庸致叩閽之力一生一死之抱恨載祈載禱以陳情言念亡男性喜安常力能幹蠱意謂龜齡之可永綿綿延延因何蝶夢之遽成恍恍惚惚棣之恩情難訢萱堂之淚眼欲枯爰命黃冠特修素悃栢簡宣吿於冥府蓮燈照徹於幽都伏願消黑簿上靑篇永脫三途之苦難出黃泉升碧落常安八景之逍遙同前愁結燕山無奈桂枝之催折誠陳鳳闕庸頒栢簡以超昇冀冀以祈云云而請庸念亡兒艱難薦厯疾疢俄生閤室懷驚瞑眩有如於冰炭倚門失望危亡益甚於風燈蝶魄何之鼠憂奚借爰邀素侶敬展玄章伏願亡男遊遍十洲三島所樂所往脫離五苦八難何慮何思薦女愛憐巽息偶愆芣苢之和疾甚震驚遽殞蒯菅之質爰舒下情冒聞上聽切念亡女稟性温良賦姿孱弱幻身嬰疾悠然忽棄於蘭房眞魄何之意者尙留於槐國敬邀瓊侶用建瑤壇欵閶闔之門章封紅篆望通明之殿誠竭丹衷伏願姑射眞人引入五明之宮闕姮娥仙子同歸八景之樓臺同前悲切悼亡情未忘於巽息禮勤追薦誠敢叩於乾元伏念亡女志潔藻蘋職供箕帚幻身纔疾撒手便行嗟苦海之沉淪慮愛河之浩𣺌爰申栢𥳑敬啟蘭塲瑤壇禮玄極之尊寶笈演赤文之秘伏願一靈昭若七魄儼然着腳藍橋尋雲英而爲伴侶置身桂殿呼月妹以作證盟薦妻中饋云亡莫救北都之苦趣下愚致敬敢投東極之慈尊丹悃哀陳皇穹昭格切念亡室實生令族來配于門旣勤織紡之勞猶謹蒸嘗之奉深幸龜齡之悠久豈期鸞鳳之分飛戚戚怨懷念鼓盆之徒切明明正刻嗟墜劍之何之爰啟蘭筵特申芹獻延高眞於龍陛遵法戒於鴻文寶炬輝煌燦燦玉壇之夜月金爐馥郁飄飄金闕之香風伏願三寶垂慈萬靈矜念丹臺名列逍遙乎銀色界中黑簿罪消脫離乎鐵圍獄内爲亡婦禮懴疏亡婦姓周某智術卑陋時命迍邅十指懸錐一身臃腫是以酷罰用降宜逮厥躬豈其罪孽是波竟貽伊婦旣愚迷而莫辨尤憤鬱以無從敢布下忱仰祈慈鑒蓋聞福過生災器盈招覆若流離困苦已經世境難堪而疾病死亡復遇人生不幸豈是今生罪過良由宿世𡨚愆婦周一窮被體萬苦攢心齠齡操帚三冬曾擁嚴姑壯𡻕空帷萬里未歸弱婿浪得人身四十年厯盡艱辛三十載牽鹿車而共載常飛甑上之塵對牛衣以長悲誰裂輿中之絹居不謀于服食病無力于醫巫歛止敗絮奠仍藜藿無梅生嫁時之衣有昭𡚱洗面之淚巳矣一生受諸苦惱忙茫去刼願脫沈淪前生罪今生受過後世因今世未作望慈悲普照度拔弘施海若迴風飄覆舟于彼岸山靈出雨種枯薺于來春轉女身作男身化苦境爲樂境猶居濁土當抛離別之悲若作姻緣無復朽愚之配𤃉誠懴禮短疏哀祈中年產死夫薦妻伏以百年偕老深期梁鴻舉案之歡一疾弗瘳忽致莊子鼓盆之戚嗟死者不可生也非慈尊孰能救之痛思亡室來歸于家克宜其室喜定前緣之分可期後嗣之昌生男已獲䑛犢之喜育女而叶維蛇之徵載期弧矢之懸俾得箕裘之續懷躭幾月未當坐蓐之期臥病一朝遽作夢槐之戚千萬事縈心之恨莫可名也十幾載結髮之情竟成永訣躬自悼矣謂之何哉恐墮血湖之獄爰修水陸之齋敬陳芹獻之儀用薦荆釵之婦寶炬輝煌燦燦寶壇之夜月金爐馥郁飄飄金闕之香風哀干道力濟彼幽靈云云伏願一靈昭若七魄儼然着腳藍橋尋雲英而爲侶伴置身桂闕呼月妹而作證盟所樂所性何慮何思同前百年偕老深期梁鴻舉案之歡一疾弗瘳忽致莊子鼓盆之戚嗟死者不可生也非慈尊誰能救之切念亡室克宜其家來歸于室豈意兆困宮之厄居然爲坤壤之遊嗟雀屏長往以銜哀痛鸞鏡孤飛而失侶亡之命也嗚呼天乎爰申白簡之盟敬設黃籙之供伏願亡室一眞顯著萬刼消除霧鬢雲鬟得侍蘃宮之仙子冰魂雪魄追隨桂殿之姮娥薦夫夢入南柯實切卿卿之愛哀投東極可勝婦婦之情涕泗滂沱神魂殞越痛念亡夫處世身直約巳儉勤一疾弗瘳遽䜟鳳拳之集百年永訣空嗟鸞影之孤營魂漫漫悲懷戚戚爰𥸤穹蒼之聽特申吿白之詞奠桂酒酌椒漿蕆朝儀於三覲儼楓宸萃芝蓋來法馭於九霄弘敷至道之精大啟玄關之秘伏願身心不昧魂魄如存字記星宮悉除巳往不悛之尤悔名書月老再結來生未斷之因緣同前痛失藁砧忍抱別離之苦盟修栢簡敬陳哀𥸤之情冀於有感而必通軫我無夫而曰寡切念鵬飛叶䜟蝶夢俄成寂若音容不堪回想杳然靈識未省何之爰按沖科特修妙供伏願朱章昭徹黑簿盡除隨侍仙班竟超昇於玉闕載乘道筏快度化於金橋薦兄弟吹箎播詠方欣和樂之懷易簧致驚遽切哀號之慘爰申丹悃用叩碧霄切念兄弟挈挈利塗營營世網乃釁鍾於蝸舍忽變起於鴒原夕對春風惆悵棣華之難韡早觀朝露咨嗟薤葉之易晞爰仗羽流特崇齋會致玉醴金漿之奠宣琅函寶笈之文燈耀九華顯幽途之日月香焚百合㪚法界之氤氲惟伏洪慈免消黑業釋三生之咎對脫五苦之辛酸骨蛻塵凡竟作丹臺之仙侶身遊聖境長依紫府之眞人同前鴒原日永素深同氣之恩雁陣風寒俄起斷聲之慘爰罄一得用叩九霄切念某志切孔懷情堅相好暮煙遶砌忽驚棣蕚之華夜雨對床遽作槐柯之夢歎音容之已遠知魂魄之奚依欲除黑簿之愆敢忘朱章之奏伏願誠矜方赤惠降圓淸脫迹酆都仗童子持斻而接引栖身蓬島賴慈尊敕簡以超昇薦姊妹生而並室實同一氣之成死則殊途莫致百身之贖用叩龍鸞之法駕爰殫蟻蛭之衷情切念蝶夢迷眞鳳拳成䜟惆悵連枝之秀頓爾凋零凄涼拱木之魂杳然知識乃延仙侶敬演沖科寶笈琅函敷暢玄玄之旨金鍾玉罄振楊朗朗之音伏願桂子宮中授受長生之秘訣麻姑山上優閉不老之光陰同前死生有異曷勝同氣之思覆載無私庸致齋心之禱切念亡某育旣同於父母念實切於弟兄奈何摧樹之悲遽失連枝之秀悠悠黃壤深虞黑簿之書愆望望玄穹用奏朱章之封事伏願霓旌接引飈馭追隨未終今世之人緣願歸薦拔倘契來生之眷屬復遂團圞薦丈人親叨半子每懷外庇之深聽凟圓淸用竭中孚之敬切念岳翁某頃斷黃梁之夢遽抛黑業之身仰慕冰淸莫致婦翁之見俯殫露悃少攄子壻之誠敬仗黃冠肇修玄教伏願白虬穩駕八騫林下得遨遊翠鳳可騎五明宮中聽受記父斃子命弟薦言念吾兄幼而渾樸長覺憨愚交不擇人習爲浮蕩之僻性乖違子職素失父母之歡心責善則離骨肉幾成陌路臨笞莫避身命竟斃泉途非冥頑之弗靈實習染之固結父豈無愛子之心當前勢廹難巳兄自求喪身之禍事後情實堪傷嗟雁行之失序誰侍饍於庭前念手足之情深建淸齋於刻下憑斯道力可爲遇善之亡人仗此經功不作含情之枉鬼宿孽冰銷假若再生休似此靈明頓長還期受質樂安然俯希天德默膺薦忱寅具信儀薦姐兄痛念姐兄無異同氣情關乎密戚誼屬乎至親往來常促月麥以談心欵洽輙班荆而道故方幸姐有終身之望無破鏡之嗟奈理有可憑數實難必一旦乘鯨去何年駕鶴來嗟乎一朝之歡娛易盡三生之聚會何常别在一夕離則千古冥途旣往逝魄何依須憑悼薦之功直指超昇之路薦妹弟嗟我妹弟情關至親念蘇軾之德我非同羣思少游之才君其流亞值膂力之方剛知圖謀之遠大胡因一疾竟赴九原酬酢往來不聞生前笑語𡻕時伏臘難覩殁後音容兹伸至親之情謹藉慈航之薦薦牛疏奏爲大淸國四川云云奉聖投詞度畜超生迎祥信民某是日焚香上叩洪造意者民陳詞切民務農爲本家畜耕牛犁田耕地厯經載甚爲幸苦詎意今月日倒斃於家當卽擇地瘞埋民憫念斯牛雖居異類秉賦同然戴角披毛實係前生罪過犁田拽地了還夙世債愆饑渴皆由乎人寒𤍠豈敢怨天隨驅使而不知其勞任鞭策而能受其苦一但弛擔見斃吾人甯不歉然爰藉經功而開豁敬憑聖力以超甦得覩天光實爲慶幸寅具法信凡儀於今月之某日厰設蓬居仗延道典諷誦某經上希元仁克加矜憫等因兆領詞難抑依教奉行須至具疏申聞者右疏具申聖號位前伏乞仁慈俯賜昭允鑒小子之誠懷釋大牢之罪苦經輪迴而蛻脫毛衣離苦境而超生善道長居福地永處樂邦民叨安堵聖眷何忘謹疏重刋道藏輯要重著心香妙語卷之三終
