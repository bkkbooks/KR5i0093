canonical_identifier: bkk:krp/KR5i0093/CK-KZ-jye/v1/juan/1
seq: 1
front:
  text: 心香妙語重刋道藏輯要心香妙語序粤稽上古之人草衣木食崖居穴處皆夀百𡻕而正寢燧人氏
  hash: sha256:15f63d8ebbef8e3eda49e11f3f31377b2530c9895ee63e7c8bd70f1b115bf92f
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_01p001a}
body:
  text: 出鑽木取火烹飪興焉人民恣其血肉火食爍其臟腑淫慾枯其精血則百病叢生不盡天年夭喪者多祝融御世見人恆罹病苦爲人咒誦故稱帝曰祝誦氏由是祝由有科與民祝疾治病其科留世卽今之巫覡是矣行爲皆取諸符篆未聞有疏奏事意者乎第晉漢之間天王授大洞法籙於文昌太上傳盟威經籙於天師而用之者亦籙符也五代時廣成先生編立金亭儀制而始有表詞箋奏疏狀關申用文字者自茲始矣厯年旣久訛誤恆多前明金甯二眞人著靈寶文檢呂樸菴先生著道門定制其中符𥳑兼施表奏互用而疏之一款未必全美予自童年參習經教聞有心香妙語心實慕之乙酉𡻕所刋者乃前人之餘筆也丙申夏新繁譚子道遠送來殘書一帙予捧誦之斯爲正眞之心香妙語展卷細閱其中疏意分門别類詢屬鴻才果非尋常手筆實爲濟世金燈但書出自明之正德元年厯今三百餘𡻕蠧蛀蟲傷篇殘紙缺而著作之名已失噫書存而名不彰冺沒當時之苦心良可嘆也予竊何幸得見此書獨恨得之晚景雖有志行而力不逮也但不忍遺棄謹按原書親手抄錄脫略者補之錯謬者正之俾厯善本付梨棗而公海内庶不冺前賢利世之㜑心亦幸成予仰慕之素志今功落成爰弁數語以誌愚衷時大淸道光二十年端月綿竹退隱陳復烜含樸時年六十有八題於眞武觀之芥子山房
  hash: sha256:aa64e19e247d67da82398498be0078c6696635f012e978c2ef2868a849dd7bd9
