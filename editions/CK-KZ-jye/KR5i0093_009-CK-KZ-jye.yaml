front:
  text: 心香妙語重刋道藏輯要增補併儷心香妙語卷之四
  hash: sha256:da9125a24a8dc7848251e207447a1faffd7584ecaa68c706501391a4048f8b0d
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0093_09p001a}
body:
  text: 綿竹退隱陳復烜含樸校輯嗣派徒張軫駐參閲本雲趙和芳姪徒王本崇雲瑞派徒孫江合義體仁馬合乾徤堂姪徒孫鄧合順希襄門人蔣本遂繼順彭韜藥王四月二十八日白鶴下天東片片翻成銀屑黃花凝地馥枝枝釀出金漿感大吉之洪仁啓小草之素悃詞爲眾等從容處世厚樸持身意以懷仁細心防已佇立蜀地全䝉神曲之恩安息景天每托福神之庇幸免狼毒爲憂齊頌玉京厚德兹值夀域蟠桃各捧瓊漿之獻趁此民凡遠志齊登兩寶之堂眞香兢進槁本䖍申恭惟藥王大帝德應千年功高百部濟人於大地合鄉沽五味之調和渡物以連翹橘井值諸靈而解脫金沙頒賜福祉駢臻伏願國老垂慈靈仙施惠恩膏宇宙蓬門沾甘露之芙蓉澤瀉塵寰蔀屋樂菩提之善果男村淸吉曾䝉補故之庥女願平安悉慶長生之福恩流四物德沛十全保嗣言念蒲柳微姿裙釵弱質幼年待字罔嫻内則之儀壯𡻕于歸未叶家人之吉芝蘭種幾樹不經秋已先凋熊羆冀此生再弄璋其非晚縱弗菲儀之俱冺何緣嗣續之維艱巾幗效皈依思解厄於三官妙品綠窻勤洗滌叩慈悲於千葉蓮池燈燃天地水官托威光而見性齋持正七十月甘淡泊以明心幸鬻豚雛便是擎天之柱況丁良月更爲結果之期遇弱乳之二齡懴業根於三載忱抒丹悃醮演黃冠伏願列聖垂靑虛空生白保眼前之赤子克岐克嶷佑堂上之翁姑無災無害嫓徽梁案夫婦齊眉繼美謝庭兒孫繞月麥不盡凡情統維默鑒三月奠宅彭賓柳吐黃金瑞映畫堂增色桃呈赤錦光連彩壁生輝覩戶外之敷榮思庭中之迪吉詞爲某忝列儒林幸承祖業念仁爲安宅固無事侈棟宇之觀思室以庇身亦何敢忘經營之計憶昔䜿造志切乃得輪奐維新不必峻宇雕樑但願爰居爰處豈謂翬飛鳥革惟期攸躋攸𡨴生於斯長於斯堪比苞桑之固饘于是粥于是恍同磐石之安想當年靑烏攤書固已時良日吉到今朝黃冠設醮更希人傑地靈旣奠鎭之情殷實禱祈之念切伏願吉神呵護永叨瞰室之祥福頻臨時有安堵之樂無災無害湛熾湛昌庭爲種德之槐庭階玉樹屋作添籌之海屋簾展烟霞松茂竹苞千年有變蘭聲桂馥百代䝉休百人鎖秉性端方存心坦直在昔治生念切日以貨殖苦躭心而今繼祀情殷專爲後裔愁滿腹年五旬而僅茲弱息何殊秋秒葫蘆嗣累殞而留此孤根正是枝頭碩菓承先是寄視之如掌上之珠啟後攸關望之若天中之日偶占疾恙遂爲契胆提心幸際康𡨴尤願延年錫福兹逢初度喜看百翫取㩦願祝遐齡特糾眾悃同助百心如結結成金鎻到人間眾志求恩恩脫童關於稚子論黃口無識何罪何孽豈容效縲絏𡨚牽然自古相傳免厄免災姑爲此拘攣圈套一紐纔成又一紐有加無巳擬添海屋之籌連環之内繼連環百鍊千錘共寄河山之永天長地久皆由此日之纒綿日升月恒卽是將來之紀算建醮脫耳環彭賓賦性庸愚存心渾厚齊家念切惟祈合室平安慈幼情殷尤冀後裔淸泰弄璋良足慶愛之宛若柱擎天震索更堪珍視之何殊珠在掌憶昔安排八字欲於命剖瑕瑜爾時推算五星直道時逢關煞爰設計以解厄用貫耳於髫年論服餙攸分豈可等男于女而遐齡可卜何妨效女於男雖曰重而反輕似珍重之未至要知貴而若賤實愛貴之良深鍊以銀鐶制姑從俗鑄以長命字豈虛刋旣懸掛之有年自災星之悉散茲當弱冠理宜棄之如遺况列儒林猶難服之無斁特逢聖誕而解脫敬修淸醮以申明伏願澤及無窮恩施靡曁災消厄散從今無慮無虞否去㤗來嗣是湛昌湛熾予以鶴算誦讀可成錫以龜齡宗支有托翻船遇救謝神其人執板順流正遇大石始得船渡秉姿庸陋賦性愚頑誦讀無成常愧功疎螢火貿易有志竊期利倍蠅頭憶前𡻕往川客路幸逢淸吉何去冬旋梓靑灘忽受驚惶貨失而飄蕩無存已堪慘目身危而存亡莫定尤是寒心執板縱未沈終愁下隕順流何底止莫必登高想從井非人爲誰是陷身拯溺思救命惟帝力爰是籲天連聲幸祝吿有靈正遇中流砥柱果神威暗助隨遣舟子相援起死回生恩同再造逢凶化吉德實難忘特展愚誠敬酬仙闕伏願澤及無窮仁施靡已永叨眷顧繼此舟楫平安長沐栽培且俾囊貲充裕凡情不盡聖鑒孔昭婦人朝五腦山彭賓威持鐵柱永彰感應於西陵足踏鳥騅遍護生靈於南國人咸千呼而千叩我亦載禱而載酬詞爲某貞靜微姿閨閫弱質機聲鳴夜月無分酷暑嚴霜奩色淡春暉盡是荆釵裙布傷夫君早逝不忍聽蛩泣淒涼念弱體孤寒怕復聞雁鳴和協摻内事復摻外事全憑一已經營爲兒忙復爲女忙但願四時淸㤗自揣數年内寒衣饑食稍稍可慰初心何堪今𡻕中𤍠去潮來忽忽病逾半月茶湯累廢榻前之排列徒存寢臥無常枕上之纒綿倍至好傷窮人莫吿祗許暗裡冀神功猶幸賤體無虞得向明山酬帝澤伏願蓋天之覆育無私默相人間休咎帝主之聲施有赫暗庇宇内禎祥長年康㤗免災傷喜見冰消霧釋畢世淸𡨴歌矍鑠好同㜈煥松輝幼子柱擎天永保承先啓後弱女珠在掌更祈長大成人合室沾恩普門戴德謝雨四民異業五穀同資托命借長鑱怕罹周宣之旱棲身惟半畝久膏商傳之霖況是某年更爲樂𡻕自水耕而火耨羣歌再足千家遂庾冀而倉盈共告祥成萬寶倉箱自擁敢忘高厚之恩霡霂誰施擬報秋冬之賽忱同獻曝念切傾葵伸淸醮於黃冠酬盟心於白水祝斯年於萬史臣登大有之書冀嗣𡻕以興牧人叶多魚之夢請看此日園林場圃三秋好雨知時佇見來春陂澤池塘一色餘波泛碧凡情不曁睿鑒惟昭商歸慶王爺彭賓天貺良辰樂覩般般勝景南風解掃愠除種種愁思好事到人問凡情達帝座詞爲某不士不農亦商亦賈棄梓里而適異域無非貨殖情長憑桂棹以濟巨川只爲身家念切從流上從流下那辭來去辛勤或乘槎或乘桴敢憚風塵寂寞幸䝉眷佑得慶康𡨴五湖四瀆任舟行兢頌風平浪靜九曲三壪隨舵轉齊歌海晏河淸試問舟子逍遙賞月迎風何其中流行自在請看畫船簫鼓怡情悅目孰非江上沐恩波知屬神威敢忘大德爰伸寸念恭祝遐齡伏願仁夀厯千秋惠澤遠同天地英靈鎭萬古恩膏永著波流或耀武以乘風飛帆日渡千江景或揚威而破浪輕舟直過萬重山無災無虞任是惡水怪風歌肅穆不憂不懼憑他深灘大澤慶和平將履險如夷直如一毛之渡庶同船過港是乃三世之修朝沙府東嶽彭賓畢生魚魚終朝鹿鹿琴瑟偕老敢嫓舉案之𡽪豚犬併行克慰負薪之願還不盡兒女孽債打不破名利重關彭殤自古難齊夭夀誰能不二圖室家之保聚平安兩字如金撫骨肉之團圓淸吉一生是福感深高厚効崩角於沙街德荷栽培厪傾葵於嶽府伏願岱宗賜顧東帝垂慈握鍾毓之權衡那借休凝蔀屋抄陰陽之槖鑰何難慶集蓬門永符已往之恩膏不替將來之眷佑請經伸𡨚後懴悔謝神彭賓秉資質樸賦性庸愚忠厚常懷從不損人利己詐愚悉冺絶無口是心非立念惟恐自慚涉世尤虞外患詎前爲借貸心實無關忽今被牽連衷多受屈明知神不可褻何敢冒瀆尊經無奈情有難伸因而妄干帝訓凜天顏於只尺念切燒香捧玉訓於當塗情殷拜跪小民無識只圖𡨚白於羣倫大聖垂憐諒不計愆於俗子何疾染於一旦忽飲食之維艱且心若乎暫迷竟語言之多亂乾乾惕惕恐獲罪於神明戰戰兢兢懼干怒於上帝特修醮典懇冀寛容伏願天恩下逮聖德宏施憐庸夫之無知愆同瓦解念一時之誕妄過等冰消否去㤗來頓除疾恙齡延福錫永慶平安中元施食程宗洛聖會良辰仰見盂蘭嘗百味中元令節遙瞻皓月映千江届白帝之乘權正地官之司令輿情聿展鄙念䖍伸詞爲某溷跡熙朝忘形化日原無奢願一家淸吉卽爲破格之恩敢有苛求兩字平安便是如天之福丁新正之多故不無意外恓惶徂長夏之無虞俱是冥中呵護人叨安堵怎忘聖德潛扶意切傾葵聊假醮筵肆設廣施法食三途之饑渴常沾大啟慈航萬刼之沉淪普濟桐飄井畔趁金風而頓醒癡迷蟬蛻高林飲玉露而同歸解脫今朝此夜天上人間所屬亡魂盡登彼岸伏願靑垂聖眼丹鑒愚心吉耀照蓬門箇箇咸臻福夀祥光輝蔀屋人人共濟康𡨴荷旣往之洪庥銘心何極迓將來之厚錫翹首維殷爲病建醮身寄蜉蝣品同蟲豸無機無巧偏惹分外愁腸不識不知只向個中活命矢志常懷忠厚居家但願平安長子未善藏刀列身屠肆次男甫能搦管溷跡儒林况風燭草霜微軀已年週花甲且春寒秋𤍠拙荆亦景迫桑榆凡此老幼淸平均冀神靈默相誠惶誠恐惟寅惟淸何良辰丁維暮之春而賤室染旡妄之疾默祈呵護許兹眾聖之筵實賴庇庥特設諸眞之醮東嶽與華祖而並降天符偕帝主以齊臨共鑒微忱保其旣往統希慧眼佑乃將來伏願神聽匪遙天顏孔邇榴花迎曉日昭垂兩大祥光蒲葉舞薰風吹㪚一天晦氣老者齊眉舉案鼓琴鼓瑟荷長年少者解厄消災或讀或耕遊化日財豐物阜人傑地靈中元大賑水溺中元令節當赦罪而水厄可消勝會良辰藉盂蘭而元溟有喜渡幽魂於澤畔超滯魄於泥塗詞爲某痛念溺亡感懷枉死或士農不一本耕讀以營生或商賈各殊托貿易而居業螢窻黃卷實同隴上憂勤野店昏燈用恤道途遙遠行思坐想咸爲衣食之謀萬苦千辛半受饑寒之困祇謂時猶可待長將𡻕月自挨詎意命不逢辰遂爾災殃見至未許布黃金於六月那堪湧白骨於三更夜雨泊蛟龍禍成頃刻桑田移滄海變起蕭墻地暗天昏迷津梁而莫識風催浪湧招舟子以無從宮室傾頺莫覓中流砥柱家財蕩盡一如順水推沙猶憐夜半更深夢熟不知身已没堪歎人亡家破魂消宛在水中央一個東一個西莫辨祖孫父子從流上從流下誰爲兒女夫妻嗟彼後舍前村旣已死亡靡托況是南商北客亦將進退無門貲本全抛誰信有錢難買命一身淪落今生無夢不還鄕其没其存家人未審無援無引暗地徒傷似此橫流遙望鳥飛不下人民憔悴悲獸挺亡羣血流長河何啻掬舟中之指屍添巨港奚容斷流之鞭目今大水初平顧兹慘傷難禁赤身露體半牽草木之根敗質殘形徒作魚鰕之窟無男無女悉皆䝉恥含羞何富何貧盡屬無名少姓漫言石槨一坏之土難期豈曰城七寸之棺何望間有人勤訪問覩面已不相知縱然事外咨嗟撫心未能遍給家鄕應不遠誰與超援音信杳難通將焉托足蘆花柳橛已非舊日家風夜月流螢不是同行侶伴啾啾唧唧聲痛寒蛩冷冷淸淸情悲塞雁涼風吹落葉片片飛愁迷露飽孤舟悠悠抱悶傷心江上咸深屈子之哀哭望天涯共灑湘𡚱之淚千般苦態我亦難言九轉迴腸爾其曷訢時也命也天乎人乎某等居近河邊均遭奇害幸䝉天眷苟免微軀意亂心忙想到其問猶膽破水推沙壓說來無個不心寒惟汝堪憐豈容坐視隨緣自盡聊以陳情愧無盛餞以相酬齊竭鄙忱而上叩誠恐陰靈未㪚積怨滋深墮落人間翻作含沙妖蜮沉淪澤國反生平地風波月夕霜晨不時隱現草枯蓬斷隨地猖狂爰是約我同人奉行烈熖不藉妙力安能渡出迷津竟仗神光或可脫離苦海金波搖火樹霎時照徹紅流銀浪滾桃花頓地輝流黑暗鈴聲載震喚醒夢裡之身杖錫分明指破輪迴之路藉淸泉以洗耳靜聽佳言務潔巳以歸誠共遵至教倘䝉提掇一身免在污泥幸獲流膏萬古豈如長夜勿迷本性致誤前程淺水灘頭豈是棲身之所荒洲沙漠終非聚首之場白浪滔滔洗不盡胸中怨氣黃昏寂寂偏惹起分外愁腸浪跡間遊有何歸着萍踪莫定長此飄零旣非鄭伯之棄師何忍逍遙河上卽是南征之溺漢止堪問諸水濱試思誰怨誰亻丸休結難還之𡨚債或亦自作自受巳完未了之孽緣無樹惡門到底前途是路果能修省豈無好處爲家海上蓬瀛乘此淸風可到揚州閙市趁兹皓月偕行庶死無震蕩播越之虞而生免饑寒流離之困伏願慈航普渡澤遍幽明覺路宏開恩憐水陸用祈哀釋從此超昇嫠婦誦觀音經蠶到眼終畢世纒綿空自了葵臨日昃這生顏面爲誰低結成愁緒千條不覺死心搨地剩得丹心一片只須合掌朝天詞爲某影類孤鸞形同絃月幼曾問字徒申秦晉之盟老莫瞻天罔識鴻光之案有家雖有願生未登俟我之堂多病復多愁死將化望夫之石五十餘年依母宅枉自啼煞慈鳥百千里外盼人歸怎不聲殘杜宇幾個黃昏幾個夜花開花謝過許多燕燕鶯鶯一番温煖一番寒春去春來消受些風風雨雨戀得翁姑薄產免教凍餒侵身據着兄弟爲家漸覺冰霜透骨莫怨良人命薄一生同暮雨朝雲須知女子緣乖八字犯孤辰寡宿撑兩家體面抛殘脂粉綠窻勤剌繡之針辦一箇志誠毀碎粧奩白髮老縫裳之手想是前生失足到於今這樣下稍若不此際回頭恐將來還莫結果風前飄兩髩可憐膏沐誰容石上證三生見說皈衣有自罄蕉心之細展唪蓮座之眞言播寶篆啟琅王函俯首千聲大士望普陀瞻南海舉頭三尺觀音大願本慈悲屬在𣺌躬似更慈悲加切救人離苦難如兹薄命是惟苦難猶多宣聖號而哀哀不盡新愁舊恨懴愚衷之瑣瑣罔非宿孽今因力仗黃冠忱舒赤悃伏願眼垂格外手出空中水月威光照徹中生之苦醐醍甘露潤甦無告之民倘假前程再若受生休似此少延殘喘這回就木亦安然爹娘生女反遭罹憐女幽魂好聽經聲而解脫舅姑養兒難待老望兒滯魄同藉勝會以超昇莫釋凡愁統維洪鑒謝帝主長鑱托命數口爲家不識不知敢云帝澤之訓何思何慮幸遊化日之寛惟期種雨鋤雲逐日身康力徤詎意風寒暑濕片時陰戾陽乖忽榮衞之違和乃星辰之冒犯忙人無計只將帝主潛呼神望有靈頓令沉疴立起感恩曷極聊抒一滴之誠叩惠靡涯並錫合家之吉凡情不盡睿鑒惟昭中元施食岳士智秋日譜商音悲調灑荒郊之淚中元臨皎月淸光徹長夜之天言念某未能事人焉能事鬼惟體大士化身用矢牛坡施食食庶幾飲庶幾匪日嘉賓之貺饘於斯粥於斯願嘗小人之羹雖去年此日巳抒鄙念於黃冠而今夕良宵再拔幽魂於黑壤伏願法路宏開箇箇孤靈齊効順慈航廣駕村村憐火盡皈依自此陰陽和暢從今民物滋豐爲爭渡溺死施食梅信天先生公諱之煥七省經畧雨昏大麓潮打孤城纔驚捲地排空遂致浮家泛宅溤夷窟裡誰招湘水之魂白骨河邊猶入春閨之夢落日妖蛟哭烟迷桃葉渡頭秋風宿雁團月冷蓼花灘上故山何處望一水牽愁滯魄幾時歸大江東去雖屬毒龍爲祟實緣同業所招敬仗眞言爲爾說法愛河苦海陸沉豈必洪濤寶筏慈航當下卽成彼岸倘能滌慮便是回頭若猶作厲煩𡨚轉入黑風鬼國長天秋水映河燈萬點寒星響葉吟蛩助梵唄一溪幽籟聞經聽法悟同鉢裡之潭龍作楫爲霖澍舞江邊之石燕其二梅信天汀洲容易平消爭渡有何急迫覆轍仍蹈覆轍後人復哀後人非屬往因卽關定業縱起河邊之骨難招湘水之魂聞溺水者坐水牢冥府必無此律皆緣情識結成欲脫身者尋替身他人抑又何辜祗令業𡨚增重迷則波生平地愛河慾海卽是鬼國黑風醒則思出污泥巨漫洪濤當下慈航彼岸但受過去報正藉大浪淘沙莫結未來因好趁冰壺作魄今令節中元之日正盂蘭普濟之期體烏尤八定之心渡白骨相撑之眾芙蓉殿上明珠映明月之交輝貝葉聲中金錫隨金風而振響喚起遊魂滯魄休依魚腹爲家請看秋水長天好向鷲峯作証祈雨告文上帝好生不愆雨暘之候下民多故時干天地之和年來憂旱憂蟲皆由自作自受願災傷止以示警而憔悴易於見蘇乃今是禾鹿音票是蔉音袞之時又亟雨玉雨金之望亡將無日急乃呼天雖眾生之孽實然諒造物之心不忍迴義和之轡只在片時投玉女之瓶止須一滴惟於呼吸之傾便是生死之關短短秧針懨懨焦土麥價增舊苖絶懷新要得一舞商羊所冀羣翔石燕桔槔窮日力難補天工荳花說年豐敢忘帝力生子酬願彭賓衣冠世冑忠厚人家讀聖賢取義之書能窺大意承宗祖秉禮之訓惟有小心乃馬齒加長而熊夢初叶窮愁頓釋眉頭之鎖自開色笑堪憐眼内之靑不轉宗祀庶乎有托彌深䑛犢之情高堂於以承歡差慰含飴之願何德以致此惟神其佑之恭惟送子觀世音菩薩座前結人間未了之緣玉燕飛投靑鎖夢體上帝好生之德石麟降自碧雲天華封雖祝三多惟仗金蓮送去豐鎬卽稱百則全憑玉笋𢹂來恩重如綸延我以線有懷報德亦同抽繭以無窮敢日旌功聊示書紳而久佩但能生自能育留作他年舞彩之兒且可再併可三續以異日聯芳之伴得雨酬神彭韜詞爲眾等同居井牧各事耕耘蔀屋茅簷甘田家之樂趣粗衣淡飯守野老之遺風子規啼轍五更寒手牽黃犢杜宇呌殘三月暮身掛靑簑戴月披星孰敢早眠晏起鋤雲種雨誰爲遊手偷閑夫何火龍司命正值旱魃爲災幸天心之樂育賴帝德之好生四野雲迷滿天雨露千山霧鎖遍地黃金東作無愆風動惟聞牛背笛西成有望夜深時聽踏歌聲月明無大吠雅韻載叶夫周詩雨過有人耕休徵時紀於禹範敬仗黃冠敢陳赤悃諒九閽之非遠知一念之能通伏願火盗無侵共樂堯天浩蕩蝗蟲不作同遊舜日光華有始有卒苦作苦成要令耕九餘三樂𡻕辦完凶𡻕飯莫致醫瘡剜肉寅年支過卯年糧不盡凡心仰干聖聽謝雨醮三年耕而一年餘父子喜逢天貺五日風而十日雨農夫幸戴宏庥感天道之生生祈有秋之奕奕某等耕雲鋤雨共安里社生涯飲井食田祗守農桑舊俗饒錢穀者百中之十愁聞叱咤風聲乏衣食者十有其三怕見亂離景象前此密雲不雨人心便見荒凉今且濁浪排空涸鮒立甦膏澤旣秀必實更祈螟蠈無侵善始克終尤賴甘霖時潤遍地黃金雨六月蔚秋稼以如雲仰天拊缶樂豐年飛羽觴而醉月千箱貫集百室盈𡨴伏願淸醮數伸民悃向九天呈進紅雲一朶綸音自金闕頒來巷舞衢歌咸樂堯天舜日田農山叟相勤禹寸陶分盛世淳風古初帝則府試歸補祝半偈菴掛紅碧漢澄淸德耀西陵欣普照彤雲淡蕩夀星南極慶同輝采芹芽則芝草同香挹泮水而霞觴並色忱抒十二桃熟三千某等初識之無畧詳亥豕文章千古事只須閉戶雕蟲得失寸心知不管到門題鳳一頂頭巾能幾許便教百折千磨兩篇文字亦尋常儘勾三塗八難赤壁磯頭迎舊主懽迎前𡻕之賓黃岡城外慰歸人巧說下年之客妻奴嫌面目不憐季子裘穿朋輩訢肝腸但幸張儀舌在雖秀士三年不第終同牛馬之呼而童生十年成精難免市朝之口任是千軍筆掃其如時命無憑卽能萬卷胸藏還望神明有託詎意千秋令節正滯齊安遂教萬夀謳歌久虛半偈鉛刀新試笑頭角之稍更鷄肋初成幸風雲之有待雖英雄入彀尙多刖足之傷而文武爭先已叶連茹之吉兹則律當夷則又逢節届中元瓜冷如冰不亞安期之棗榴垂似火何殊曼倩之桃柳岸聽鳴蟬奏出琳琅吹鼓沙堤迎曉月洗開爛熳光華特申燕賀之忱更叩鴻慈之庇各緘縹緗之帛赤氣飛紅共分膏火之油祥光燦錦謾道寸絲裊裊紗籠望覆金甌休言爝火星星藜杖思燃乙夜文武憑他分兩路有才豈懼苛求𡻕科轉眼只三年得志何爭遲早倘得五磯江上布帆小艇風高聞桂子之香請看九曲河灣古道疲騾鈴語叶狀元之韻伏願帝德汪洋神功浩蕩衣冠謬厠粃糠偶爾居前騏驥爭驅積薪定然在上莫謂終年浪蕩遂呼白腹書生須知隔𡻕飛騰漫算靑年貴客追虞廷之司牧鐘鼎同調聯周室之冠裳縞紵弗替凡情不盡聖鑒孔昭漢鎭謝火掛紅彭韜寄跡市㕓權衡子母襟懷坦率不曾數白論黃心地光明絶少掂斤播兩詎意前居漢鎭適當災降祝融誰施公瑾之謀竟爾烟騰赤壁孰奮楚人之炬遂令火熾咸關長空亂舞金蛇個個心搖胆落大地驚飛火雀家家呌屈號𡨚傾刻化灰塵不問樓臺亭榭霎時成瓦礫何分珠玉金銀休言噀酒能消歎黃鶴仙翁三醉漫道遠水難救看晴川巨浪千層不聞除烈熖自分人財兩失身如釡鬵之魚無力滅狂烟甘心本利成空形似籠叢之鳥幸帝力之蔭扶能收𤍠障感神功之默佑早賜淸涼恩已戴於二天德實同乎再造爰將尺帛敬掛金容䖍捧爐香恭薰帝座愿旣酬於今日榮應托乎方來煖八寒灰財納東西南北陽回喬木福迎春夏秋冬積玉堆金千和萬合瘞枯骨彭韜竊念爾等久感予衷荒塚纍纍鬼伯無端屯聚遊魂𣺌𣺌人生孰敢躊蹰無處認殘碑分不出賢愚貴賤何方尋老故想都成獨寡孤月冷荒郊夜靜之哭聲唧唧風淸曠郭天昏之隣火星星慘淡北𠨑山難把姓名記取凄涼蒿里地莫將宗戚稽查靑草烟空徒見烏啼鴉噪白楊露重但聞鶴唳猿啼雖逢寒食淸明誰個洒杜鵑血淚繼遇生辰死日何人焚蝴蝶灰錢雨打風吹莫惜沼中之骨鳥棲獸拔不憐泉下之人在生寄死歸百世後人皆如此而耳聞目見寸心内我獨何安將爾等之碧血無依並先人之𤍠腸胥冺用憑三尺土少妥尊靈敬備一爐香恭迎滯魄長眠客向長眠客千年華表重教玉瘞佳城可憐人度可憐人一葉慈航共羡蓮開彼岸敲斷黃粱之夢請聽北郭鐘聲照開黑業之門試看龍池月色好頭頸不須牽罣靑史原虛假之名臭皮囊何用畱連黃土總不堅之骨伏願神功莫測妙力無邊法鼓鼕鼕超出往因定刼梵音朗朗喚醒來世今生煖入寒灰大眾好抬頭同遵周道春生白骨諸公須着眼共望仙礄莫墮夙緣往生天界智鏡菴僧暢懷法名心悅誦皇經滿藏答報四恩程宗洛萬象維新欣綵燕凝祥飛傍紅雲深處一元復始喜絲鷄獻瑞飄來白玉京中旖旎駐仁旛敬聆鳳律調和音畱仙樂昭融悉智鏡高捧龍章炳煥輝映琅王函濯五木以浣心望九重而稽首詞爲某年越五旬恩懷四重存心忠厚那得圓通矢志肫誠但遵戒律喜穿破衲亂雲補百結之衣好食麄疏甘露調一瓢之飲門外輪蹄絡繹豈能移淸淨之心林中禽鳥喧嘩亦不擾虛靈之舍大眾澆沙作飯𡨴敢奢華客來汲水烹茶便爲恭敬看經念佛鼻頭上卽見眞如鋤地耕田眼目中惟知苦行積累亦稍充裕怎敢望金布祇園嬴餘自有支消只怕的貪成障海念雙親之鞠育劬勞莫報已曾拜佛垂慈惟本師之提㩦訓教難忘願復誦經增福溯冥地借貸之項應自塡還愧畢身罪孽之端無緣解脫塵情眞莫斷惟憑慧日消磨夙障怎能袪須本禪燈照徹敬於乾隆五十八年正月一日恭誦玉經一萬二千三十六言約過二旬完成一藏並誦三元妙諦皆爲衍慶以延齡更叩一品普門悉頼垂慈而救苦銘心刻骨聊因鄙志初申𤃉胆披肝敬誦尊經滿藏遙聞天語悉証神功本金剛不壞之身除去七情盡妄展藥師濟世之法掃來八垢皆空本本源源敬諷受生妙典明明朗朗特宣地藏元文已畢明經再禮法懴寶誌之高揚切志梁皇之推闡宏深覩千佛之朝儀拜得低眉微笑聆三昧之妙語宣來慧眼垂靑去來今有高眞時深接引戒定慧垂大法日報平安祈錫福以延年望消災而解厄二三年隱念只望功成四十日修齋庶斯果滿爰施熖口大濟三塗仰體佛慈廣資十利伏願經功浩大懴法昭彰放十七大光明長佈祥雲滿室成三十種上功德齊看花雨彌天惟惡孽盡消不掛一絲竟八淸淨之界誠善緣是結頓融二帝長歸歡喜之園利普眾生恩流閤寺恭祈慧澤大利山門院婦薦夫時在陽和令爲姑洗曙開窻曉怯聞比唱黃鸝晝永簾閒姤看雙飛紫燕笑倚風前花爛熳人面長空飛翻香裏蝶紛紜夢魂同幻九十日春光過了百千年離恨伊初痛惟吾夫孝能馴虎友復如龍忠厚傳家不愧岐居十世沖和接物何須漢約三章卜式之田可分德旣豐而財𡨴儉疏廣之金巳散智誠短而仁固優眼不白而常靑與人無忤居雖南而仍北惟道獨親奈何屈原之賦空傳天兮難問終使伯道之𡨚莫解殁也誰嗣孰不念一線相延我良人覩此笑語隣兒幾度雙眉長鎖他那知三石無分這多年禱盡神靈嶽瀆到頭一夢初醒半世辛勤竟是誰家天下終身似續全憑阿大中郎口所不忍言者彌畱時數聲長嘆事之無如何者夜臺上幾次回頭案前藥盞猶温七夕之沉疴不起架上緋衣重叠兩年之死喪頻仍去𡻕翁今𡻕夫百日内同棄人間傳聞里巷心皆惻寅時子辰時母一朝中相扶泉路猙獰鬼伯見尤憐銅雀臺開薄命雙啼紅粉面玉魚符降少年長哭黑頭人花開知爲誰淚盡湘江之竹山靑長似舊感同蜀道之鈴夫也永作斷猿何時再回蝶夢我也中傷別鵠長年共訢鵑愁從今後落落守深閨絶似秋老寒蟬吟敗柳自今往㷀㷀隨隻影儼如夕陽孤雁渡重關靜坐數生平一燈孤夜唧唧猶意當年垂頭思往事白日靑天咄咄常書碧落窻風鳴裂紙頻驚步履逼人庭月逗疎簾彷見精魂伴我垂暮皆無聊之日惟恨此身尙未亡愁思八何有之鄉但願來生重配耦伏念我夫心底皆福頭上卽天無量德自證菩提善男子宜登天竺何日歸來化鶴望夫石作盼仙礄今朝滴淚成文織錦詩爲招魂賦惟願國稱極樂或早度慈航帝曰好生則重迴人道庶幾慰幽魂於黃泉地下有以妥馨香爼豆之心莫須逢姑舅於白雲鄉中猶然是團圓骨肉之想唐湛若薦父其父諱言時爲廣東幕賓又爲山東幕賓彭韜夜雨灑桃花血淚飄來點點曙烟籠柳色愁心掛出條條思有路以及泉恨無門而入地敢從苦海敬渡洪波痛惟吾父磊落性成慈祥自受謙光接物盈盈和氣春風正直居心凜凜嚴霜皎月一經承祖訓匪同章句儒生數帖紹家聲不染膏梁習派心雄萬丈磨成寶劔恍如發軔之鋒筆掃千軍製就長纓仍是處囊之頴羞把蓬蒿罣戀岐嶇客路三千好將舟馬遨遊淹蹇王程八百蠻煙瘴雨探閩海之山川周鼎商訪魯邦之禮樂檜幹千年纔着葉毫端寫闕里休風梅樁十月已開花墨汁染嶺南春信布帆裊裊黃牛峽口曉風與病骨齊寒古道迢迢白馬津頭積雪共鬂毛一色冷署孤燈過半夜寸腸百結惟從嚴裡施仁官衙皷打正三更片念千迴但向死中求活志存旡訟橫父母之胸襟民自不𡨚植菩提之種子到家身似客何曾耳畔淸𡨴出外僕爲兒只放心頭忍耐七旬空荏苒仍然金盡床頭一世自奔波纔是風淸袖裏致使精神有限漸漸消磨遂爾疾病時深懨懨瘦損最痛語言咽哽朦朧說出祗躭兒輩憂愁更嗟身體拘攣掙扎伸來還把諸孫提契五𡻕死亡相繼都丟下乳燕嬌雛數年哭泣頻仍難按住心猿意馬病久兒因多積玩或疎定省晨昏囊空孫或放嬌痴但記呼梨覓棗詎料鳥飛免走倐焉二𥪡淹纒誰知地折天崩陡爾百年訣絶難把西歸追落照白頭之兩母何依莫將東逝返餘波黃口之諸孫誰靠千里伯兄思老父夢魂杳杳猶然問寢高堂九京七弟晤嚴君泉路茫茫到得承歡月麥下問椿庭何處愁心恍惚只如昔日承歡覩靈位空懸淚眼朦糊已是今生永訣縱有三牲之祭鷄豚之逮事奚將況當五殿之臨風木之生哀更切用延羽客敬叩慈悲識破生死關嘆人夀恰如朝露斷除煩惱障嗟塵世總若春冰四大空虛要知不孝兒原是生前𡨚債六根寂滅莫因無靠子反添死後牽連兒曹凍餒不須愁排就五行八字天界逍遙眞足樂打開十地三塗寶炬放灘流春水波翻洗盡三生黑業法幢遮曉日東風氣煖吹醒一枕黃梁伏願慈雲普覆法雨宏滋方寸是慈航永斷𨶒浮之路靈臺成彼岸好尋解脫之門堂上雙親蠢子猶能供菽水泉鄉父老亡兒應自切追隨暫將眞性厝東齋莫嘆凄涼尙有兒孫作伴纔下佳城依北郭休言冷落還同宗祖相依共證無生早登極樂寄僧脫白箕裘未遂寤寐難安愁鎖於眉誰向郊媒履帝武提心在口敢思仙子送麟兒切切爲懷小西天中聲呼聲應悠悠是念觀音殿下有叩有靈許愿自庚戌年間靈枝錫癸丑秋後雖螽斯可詠怎知他福夀如何卽云命定有生怎卜我機緣奚若爰藉佛祖寄托皈依閱歴十餘年無災無害袈裟旬數載非色非空莫說無實有名脫却禪衣還兩髦只是指僧阿護旋歸俗子樂凡塵統竭民情恭申醮典伏願皇天默相大士垂恩惠篤嬰兒赤子添絳人之甲子慈優稚幼童庚永天祿於長庚不盡凡情均叨慧鑒祈嗣言念錫福惟五多男之慶尤先不孝有三無後之罪爲大四旬荏苒巳非少壯年華一木支持更少比肩主事孤根獨派猶幸我一脉綿延過戸承房更冀他千年譜牒目今門庭冷落未見乾道成男撫茲房室淒涼早望震符一索人前强笑語不堪背地思量夢裡暫忘愁何曾醒後罷念幾次倡頭爲首信朝山謁聖爲茲來由每番作福結良緣拜斗朝眞只因這個人情險刻誰憐鄧氏孤窮世態炎涼多幸趙家無後特叩紫金金闕斗轉星移默求白玉玉京雲開霧釋休曰多男叶吉長命子願捨一丁勿云富貴是期庸碌兒只求早賜倘屬前生罪孽願速勾除抑或今世𡨚愆更祈消滅庶堂上之含飴可慰而月麥下之繼述無驚仰叩洪慈蔭爲保護薦父爲訟身亡吾父何辜於天悵身墮於塵刼諸孤所欠者死庸皈命於元尊念茲鬱魂潛然血淚男等痛先君不幸與厄數相遭醇厚生平久矣懷諸性地訟蔓逐𡻕端夫結在門閭以致招嫌抱憤賈怨益讎英雄氣短誰明公冶之非兒女情長莫辨臧倉之愬每虞庭訊未休以致禍萌莫避幽冥隔一息號慕重百年嗚呼誰不夀終𡨴料倉皇而履變譬諸日皦曾何悔吝以招災𡨚霜六月偏凋幽谷芳蘭曉日重雲不照覆盆棘木𥸤天莫救承訓無由使不能洗浮議於吻間將何以見遺靈於地下猶念鬱結未消恐於冥憲再訟言及乎此實歉於懷在天道豈曰無知非往因斷不如是百年何好醜到頭總屬黃粱人世幾𡨚親覿面竟成烏有太虛無物任他把火燒空羣小流言奚異彎弓射影且從前之悲歡喜怒豈復留蹤而過去之勝敗興衰竟歸何處夫生卽有死何必讒言况施靡不還秪成反中若猶含𡨚積恨較短爭長起心便是輪迴舉念轉生障礙諒生平之寛隱端不致斯恐毫髮之差遲未免墮此敬仰慈悲特行分解指眞空之覺路步實地之法門人我兩忘永執中和之字是非了罷齊登仁愛之鄕用是香篆浮空璇圖啓秘冀回天闕之仁克副孝門之望伏願大作證盟廣爲超度淸淨界極樂界同結良緣過去生未來生永無繫累本眞不昧正性常存是非海濶人我天空次及孝帷俱叨福蔭附錄集成諸疏啓白三寶疏具位臣某誠惶誠恐稽首頓首昧罪奏爲八鄕貫奉道修齋儿示酉照昭某恭詣某修設靈寶某道塲一供於今月某日開啓至某日告散以今宿啓玄壇恭迎聖駕某誠惶誠恐稽首頓首俯拜上啓洞眞大道金闕自然高眞大聖元始天尊玉几下洞玄大道玉宸元皇高眞大聖靈寶天尊玉几下洞神大道金闕玄元老君大聖降生天尊玉几下恭望大道天慈俯垂洞鑒但修齋儿示酉照昭某詞因某事謹按璇圖崇修齋儿示酉照昭果重念臣某猥以凡庸謬參科籙職司濟度志播眞玄崇教心切行科咎多恭望聖駕光臨證盟修奉臣干冒道威不勝䖍切之至再拜謹疏淸醮疏緣民等陳詞自以三才末品一介凡流頂天立地叨居覆載之中戴月披星均處照臨之下㕓市營謀孳孳惟勤於人事𡻕時淸㤗汲汲深仰乎神功是以年陳醮祀𡻕展春祈兹者某届律例應修禳爰備法信凡儀云云伏願大德時昭景福長垂原往佑來坎離叶資生之用消災賜福邨市樂安堵之休財穀豐饒人民淸吉謹疏資亡疏嗣教小兆某謹陳爲遷度魂儀事據鄕貫云云奉道投誠𥸤恩請命薦某附度宗靈克生淨界遷神報本孝某右洎合家孝信人等是日哀干慈造意者詞因當齋正薦故某正魂性原命某年某月日時係某州縣地分人氏存年幾十𡻕於某年月日時以疾終於某邑住宅地分自神遷於夜府升滯難期若魂返於泉臺遷沉莫測孝信欲乞䝉恩開度䖍備法信凡儀取今某七之辰延仗羽士於就孝居建壇修設靈寶某道塲一中晝宵自某月日開啟匝至某日告竣等因兆領詞難抑依教奉行貝葉瑤科依宗傳而宣演黃函白簡遵遺教以奏揚伏念兆某識不聞道志切崇玄惟希浩蕩之恩默運生成之德今則某行道須至具疏申聞者右謹具申聖前伏乞仁慈俯賜昭允飛慶雲於幽界開其生門耀慧日於迷津咸成覺岸庶俾亡魂獲度遐升勝妙之庭孝信䝉庥永沐平安之福謹疏禳星疏詞教小兆某陳情爲順禳星運事據大淸國云云奉道建善舒誠爲某投詞乞恩消災袪病續限延生迎祥保㤗下民右洎合家善信人等是日叩干元造意者切以消災弭厄科傳禬解之宗續限延齡例禳之典敢因往訓敬迓元庥但示民投詞伏爲某本某年某月某日某時受生上屬北斗第某位星君主照庚幾十𡻕自某年某月某日以來身染病厄綿延某未獲藥餌無功巫覡弗應伏恐五行蹇滯三命衰微𡻕煞流降厄非申禳解曷致平康由是䖍備法信凡儀取今月某日良吉廷仗羽士於家修設太上某善事一中用解深厄等因兆謬頒詞誠叨行科教慮不知以不識憂無功而無行總仗慈悲曲垂救濟須至具疏申聞者右疏具申神銜伏乞聖慈俯賜昭允順星躔於天上頓解災愆歛煞威於年中和平厄戾永戢禍源全除病苦克保信某某一身淸㤗舉室平康謹疏爲教匪建醮疏切以樂土安居實由積善而致方團𡨴靖要非作孽而來但民言念秀頑不一每多六慾之内攻賢否攸分詎少七情之外騁是以有犯天怒斯遭神訶則兵火難以杜絶寇盗何由潛消今者近視鄕鄰遠觀里巷妖氛之風聞不息黎庶之戰兢弭深上奉庭幃不免顚沛下臨閨閫咸遭流離偶爾農人輟耕陡然士子掩卷大都田夀昔久冒愆尤當前安獲祥吉節届麥秋何恃而不恐時當耕耨不能以無憂因反躬自省欲陳片善以通撫心懷慚願進一誠而格爰設碧虛之醮冀消黑簿之愆共謁悃忱同祈上達寡母爲孤子病疏奉道投詞祈恩度厄和𡨚解結順星保命益後延生信某右洎某是日上叩元造切以啟後承先惟子孫而是賴弭災度厄仰宸曜以垂觀但氏情男某命係某年月日時受生上叨北斗第某位星君光下主照災祥行庚幾十𡻕伏自某𡻕以至今春療疾纒身精神困憊用藥餌以弗靈於拯療而乏計合家恐惶無門控吿切氏孽網多愆夙因寡植良人見背中年子母孤孀畢世所存六尺之孤何當染病而思百年之祀不能無憂或凶星臨度疾厄難痊或鐵案縈纒衅訧曷了思惟太上開祈生之典籍玉樞著襘解之經言於是洗心懴悔注意祈禳仰叩巨光重開大福云云修房安香火疏奉聖投詞敬安香火祈恩賜慶迎祥信某通洎某是日上叩神造切以樂業安居假營經而從事秋霜春露嚴報祭以惟勤某明棲宇下得遂飽煖之休幸列寰中咸樂昇平之治奉香火而薦蒸嘗畧表獻芹之致意荷神功而施庇護常懷寅奉之微忱兹者今𡻕延匠修築宅舍於斯告竣擇吉云云仗道修建太上迎龍撫土安居利宅醮事一供上酬天星下安地曜等因今則醮功告徹猶慮香火未安寅具香燭信儀錄疏申聞者右疏具申聖位伏乞仁慈俯賜昭允密賜憑依大施呵護家道攸𡨴納太和之大慶人物利順遂元吉之佳徵門庭兆瑞財福雙臻謹疏嗣道教母病疏某地分奉教代母首愆釋罪祈恩消災續命延齡弟子是日叩干沖鑒意者切以災因孽致固業報之當然罪以懴除在明科而聿著兢懼於心祈禳是舉但弟子呈詞伏爲母某氏自某年以來身染某疾綿延幾載未獲痊平藥餌弗靈痛楚日甚雖屢申於禱事恐未符於咎源弟子切爲父習玄教家貯經書或舉行而違本式貽禍今時或瀆犯而在上年流災此日抑或訟注蔓引抑或𡻕運相淩衅緣種種子意惶惶恭按本行集經昭示事許懴禳爰是不揣蟻微冀邀天眷䖍備法信凡儀取今某月日良吉延小臣於家修崇善事諷演大經拜禮皇懴以此䖍祈仰希敷錫臣領詞䖍切勉爲宣行謹錄詞誠冒陳鑒盼臣誠惶誠恐稽首頓首謹上啟昊天至尊玉皇上帝玉陛下恭望天慈曲垂矜允施大生之德赦其宿愆垂再造之仁免其痼厄特降玉旨告下三官九府岱宗隍曹一體咸知同頒恩澤仍敕天醫部眾密降神功俾疾苦以全消誓遵行於善道臣臨事不勝惶悚懇禱之至謹疏禳病星疏嗣教小兆某謹陳爲順禳度厄事鄉貫奉道爲某投誠祈恩解疾延生保泰弟子某率合家人等是日叩干鴻造意者切以消災弭厄科著祈禳之典延生益祿事嚴懇禱之端但某投詞伏爲某本命某年月日時受生行庚幾十幾𡻕自某年月以來身染疾厄綿延縱極醫治未獲痊平伏恐行年之上運限之中有諸防害致此迍邅抑或冲犯星煞蔓連訟注非申禳襘之功曷遂痊平之貺由是䖍備楮財法信取今月某日良吉延兆於某處立壇依按玄儀特建太上正一禳災續命延生醮事一中上祈元佑用解深災等因某領詞䖍切理合關行濟人利世慙無一線之能解厄消災惟冀眾眞之佑須至具疏申聞者右疏具申聖前伏乞聖慈俯賜昭允退威星而平舛運厄度潛消益元命而降福緣祥風廣扇克保疾厄楚痊身躬茂吉謹疏爲父母消災接限疏切以消災杜厄科傳襘解之宗續命延齡例著祈禳之典儀遵往訓用迓鴻庥緣民父某氏母本命某年某月某日某時受生行庚幾十幾𡻕伏自某年月以來身染疾厄綿延旬月未獲痊平藥餌弗靈巫禳罔應切恐行年之上星度之中有諸防害致此牽纒抑或訟注相凌夀元有損非申懇禱曷遂平康敢乞星恩用延父母夀䖍具法信凡儀取今某月某日良吉爲始延兆於家修設玄靈北斗延生續命善事一中匝至日卽於是夜任竟等因兆領詞䖍切勉爲宣行才慚謭劣惟運念於操存職任冠裳當篤心於救濟須至具疏申聞者右疏具申聖前伏乞仁慈曲垂昭鑒特遷仙仗印錄醮修順星正度消厄運於當躔轉難成祥錫恩光於人世延年益算應聖教之立言杜厄除災符子誠之舉念祈保某病源卽解身體速安克致淸𡨴以爲効信謹疏謝玄疏用箋更妥外宗師眞人府等因詞領詞䖍切勉爲宣行今則齋事圓滿謹同宣科玄玄孫某某等荷沐庇佑得以行持恐戒法不淸科格有失文字减㨗語句差訛紙張破損顚倒重叠恐遭譴責之誅深負兢惶之念敬肅下情拜干原宥伏望師眞主張教法須至具疏上謝者右疏上奉靈寶啟教五師眞君幕前先天啟教列幕師眞几前恭望師慈坐鎭靖壇始終護佑庶俾齋信獲福嗣等䝉恩願玄風而廣闡祈教法以興隆伏惟師慈俯垂昭格再拜謹疏謝熒川主疏民等寄處市㕓傍居闤闠荷帡幪之大德廿年罔災托護庇之深恩奕世無患乃至今𡻕街坊木非崑崗而災炎時見市鎭如同曲突而徙薪爲憂𡻕運豈曰適逢星躔尤難妄臆思江陵之賢宰凡庸誰是劉昆謂瓘斝兮可禳愚蠢曾聞裨竈伏念王大帝蜀中生佛川内鎭神除民害則斬蛟於嘉州興民利則鑿堆於灌口凡屬血氣之倫皆求救濟況在光照之下𡨴弗投誠民等竊惟修省有路哀憐耑望君師方便無門瘡痍惟呼父母用是攀轅而陳愧悔繞月麥而𥸤悲云云伏願道垂憐淸源洞鑒錫福於守牧之地降祥於車轄之前化威光爲恩光不待欒巴之術轉赤燄爲祥燄何數樊英之神伏火與導水同功𡨴熒與絕妖並用庶使宇下赤子不受驚惶光中愚民力行修省父母六十預禳疏切以增年益夀斗府之至德難名集福延生人子之微忱獨切民一介庸愚䝉天地而蓋載三才末品荷神靈以滋培父母俱存朝夕幸承歡於膝下椿萱並茂晨昏樂聚順於堂前緣民某入生年意者花甲週隆適當起一之際運限交接常有採薪之憂厯慮星辰之弗順時患寢食之欠伸匪憑祈禱曷保安𡨴欲懇延生之慶用申獻曝之忱云云伏願神明昭格洞鑒愚忱廣施好生之德永錫延年之恩俾堂上嚴慈福夀頻增於晚景庭幃眷序疾厄潛消於𡻕時動用無山水之䝉行藏獲地天之㤗爲父捐施棺櫬父亡表圓疏稽夫有善必彰則爲善者益勤有功必紀斯建功者可徵苟一善能以存誠而寸功亦皆獲庇但民某尙念貧富各殊生死同然高陵固塚己兆瘞全雨骨風骸𡨴爲不慘痛僵尸於泠室故目擊以心傷爰施棺櫬妥葬煢魂效西伯之仁心掩北邙之胔骼於某年發心捐施棺櫬若干業以成全不意某故今當表白仰叩慈仁俯鑒微勛賜恩庥於先考妣淨域得棲佈惠澤於後𦙌箕田夀是荷生順死安存亨殁㤗道五十禳星疏言念本緣俗子幸列法門荏苒晨昏倐忽年符大衍曰循𡻕月遽爾夀逾知非渾俗和光未運念於鼎爐功用經寒厯暑豈存心於玄牛乚關頭數不能逃若庸常之一介災不能免致病疾之多端雖由解弛乏修實亦運途致厄三合照限眾煞臨躔盡誠請禱仰斗曜以垂庥注意䖍祈冀星辰而開㤗蠲弭滯晦默賜福緣天臘誦經疏伏以梅綻柳舒松筠不向雪中老霜凝露潤桃李徧開天下春節令届天臘之辰經科演聖教之旨披露丹誠叩祈靑鑒詞緣信官某生逢盛世叨沭皇仁愧四恩而無報慚一德之未修當茲良辰廼啟善事延仗羽流於就某處立壇諷誦高上玉皇本行集經部化納珍財叩天謝過伏願慈仁廣被恩德宏施上祈皇基永固國祚綿長俾兵革之永息祈封疆而鎭靜次冀云云預禳禮斗疏緣民叨生盛世幸產中華每懷大道之包荒常感星眞之護庇切思善無一羽過有萬端靈臺抱愧求懴靡由敢憑微善用滌多愆今就良辰斡禳厄運於是寅奉香花採獻果蓏瞻叩中天至聖稽首北極高眞誦七曜之靈章禮九皇之寶號惟願懴滌多愆請頒巨澤敕吉星常照於命宮令凶宿永離於運限三災八難感經功而解釋四刑六厄賴法力以消除註夀祿於丹簡削死名於黑籍云云就壇續經懴疏某地分居住就壇奉道投誠附禮經懴續善資亡某是日披露葵誠歸依慈化意者切以善爲福本多福由善果之廣培經具玄機至玄因經功而益著況聖造不遺於片善悉賜感通則哀情欲附於一期諒垂昭格敢摭詞言冒陳鑒昐緣此齋筵所薦亡過某正魂與某諠關之倫久叨德教路隔幽明之界實切悲思瞻仰無從徒懷恩而增感薦揚可附仍續事以聯齋恭就法筵仗斯羽士某以某日内另行諷誦某某經懴若干藉此善因用培冥福爲淨土之一階砌蓮舟之片葉等因兆領詞難抑受事當聞爰錄凡悰上干聖闕須至疏者右疏具申某聖位前伏乞仁慈俯賜昭允鑒兹一念翹殷使彼三魂超度克保某門叶㤗孝戸均安謹疏人亡後就齋悔愿疏切以求安解病科陳襘禱之宗了愿銷盟例有開原之日緣民之某於某年月以來身染疾厄勢甚沉危舉室憂惶無方救解欲倖邀於天眷敢致事於愿條時以某月日當空叩許某地某神位前某愿一堂次於某日復許某神位前某愿一堂乞眷顧以消災冀病源而脫體夫何天年有定世數無多竟於某年月日時身故慟某靈之旣逝午夜含悲思愿信之猶存晨昏懸念非申懴謝曷銷盟言今就齋筵附陳詞愫欲乞神明曲爲蠲免須至疏者右疏具申原日掌愿仙官受祀神祗位前伏乞仁慈俯賜昭允特與金書案上楚銷昔許之文玉暦簿中全抹前盟之字俾令永無逋欠時際平安兆冒干威光臨事不勝懇切謝罪之至謹疏謝土疏道投詞奠謝土府安龍鎭宅迎祥信民右曁合家人等是日上叩洪造切以坤元廣大本鎭靜以爲經人事懷居惟平安而是用特陳謝欵昭達宸恩但民言念居有屋廬德䝉持載或平基動土興作罔合於良辰或葺舍修房經營妄干於部位恐緣悞觸遂致爲殃非申奠謝曷挽威光寅具法信凡儀取今月日良吉土府在宮之辰仗道於家修建正一安居利宅醮事一供上酬天星下安地曜等因今則某行事須至具疏申聞者右疏具申土府九壘高皇大帝后土紫英夫人位前伏乞仁慈俯賜昭允各安方位恢靈緒於無疆備守家庭介純禧於不息日新月盛物阜人康謹疏重九爲母祈夀疏南浦雲飛節慶幽衣之授北堂春永誠舒愛日之歡敬肅凡悰冒聞聖鑒民切爲某母某氏緣母淑德可稱母儀不忒相父持家固偕琴瑟之好生男育女備極顧復之恩切韶華易過𡻕月相催恐前程之有阻憂運限之多乖思惟玉局垂章開祈禳之妙金門授道列延益之科條兹當避災之節俯申獻曝之忱云云爲病許大洞經二月還愿疏大洞垂章廣衍嗣英於世域文昌隷政宏施妙續於塵寰往者祈庥希恩於九天闕下今而展答顧命於七曲山間冀回桂閣之仁克鑒芹筵之薦以民某切爲某伏自客𡻕以來身沾疾厄用藥餌以弗靈勢甚沉危於拯療而乏計思惟大洞仙經文昌寶懴錫慶儲祥靈通符乎大衍懷嬰保赤妙用著於塵剎四野咸欽八荒是賴於以肅念翹企躬親禱吿聲呼之下應若鼓桴默叩之問鳴連山谷幸獲垂靑雖當報赤兹逢嶽降之辰體行修誦特具伊蒲之供衣覆何忘談經禮懴致其事羽客可依嶽叩蒿呼將其誠野人之敬惟昭顧鑒克副愚衷云云瘟病大行疏言念士民生居兩大氣稟五行旣戴高而履厚亦食德而飲和雨暘時若原無夭扎之䘲民物阜安復有仁夀之樂不意去今以來人多疾苦杏林之妙劑無功戶有呻吟上池之瓊漿弗效非上帝之不仁實下民之多沴或虧天倫或悖王章或負人心或傷物命種種罪尤不知改悔孽緣自作譴責難逃然災及回頭願釋屠刀修善果人窮返本思撥雲霧望靑天用萃老幼之愚眾同修懴悔之法筵建壇設醮皈命投誠云云伏願廣護國救民之德施除邪輔正之威俾刼厄可逃瘟風不染登斯民於袵席措一世於安全冥冥之中統希覆庇蚩蚩之眾願勵行修再則前此之路斃野魂久幽滯於冥府今兹之枉死亡魄或掩閉於黃泉醮功賑拔統沭殊恩鄕市新正開塲演戯疏切以陽春初布一天之淑氣盈階曙色平分滿世之祥風匝地應同人以維新祈大有而集慶敢藉檀烟昭聞楓鑒民等一介凡愚千生慶幸家鄕非一萍聚維方舖戸相連雁排中市居之云安均仰乾坤覆載平則爲福全叨神聖劻扶兹者𡻕臨月際春王燈火方休市㕓之交易甫舉優音式演商賈之答報惟寅謹遵年例大啟會因敬演淸音宣揚科範云云藉斯寸儀專申上聞者伏願人秉新誠神其依據一年叶吉大樂麗水堤山終𡻕叨安時享春臺夀域聞雷驚怖懴謝疏道投詞祈恩弭厄悔罪消災下民某叩干洪造意者民陳詞切爲某命係某行庚𡻕以民言念某裙釵賤質蒲柳微軀如輕塵而棲草似泡影以留形雖則秉賦於五漏實恐孽造於三生近年以來耳聞霹𩆝之聲措身無地目覩電光之掣魂欲飛空雖免校覆之條恭修酬謝之醮寅具法信凡儀取今某仗道於家修建正一祈天免難弭厄消災法事一中於内上祈天澤克鑒葵忱兆領詞難依教奉行未能淸號於雷轅注意消標於曹局須至具疏申聞者右疏具申伏乞仁慈俯賜昭允懇迎睿命洞昐下情克保信女某五雷不斬其形四司免校其籍魂神鎭靜永無驚恐之虞舉止安和常近康强之字謹疏謝坆疏聖投詞迎龍奠土謝墓安葬迎祥保㤗孝男某叩干坤造切以地道乘權總輿圖而功司九牧天星炳照由象緯而政隷三辰故來山去水信有神司而正案傍砂必歸主宰敬憑奠謝克兆休徵詞緣孝切爲某年月身故卜地於斯安厝棺柩憑術選擇本年某月某日某時吉神臨照營葬此山切恐方隅向背之間吉星失政陰陽消長之内凶曜當權兼之伏屍故炁木魅山魈占據龍山作威塜壤致令魂靈未能安妥孝敬焉獲吉祥於是敬竭精䖍崇修祀欵恭宣八陽之妙典叩白九壘之宸臺招山納契奠煞回躔永冀山水護佑地脉拱朝眾煞伏藏藉聖眞斡旋之力諸凶永釋感乾坤運轉之功鍾靈華於二十四向衍大慶於千百餘年山明水秀生順死安須至具疏申聞者右疏具申山家土府九壘高皇大帝内宮紫英夫人宮下恭望洪慈俯垂洞鑒謹疏祈嗣奏具聀云至大淸國八鄕貫地分奉道建善祈嗣弟子某卽曰叩干元造意者切以承先啟後惟子孫而是頼傳宗繼祖在嗣續以丕延但某夫婦久偕伉儷未慶熊羆𡻕逾中齡尙然乏子緣增側室祗意獲男兹懷甲之形巳昭昭而可憑則弄璋之望乃殷殷而愈切敬秉葵誠仰邀天眷䖍備法信凡儀取今月某日辰吉延仗羽士建壇修設文昌祈嗣醮事一中匝至日告竟等因小臣領詞䖍切勉爲宣行切罪恐無後深懷不孝之憂念切傳宗篤秉獲男之望而小臣本以庸才叨參大教愧德行之未修惟玄宗而當闡非邀龍天之眷曷叶麟趾之祥須至具狀奏聞者右謹具奏神位恭望天慈赦宥民愆吿下本命玄曹太𡻕煞局南斗注生司掌桂祿嗣福案七曲主者六甲大神契勘某命運限官陰陽風水夫妻時日所犯咸池天狗三刑六害隔角交加孤陰寡陽羅網凶煞一應艱嗣星煞悉爲禳解化難生恩早注嗣子差降神吏前赴所司查檢有緣之人速禀生神之炁以爲嗣續六甲大神保護胎元會司九天監生大神至其當生之時召神攝風衛房聖母默與抱送太一在門司命在戸天神誦章九馬催生臨盆有慶坐草無虞兆冐天威下情無任惶悚之至謹奏出家疏伏念某叨生霄壤寄跡萍根托乾坤之覆庇仗神聖之匡勷知皈有自答報未能切思韶光迅速生死事大輪迴苦海以何休因果福田而未植身染三業意縱六塵日積月累無由解脫幸太上開方便之門而凡愚有皈向之路兹遇某門正宗嗣派全眞心潛大道教演眞常闡揚某處情緣宿慶得曙玄風是以敬啟身心皈依某門下爲徒更取法名某自皈依之後披肝𤁋膽篤志修身悟長生之旨要參道法之規模恪遵師訓恭敬三寶倘後違教悖師俱憑神明鑒察總此一會仰瀆高明須至具疏申問者右疏具中照依某祖某眞君幕下伏乞云師眞默相將帥匡扶俾令新進玄裔修眞有分進道無魔消三業六根之過咎超九玄七祖之先靈身躬利益道果圓成凡在未言全叨恩佑嗣冒干帥慈無任激切屏營之至謹疏就壇獻供狀淸淨奉道投詞獻供欵眞集福下民通洎奏名人等上干元造意者民陳情切爲孝信資度亡故顯考妣魂下修建靈寶遷拔大齋一供民與孝信誼屬親特呈供品寅獻蘭塲顒申微念少佑生方於以䖍奉信香三炷華燭雙輝鮮菓成盤淨供全席集此寸儀上陳聖鑒須至具狀申聞者右狀上申伏乞仁慈洞回昭格受度亡人承鍊功而高登勝果陳供信民萃禎祥以膺享佳徵謹狀順星奠土竈疏大淸國四川奉道投詞奠謝土府順禳星運度厄消災禬福迎祥信民右洎合家人等是日上干洪造切以五祀推尊洵爲人世之福主九陽正位永稱天府之良臣呈善惡則有隱揚核是非均無偏覆欲兆元吉須仰威光民自呈本命右曁長幼人等雖然生相不同皆隷星光主照民言一介凡愚兩間庶俗晨炊夕爨日則事於庖厨夏水冬湯時惟充於飲食烹調或犯乎禁忌修補慮觸乎竈厨動土平基鮮識吉凶之道年神煞局恐遭尅戰之鄕順則履險如夷逆則流災作障若非祈禱之誠曷際淸𡨴之貺寅具法信仗道於家奉然香燭啟白竈司諷誦經章宣揚科咒上奉司命下乞淸安等因今則祀竈行事須至具疏申聞者右疏具申伏乞元皇洞鑒司命流恩赦晨昏冒犯之愆殄𡻕月驚喧之咎五方安鎭永叨護佑之仁四序和平實賴匡扶之力星度效和災非不作一門吉慶四序均安頓首謹疏瘡病解結疏嗣教謹陳爲星順解結以杜病源事據大淸國四川云云奉道陳情順和星運分解𡨚辜萃福保病延生信民通洎是日上叩元造切以疾病瘍疴爰切呼天之禱齋戒沭浴敢忘事帝之誠肅設蘭筵特申芹意民投詞切爲命生上屬中天北斗第星君主照切念患災信人爲德最涼禀姿甚弱瘡瘍爲災遽歴三年之久血脉衰憊實切四體之憂百藥俱試旣無君臣佐使之功五行蹇窮徒有卜祝巫覡之請且病死二符照於身命而刑囚兩曜居處限宮更慮宿𡨚宿累結訟事於冥曹以致沉灾沉厄兹蔓延於身内如非分解豈獲安全運吉星之臨躔轉凶神之退舍惟希天德克副民懷寅具云云仗道於家修建太上玄靈北斗延生度厄解結和禳法事一供於内諷誦經懴外懸洞淵六類神斻一首剪割線蔴巾布祭獻牲酒祀儀上奉星主下移晦滯等因兆領詞右疏具申聖號伏乞仁慈俯賜昭允隨聲赴感來呈淸淨微妙之因護念垂慈得脫疾病瘡疴之災刑囚退度祿貴還垣皙皙煌煌消爍禍孽穰穰簡簡綿延福基謹疏雹後保禾疏大淸國四川奉道投詞禳蟲稔𡻕止雹祈豐保境下民通洎合村人等是日上叩洪造切以禳蝗驅害道典開原宥之門保稼宜田生民有皈報之路欲獲豐稔謹以陳言眾言念居聯井絡業務農耕旣勤東作必望西成兹際時維夏末苖秀而阡陌翻雲節屆秋初蟲生而人民恐懼況夫春之三月狂風捲地冰雹飛空歴林木則枝葉全無遇蕎麥則根株俱損老幼攢眉男女心惻皆下民之造惡致上天之施災爰申懴悔特叩豐登伏願天地懷護生之念田祖興利物之心土地威靈驅盡蝗螟之害穀神勇猛止除冰雹之災刻下稻穀登塲不負神天厚德謹疏爲母塡還庫財疏爲預修功緣謝庫祈祥事據大淸國四川云云奉道投詞祈恩修齋璧償庫財襘禳星辰祈年植福下民通洎合是日上叩元造意者民陳情切爲母氏命係生於賦生上叨中天北斗第星君光下主照正隸嶽府受生院第庫曹官案下主司陽祿昔未脫質之時許欠受生恩錢千萬貫受生經卷民言母賦形坤道稟質陰儀雖托乾坤之覆載徒爲子女之勤勞淑性天成姆儀不忒年華已滿乎六秩善果鮮種於三生今之夀祿猶前世而培來後之福澤自此生而修去因緣可續盡子道之微忱金籙宏開酧母恩之萬一今當母初度之辰依按庫分酧貸種福田於三生邀吉祥於斯世冀沭天庥克符愚願施棺櫬圓功修齋爲超度㷀魂以證生方事據大淸國四川云云奉道陳情施櫬圓功建善資度迎祥信民通洎善眷人等是日上叩元造切以人處兩間藉棟宇而安家室魂歸幽壤必棺櫬以歛形骸在上古則用之無度而厚葬亦不外乎禮獨可憫者無吿窮民孤寒之侶一朝斃命難免暴露之悲七尺身軀竟爲蠅狐之食言念於此獨無恔乎民等原於某年發心捐施棺櫬若干付妥葬貧人其來領者給以制錢幾百冥楮幾百幅留彼姓名生死年月以待圓滿普申超薦其諸棺具始於某年之某畢於某年之某掩埋之事圓成薦超之齋未設歴兹載常抱於懷恐眾亡魂久沉幽界魂杳杳以何倚意懸懸而望祭於是大啟法筵廣行超度迎九淸之上聖一視同仁超長夜之㷀魂高登勝境寅具仗道於修建靈寶自然遷拔大齋一供某旦夕法事待至某日功完告竟所有應荐亡人姓名逐一開錄於后一壇中受薦亡人以上該薦眾魂祈希接引赴壇同誠聽誦太上經卷太上懴藉此善力上祈元廕資度亡魂淸給太上勅赦生天公據寶籙各一道外備印經冥籠各一箱給付亡魂以利生方等因兆領詞難抑依式奉行貝葉瓊科依定格而宣演黃函白簡秉儀制以敷揚須至具疏申聞者右疏具申聖號伏乞仁慈俯賜昭鑒亡靈䝉度含煉炁以生神善姓承庥集祥風而叶㤗陰界澄淸陽垣利益謹疏久病悔罪解結疏爲招梗禬禳解結弭灾事據大淸國四川云云奉道陳情祈禳度厄分𡨚解結袪病弭灾迎祥保㤗下民皇天無私惟曰公實沾覆燾君子有命不謂性當效祈禳俯陳咸感之誠仰叩乾元之聽民某自呈生上屬北斗第位星君宮下主照行庚十𡻕民某切念蠢性無靈幻身有漏身稔膏肓之疾遽爲性命之憂誠恐寒暑晨昏違悖乎綱常之内言行動止詆觸於父母之前雖曰一錢是命深爲衣食之謀縱云粒米成慳實切飢寒之慮存心雖然思寡過守已恐涉乎多愆命途蹇滯頻年抱疾以難痊藥石無功數次祈禳而弗應於以再秉誠懷䖍申請禱三生之罪累宜分俾無災而無害五行之政度期順慶有福而有年種種衅尤一一懴悔由是稽首北辰䖍申悃愫解多生之過誤禳未兆之災迍仰冀星天回凶作吉寅具修建伏願澤及無窮恩施靡曁災消厄㪚從今無慮無虞否去㤗來嗣是寖昌寖熾合室沾恩普門戴德頓首謹疏爲子病中風疏奉道投詞分解𡨚結禬禳病苦度厄消災保㤗信民是日上干元造切以碌碌赤子居盛世而咸沭恩庥庸庸浮生處兩大而實叨庇佑夫人非賢聖孰能無過而意注祈禳特叩神天但民陳情切爲生上叨北斗幾十𡻕不意某月旬中身染病疾日久未愈而兼精神恍惚性識昏迷臨事憂沖每欲言而囁嚅舉步艱難輙將行而趦趄誠恐有生以來或虧天倫或傷人紀父子之命度不合夫妻之神煞相沖致其靈府暗昧方寸癡疑而今矢念自新恭行分解謹遵玉樞之式宣行大梵之儀仰惟宸鑒准此又新之誠廣錫殊恩默施再造之德消弭厄晦蠲免𡨚尤寅具上祈元仁用解沉灾等因兆伏願鑒此一誠予之百福晦滯㪚開得覩光華於天上障魔削去克臻淨𩊀於人間夫爲妻分𡨚解結疏無子女者大淸國四川奉道投詞祈恩弭厄順星解結袪病延生禬福信民某右洎合家人等是日上叩元造切以有疾弗瘳適重中閨之慮無感不通惟祈上聖之恩爰仗黃冠肅陳淸醮民陳情切爲室人某氏命保上隸中天北斗第位星君宮下主照行庚𡻕伏自逐𡻕以來病苦纒身巫醫莫効連年困憊累𡻕迍邅今之春月更屬沉危切恐行年之上星度之中有諸防害抑或訟注相凌𡨚尤結畔恐夀元一旦短促非禳解豈能保全更念民夫婦結褵多年熊羆未兆莫不孽網多愆善根寡植或操存之未善念踐履之莫純致司過於陰曹未書功於陽籍專憑禬解上丐慈庥寅具仗道於家修建太上玄靈北斗延生順星解結法事一供於内奉然諸眞香燭諷誦經懴上祈元仁用弭厄戾等因兆領詞難抑依教奉行伏願澤及無窮恩施靡曁灾消厄㪚從今無慮無虞否去㤗來自是寖昌寖熾庶民氏身病厄頓除災非殄絶俾民𡨚孽冰消福基永固凡情不盡聖鑒孔昭謹疏學生懴疏以民言念生浮塵世忝列頑童䝉聖恩而有感荷神貺以無私天齊赫奕帝德巍峩今師振鐸於此使從負笈歸來冠童濟之於庵中諸生往來於寺内或出入有冒犯之愆慮動靜有䙝瀆之尤晝有吚唔聲而喋喋夜乃呫畢音以便便喧嘩聖心不安𠿷嚷神耳咶噪匪伸懴謝曷以保全由是率同諸生恭逢伏願聖夀天齊永消冠童之罪帝德無涯求滅諸生之愆俾令寡悔寡尤求其盡善盡美聰明睿智豁然貫通母爲女遇邪疏爲分𡨚解結超度枉魂以全弱息事據大淸國四川奉道投詞爲女遇祟乞恩驅逐兼申超度分𡨚解結保安信女某氏右泊合家人等是日上干元造鍾情巽女遽染無妄之灾請命乾元冀錫有孚之惠信女氏陳情切爲小女命係上叨中天北斗星君光下主照行庚𡻕於兹某月日陡遇邪鬼蠱惑靈臺心神錯亂言語顚狂多啼多笑如怨如愚或持繩欲自斃其身或弄杖竟凶驅大小求符則符無響應請巫則巫亦弗靈而反呼朋引類更肆猖狂合家惶恐日夜難安今將一月求治無門誠恐弱女前生之孽果纒身今世當報對結證伏慮枉鬼等久沉陰界未覩陽光索祭享於人寰求超援於教典言念若此均未可知幸太上開祈禳之典玄儀列超度之科爰乃謹肅凡情皈依聖鑒分𡨚解結保弱女之微軀化帛唪經度枉魂於淨土仰沭天恩默垂妙蔭卜吉至㪚等因伏願遙應凡情俯垂聖鑒人鬼分途𡨚仇和釋幽魂承鍊從善果以生神民女獲安致香閨而叶慶若再肆情固執更望驅逐施行合宅啣恩舉家戴德謹疏悔罪酧愿解結疏爲酧盟謝愿增福介祥事據大淸國四川奉道投詞消弭厄戾分豁咒𡨚保病迎祥右洎合家上干元造切以咒詛誣盟悉隷神司而紏覈悲思恚恨因在天律以森嚴凡犯科條豈逃案牘今展下情冐聞上聽但民切爲上叨中天北斗星君第位主照光下伏自今𡻕以來身抱病疾用藥餌以弗靈屢有沉危在拯療而之計民切思先年爲分析家產互有爭兢每見䦧墻之勢固傷手足之情如不平者則呼天呌地而剛愎者則詛佛盟神其諸誓語雖出自一時未遑悔解恐隷神曹則記乎筆下乘隙相纒今民念之病勢淹延惧前人之餘孽報對謹遵玉樞明訓恭憑檀熾淸音分消𡨚累豁免牽瑕寅具修建太上分𡨚解結鈎銷咒愿法事一供上奉聖眞下保淸平今則酧愿行事放生疏大淸國四川奉道投詞贖物放生迎祥下民是日上叩洪造意者民言念世間至重者生命天下最慘者殺傷故上帝廣好生之德而古聖行及物之仁成湯解網恩及鳴禽子產臨池德施錦鯉斯皆惠惜蟲魚恩周物命爰興放生之念敬舉救物之心使殘軀得命難地全生於是贖買魚鳥幾斤對寅具香燭信儀恭詣江濱關白沿江水府諸司三界神祗縱放淸流任其生養等情今兹臨江放生之際謹錄文疏申聞者右疏具申本境河伯龍王水司眞宰伏乞洪慈俯賜昭允伏願澤沛長河恩施大地俾所放禽魚搏風上羊角逍遙雲漢以翱翔隨水到龍門洋圉淵泉而涵泳福庇飛潛恩流庶類不盡凡情統祈聖鑒謹疏如單放魚則寫隨浪逐河波逍遙河漢以優游居山常打鳥鎗懴悔解結言念幸生逢盛世獲處深山持火鎗而涉獵害及禽蟲烮山澤以焚林殘偪物命遇虎豹則藥矢以圖謀逢獐狐則㖅狗而驅逐至於震驚山神違犯造物斯皆年幼無知過由誤作而今愧悔良多特行謝免謹遵玉樞之典宜行解結之儀願生生世世𡨚對消除卽行行止止坷坎悉平俾死傷物命早生化於福堂巢穴生靈得安居於峻嶺丐沭天慈克符民志禳星謝土同疏氣稟四時坤德配天而立極星輝五斗神光映地以何窮凡屬範圍之下咸䝉覆載之中但民托形宇内寄跡寰中暑往寒來開墾不無傷殘於隊一火永齋心奉聖誠恪又恐變更於終途無疆衍慶因克報酬有惡積累默祈憐念敬申奠謝之誠䖍舉懴禳之志寅具信儀卜吉建醮焚楮土皇宮中炳燭星主光下奠安宅舍順正星躔云云伏願載物憐物統五方歸位以流恩洗心格心同七政懷仁而加愛則飲和食德永戴廣厚之仁釋罪弭災長沭生成之化靑年孀婦母子祈禳切氏孽網多愆無偕同人而白髮命途衰薄僅育一子於靑年旣悲母子孤孀又恐宗祧殄絶是以深望弱男無災無害而綿百代之祀更祈氏體有福有夀可聚一室之歡不意彼之星辰欠利屢染沉災民之運限乖訛疊生病患母子㷀㷀實爲狠狽庭幃碌碌甚屬淒涼非祈禱於星垣胡能履吉敬哀投於斗府冀獲招祥寅具云重刋道藏輯要增補併儷心香妙語卷之四終
